<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="feed.css" />
</head>
<body>
  <nav id="topNav">
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main>
    <section id="newPost">
      <textarea id="postText" placeholder="What's on your mind?"></textarea>
      <input type="file" id="postFile" accept="image/*,video/*"/>
      <button id="postBtn">Post</button>
    </section>

    <section id="feedContainer"></section>
  </main>

  <script type="module" src="feed.js"></script>
</body>
</html>
