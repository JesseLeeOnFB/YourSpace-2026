<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </header>

  <main>
    <section id="createPost">
      <textarea id="postText" placeholder="What's on your mind?"></textarea>
      <input type="file" id="postImageInput" accept="image/*">
      <img id="imagePreview" style="display:none; max-width:200px; margin:5px 0;">
      <button id="postBtn">Post</button>
    </section>

    <section id="postsContainer">
      <!-- Posts will be dynamically inserted here -->
    </section>
  </main>

  <script type="module" src="feed2.js"></script>
</body>
</html>
