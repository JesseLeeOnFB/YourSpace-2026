<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Feed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <button onclick="window.location.href='profile.html'">My Profile</button>
    <button onclick="window.location.href='feed.html'">Global Feed</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div class="container">
    <h2>Global Feed</h2>
    <input type="text" id="postTitle" placeholder="Post title">
    <textarea id="postContent" placeholder="What's on your mind?"></textarea>
    <input type="text" id="postImage" placeholder="Image URL (optional)">
    <button id="publishBtn">Publish</button>

    <div id="feedContainer"></div>
  </div>

  <script type="module" src="feed.js"></script>
</body>
</html>
