<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- CREATE POST -->
  <section class="createPost">
    <h2>Create a Post</h2>
    <textarea id="postText" placeholder="What's on your mind?" rows="3"></textarea>
    <input type="file" id="postFileInput" accept="image/*,video/*">
    <img id="imagePreview" src="" style="display:none; max-width:100%; margin-top:10px; border-radius:8px;">
    <video id="videoPreview" style="display:none; max-width:100%; margin-top:10px;" controls></video>
    <button id="postBtn">Post</button>
  </section>

  <!-- FEED -->
  <section class="feed">
    <h2>Feed</h2>
    <div id="postsContainer"></div>
  </section>

<script type="module" src="firebase.js"></script>
<script type="module" src="feed.js"></script>
</body>
</html>
