<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YourSpace - Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button id="profileBtn">Profile</button>
        <button id="logoutBtn">Logout</button>
    </nav>

    <h1>Global Feed</h1>

    <div id="createPostSection">
        <textarea id="postText" placeholder="Write something..."></textarea>
        <button id="postBtn">Post</button>
    </div>

    <h2>Trending Post</h2>
    <div id="trendingPost"></div>

    <h2>All Posts</h2>
    <div id="postsContainer"></div>

    <script type="module" src="feed.js"></script>
</body>
</html>
