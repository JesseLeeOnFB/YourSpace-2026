<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="top-nav">
    <a href="feed.html" class="nav-btn">Feed</a>
    <a href="profile.html" class="nav-btn">Profile</a>
    <a href="logout.html" class="nav-btn">Logout</a>
  </nav>

  <!-- CREATE POST -->
  <section class="create-post">
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <input type="file" id="postFileInput" accept="image/*,video/*">
    <button id="postBtn">Post</button>
  </section>

  <!-- POSTS CONTAINER -->
  <section id="postsContainer" class="posts-container">
    <!-- JS will prepend posts here -->
  </section>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="feed.js"></script>
</body>
</html>
