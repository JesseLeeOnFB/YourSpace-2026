<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Create Post Section -->
  <section class="createPost">
    <h2>Create a Post</h2>
    <textarea id="postText" placeholder="What's on your mind?" rows="3"></textarea>
    <input type="file" id="postFileInput" accept="image/*,video/*">
    <img id="imagePreview" src="" style="display:none; max-width: 100%; max-height: 400px; margin-top: 10px; object-fit: contain;">
    <video id="videoPreview" controls style="display:none; max-width: 100%; max-height: 400px; margin-top: 10px;"></video>

    <div class="notifications">
      <label><input type="checkbox" id="notifyEmail"> Email notifications</label>
      <label><input type="checkbox" id="notifyBrowser"> Browser notifications</label>
    </div>

    <button id="postBtn">Post</button>
  </section>

  <!-- Feed Section -->
  <section class="feed">
    <h2>Feed</h2>
    <div id="postsContainer">
      <!-- Posts will be injected here by feed.js -->
      <!-- Each post structure generated by JS should look like:
      <div class="post" data-id="POST_ID">
        <div class="postHeader">
          <img src="PROFILE_IMG_URL" class="postProfilePic">
          <span class="postUsername">USERNAME</span>
        </div>
        <div class="postContent">
          <p>Post text here</p>
          <img src="IMAGE_URL" class="postMedia">
          <video src="VIDEO_URL" class="postMedia" controls></video>
        </div>
        <div class="postActions">
          <button class="likeBtn">👍</button>
          <button class="dislikeBtn">🖕</button>
          <button class="commentBtn">Comment</button>
          <button class="shareBtn">Share</button>
          <button class="deleteBtn">Delete</button>
        </div>
        <div class="commentsContainer"></div>
      </div>
      -->
    </div>
  </section>

  <script type="module" src="feed.js"></script>
</body>
</html>
