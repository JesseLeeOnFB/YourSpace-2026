<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Feed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="logoutBtn">Log Out</button>
</nav>

<div class="create-post">
  <textarea id="postContent" placeholder="What's up?"></textarea>
  <input type="text" id="postImage" placeholder="Image URL (optional)">
  <button id="publishPostBtn">Publish</button>
</div>

<h2>Trending Post</h2>
<div id="trendingPost"></div>

<h2>Global Feed</h2>
<div id="postsContainer"></div>

<script type="module" src="feed.js"></script>
</body>
</html>
