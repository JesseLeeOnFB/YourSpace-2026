<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVBAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- CREATE POST SECTION -->
  <section class="createPost">
    <h2>Create a Post</h2>
    <textarea id="postText" placeholder="What's on your mind?" rows="3"></textarea>
    <input type="file" id="postFileInput" accept="image/*,video/*">
    <img id="imagePreview" src="" style="display:none; max-width: 400px; max-height: 300px; margin-top: 10px;">
    <video id="videoPreview" controls style="display:none; max-width: 400px; max-height: 300px; margin-top: 10px;"></video>

    <div class="notifications">
      <label><input type="checkbox" id="notifyEmail"> Email notifications</label>
      <label><input type="checkbox" id="notifyBrowser"> Browser notifications</label>
    </div>

    <button id="postBtn">Post</button>
  </section>

  <!-- FEED POSTS -->
  <section class="feed">
    <h2>Feed</h2>
    <div id="postsContainer"></div>
  </section>

  <template id="postTemplate">
    <div class="post">
      <div class="postHeader">
        <img src="" alt="Profile Pic" class="postProfilePic">
        <strong class="postUsername">Anonymous</strong>
      </div>
      <div class="postContent">
        <p class="postText"></p>
        <img class="postImage" src="" style="display:none;">
        <video class="postVideo" controls style="display:none;"></video>
      </div>
      <div class="postActions">
        <button class="likeBtn">👍</button>
        <button class="dislikeBtn">🖕</button>
        <button class="commentBtn">Comment</button>
        <button class="shareBtn">Share</button>
        <button class="deleteBtn">Delete</button>
      </div>
      <div class="commentsSection"></div>
    </div>
  </template>

  <script type="module" src="feed.js"></script>
</body>
</html>
