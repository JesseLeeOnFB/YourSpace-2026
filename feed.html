<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NAV -->
  <nav class="navBar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- POST CREATION -->
  <section class="createPost">
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <input type="file" id="postImageInput" accept="image/*,video/*">
    <img id="imagePreview" style="display:none; max-width: 100%; max-height: 300px; margin-top:10px;" />
    
    <div class="notifications">
      <label><input type="checkbox" id="notifyEmail"> Email Notifications</label>
      <label><input type="checkbox" id="notifyBrowser"> Browser Notifications</label>
    </div>
    <button id="postBtn">Post</button>
  </section>

  <!-- FEED -->
  <section id="postsContainer" class="feedContainer">
    <!-- Posts will be appended here dynamically -->
  </section>

  <script type="module" src="feed.js"></script>
</body>
</html>
