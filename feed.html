<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace-2026 Feed</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">

  <nav>
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div class="feed-container">
    <h2>Global Feed</h2>

    <div class="new-post">
      <input type="text" id="postTitle" placeholder="Title">
      <textarea id="postContent" placeholder="Write something..."></textarea>
      <input type="text" id="postImage" placeholder="Image URL (optional)">
      <button id="publishBtn">Publish</button>
      <p id="postError" class="error"></p>
    </div>

    <div id="trendingPost">
      <h3>🔥 Trending Post</h3>
      <div id="trendingContainer"></div>
    </div>

    <div id="postsContainer"></div>
  </div>

  <script type="module" src="js/feed.js"></script>
</body>
</html>
