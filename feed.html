<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Feed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <button onclick="window.location.href='profile.html'">My Profile</button>
  <button onclick="window.location.href='feed.html'">Global Feed</button>
  <button id="logoutBtn">Logout</button>
</nav>

<div class="post-box">
  <input type="text" id="postTitle" placeholder="Title">
  <textarea id="postContent" placeholder="Write something..."></textarea>
  <input type="text" id="postImage" placeholder="Image URL">
  <button id="publishBtn">Publish</button>
</div>

<div id="feedContainer"></div>

<script type="module" src="feed.js"></script>
</body>
</html>
