<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="feed.css">
</head>
<body>
  <nav>
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="navLogout">Logout</button>
  </nav>

  <div class="feed-container">
    <div class="new-post">
      <textarea id="postInput" placeholder="What's on your mind?"></textarea>
      <input type="file" id="postFile">
      <button id="postBtn">Post</button>
    </div>

    <div id="postsContainer"></div>
  </div>

  <script type="module" src="feed.js"></script>
</body>
</html>
