<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Feed</title>
<link rel="stylesheet" href="profile.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
</head>
<body class="default-theme">

<div class="navbar">
  <button id="navFeed">Feed</button>
  <button id="navProfile">Profile</button>
  <button id="navMessages">Messages</button>
  <button id="navLogout">Logout</button>
</div>

<div class="profile-main">
  <div id="postsContainer"></div>
  <textarea id="newPostInput" placeholder="What's on your mind?"></textarea>
  <button id="postBtn">Post</button>
</div>

<script src="feed.js"></script>
</body>
</html>
