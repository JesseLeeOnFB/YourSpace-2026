<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Feed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <button id="homeBtn" type="button">Home</button>
  <button id="profileBtn" type="button">Profile</button>
  <button id="logoutBtn" type="button">Logout</button>
</nav>

<h1>YourSpace Feed</h1>

<div id="postContainer">
  <textarea id="postText" placeholder="What's on your mind?" rows="3"></textarea>
  <input type="file" id="postImageInput" accept="image/*,video/*">
  <img id="imagePreview" style="display:none; max-width:200px; margin-top:10px;">
  <video id="videoPreview" style="display:none; max-width:300px; margin-top:10px;" controls></video>
  <button id="postBtn" type="button">Post</button>
</div>

<div id="notificationContainer" style="margin-top:15px;">
  <label>
    <input type="checkbox" id="emailNotify"> Email notifications
  </label>
  <label>
    <input type="checkbox" id="browserNotify"> Browser notifications
  </label>
</div>

<div id="postsContainer"></div>

<script type="module" src="feed.js"></script>
</body>
</html>
