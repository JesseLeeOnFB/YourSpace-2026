<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Feed</title>
<link rel="stylesheet" href="profile.css">
<script type="module" src="firebase-init.js"></script>
<script type="module" src="feed.js" defer></script>
</head>
<body class="default-theme">
  <!-- NAVIGATION -->
  <div class="navbar">
    <button id="navFeedBtn">Feed</button>
    <button id="navProfileBtn">Profile</button>
    <button id="navMessagesBtn">Messages</button>
    <button id="navSettingsBtn">Settings</button>
  </div>

  <!-- FEED MAIN -->
  <div class="feed-main">
    <div id="feedPostInputBox">
      <textarea id="newPostInput" placeholder="What's on your mind?"></textarea>
      <button id="postButton">Post</button>
    </div>

    <div id="feedPostsContainer">
      <!-- Posts will load here -->
    </div>
  </div>
</body>
</html>
