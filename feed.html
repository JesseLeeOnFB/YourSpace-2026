<!-- feed.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace - Global Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav>
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- New Post -->
  <section id="createPost">
    <input type="text" id="postText" placeholder="Write something...">
    <button id="postBtn">Post</button>
  </section>

  <!-- Feed -->
  <section id="postsContainer">
    <!-- Posts will be dynamically added here -->
  </section>

  <!-- Trending Post -->
  <section>
    <h2>Trending Post (hourly)</h2>
    <div id="trendingPost"></div>
  </section>

  <script type="module" src="feed.js"></script>
</body>
</html>
