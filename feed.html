<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav>
      <button id="homeBtn">Home</button>
      <button id="profileBtn">Profile</button>
      <button id="logoutBtn">Logout</button>
    </nav>

    <h2>Global Feed</h2>

    <div class="post-section">
      <input type="text" id="postTitle" placeholder="Post Title">
      <textarea id="postContent" placeholder="Write something..."></textarea>
      <input type="text" id="postImageUrl" placeholder="Image URL (optional)">
      <button id="publishPostBtn">Publish</button>
    </div>

    <h3>Trending Post (hourly)</h3>
    <div id="trendingPost"></div>

    <div id="feedPostsContainer"></div>
  </div>

  <script type="module" src="feed.js"></script>
</body>
</html>
