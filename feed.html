<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Feed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav>
  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>YourSpace Feed</h1>

<!-- Create Post -->
<div id="postContainer">
  <textarea id="postText" placeholder="What's on your mind?"></textarea>
  <input type="file" id="postImageInput" accept="image/*">
  <img id="imagePreview" style="display:none; max-width:200px; margin-top:10px;">
  <button id="postBtn">Post</button>
</div>

<!-- Posts Feed -->
<div id="postsContainer"></div>

<!-- At the very bottom of feed.html -->
<script type="module" src="feed.js" defer></script>
</body>
</html>
