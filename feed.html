<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav>
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Post Creation Section -->
  <section id="createPost">
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <input type="file" id="postFileInput" accept="image/*,video/*">
    <div id="filePreview" style="display:none;"></div>
    <div id="notificationOptions">
      <label><input type="checkbox" id="emailNotify"> Email Notifications</label>
      <label><input type="checkbox" id="browserNotify"> Browser Notifications</label>
    </div>
    <button id="postBtn">Post</button>
  </section>

  <!-- Feed -->
  <section id="feed">
    <div id="postsContainer"></div>
  </section>

  <!-- Firebase & Feed JS -->
  <script type="module" src="feed.js"></script>
</body>
</html>
