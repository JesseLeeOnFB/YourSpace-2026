<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace 2026</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="index.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>YourSpace 2026</h1>
    <div id="auth-container">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button id="signupBtn">Sign Up</button>
      <button id="loginBtn">Log In</button>
    </div>
    <div id="welcome-container" style="display:none;">
      <h2>Welcome, <span id="usernameDisplay"></span>!</h2>
      <nav>
        <button id="goProfile">Profile</button>
        <button id="goFeed">Global Feed</button>
        <button id="logoutBtn">Log Out</button>
      </nav>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHMbxr7rJS88ZefVJzt8p_9CCTstLmLU8",
      authDomain: "yourspace-2026.firebaseapp.com",
      projectId: "yourspace-2026",
      storageBucket: "yourspace-2026.firebasestorage.app",
      messagingSenderId: "72667267302",
      appId: "1:72667267302:web:2bed5f543e05d49ca8fb27",
      measurementId: "G-FZ4GFXWGSS"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    // DOM elements
    const signupBtn = document.getElementById("signupBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const authContainer = document.getElementById("auth-container");
    const welcomeContainer = document.getElementById("welcome-container");
    const usernameDisplay = document.getElementById("usernameDisplay");
    const goProfile = document.getElementById("goProfile");
    const goFeed = document.getElementById("goFeed");

    // Sign Up
    signupBtn.addEventListener("click", async () => {
      const email = emailInput.value;
      const password = passwordInput.value;
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const uid = userCredential.user.uid;
        await setDoc(doc(db, "users", uid), { username: email, bio: "", music: "", theme: "", background: "" });
      } catch (err) { alert(err.message); }
    });

    // Log In
    loginBtn.addEventListener("click", async () => {
      const email = emailInput.value;
      const password = passwordInput.value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) { alert(err.message); }
    });

    // Log Out
    logoutBtn.addEventListener("click", () => signOut(auth));

    // Navigation
    goProfile.addEventListener("click", () => location.href = "profile.html");
    goFeed.addEventListener("click", () => location.href = "feed.html");

    // Auth state
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authContainer.style.display = "none";
        welcomeContainer.style.display = "block";
        const docSnap = await getDoc(doc(db, "users", user.uid));
        usernameDisplay.textContent = docSnap.exists() ? docSnap.data().username : user.email;
      } else {
        authContainer.style.display = "block";
        welcomeContainer.style.display = "none";
      }
    });
  </script>
</body>
</html>
