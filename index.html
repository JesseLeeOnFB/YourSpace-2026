<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yourspace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4f46e5;
    }

    .hidden {
      display: none;
    }

    .post {
      background: #020617;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Yourspace</h1>

  <!-- AUTH -->
  <div id="authSection">
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Log In</button>
  </div>

  <!-- APP -->
  <div id="appSection" class="hidden">
    <p>Welcome, <span id="userEmail"></span></p>
    <button id="logoutBtn">Log Out</button>

    <h3>Create a Post</h3>
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <button id="postBtn">Create Post</button>

    <h3>Public Feed</h3>
    <div id="feed"></div>
  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
