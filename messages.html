<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Messages</title>
  <link rel="stylesheet" href="messages.css">
</head>
<body>
  <nav>
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main>
    <h1>Private Messages</h1>

    <div id="conversationsContainer">
      <h2>Your Conversations</h2>
      <ul id="conversationList"></ul>
    </div>

    <div id="chatContainer" style="display:none;">
      <h2 id="chatWith"></h2>
      <div id="messagesContainer"></div>
      <input type="text" id="messageInput" placeholder="Type a message">
      <input type="file" id="attachmentInput">
      <button id="sendBtn">Send</button>
      <button id="backBtn">Back to Conversations</button>
    </div>
  </main>

  <script type="module" src="messages.js"></script>
</body>
</html>
