<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace - Messages</title>
<link rel="stylesheet" href="messages.css">
</head>
<body>
  <nav class="navbar">
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div class="messages-page">
    <div id="conversationsContainer" class="conversations-list">
      <h2>Conversations</h2>
      <div id="conversationsList"></div>
    </div>

    <div id="chatContainer" class="chat-box" style="display:none;">
      <h2 id="chatWith">Chat</h2>
      <div id="messagesContainer" class="messages-container"></div>
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <input type="file" id="messageFileInput" />
      <button id="sendMessageBtn">Send</button>
      <button id="backToConversations">Back</button>
    </div>
  </div>

  <script type="module" src="messages.js"></script>
</body>
</html>
