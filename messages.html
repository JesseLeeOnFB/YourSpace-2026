<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace - Messages</title>
<link rel="stylesheet" href="messages.css">
</head>
<body>
  <nav>
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main>
    <div id="conversationsList" class="sidebar">
      <h2>Conversations</h2>
      <div id="convItems"></div>
      <input type="text" id="newConvInput" placeholder="Start a conversation by username">
      <button id="newConvBtn">New</button>
    </div>

    <div id="chatArea">
      <h2 id="chatWith">Select a conversation</h2>
      <div id="messagesContainer"></div>
      <div id="messageInputArea">
        <input type="text" id="messageInput" placeholder="Type your message...">
        <input type="file" id="messageFileInput">
        <button id="sendMessageBtn">Send</button>
      </div>
    </div>
  </main>

<script type="module" src="messages.js"></script>
</body>
</html>
