<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Messages</title>
  <link rel="stylesheet" href="messages.css">
</head>
<body>
  <nav id="topNav">
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main>
    <section id="searchUserSection">
      <input type="text" id="searchUserInput" placeholder="Search user by username">
      <div id="searchResults"></div>
    </section>

    <section id="chatSection" style="display:none;">
      <div id="chatHeader"></div>
      <div id="chatMessages"></div>
      <input type="text" id="chatInput" placeholder="Type a message">
      <input type="file" id="chatFile" accept="image/*,video/*">
      <button id="sendBtn">Send</button>
    </section>
  </main>

  <script type="module" src="messages.js"></script>
</body>
</html>
