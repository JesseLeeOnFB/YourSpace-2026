<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Messages</title>
  <link rel="stylesheet" href="messages.css">
</head>
<body>
  <nav>
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="navLogout">Logout</button>
  </nav>

  <div class="messages-container">
    <div class="user-search">
      <input type="text" id="searchUserInput" placeholder="Search users">
      <div id="searchResults"></div>
    </div>

    <div class="chat-section">
      <h3 id="chatHeader">Select a user to chat</h3>
      <div id="chatMessages"></div>
      <input type="text" id="chatInput" placeholder="Type a message">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script type="module" src="messages.js"></script>
</body>
</html>
