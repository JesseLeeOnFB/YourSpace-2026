<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace - Messages</title>
<link rel="stylesheet" href="profile.css">
</head>
<body class="theme-dark">

<nav>
  <button id="feedNavBtn">Feed</button>
  <button id="profileNavBtn">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Private Messages</h1>

<div id="conversationsContainer"></div>

<div id="messageSection" style="display:none;">
  <h2 id="chatWith"></h2>
  <div id="messagesContainer" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:5px; margin-bottom:10px;"></div>
  <textarea id="messageInput" placeholder="Type a message..." rows="2" style="width:100%;"></textarea>
  <input type="file" id="messageFileInput">
  <button id="sendMessageBtn">Send</button>
  <button id="backToConversationsBtn">Back</button>
</div>

<script type="module" src="messages.js"></script>
</body>
</html>
