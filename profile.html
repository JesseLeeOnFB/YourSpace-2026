<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>

  <nav class="profile-nav">
    <button onclick="location.href='feed.html'">Feed</button>
    <button onclick="location.href='profile.html'">Profile</button>
    <button onclick="location.href='settings.html'">Settings</button>
  </nav>

  <div class="profile-container">

    <div class="profile-header">
      <div class="pfp-wrapper">
        <img id="profilePfp" src="default-pfp.png" alt="Profile Picture">
      </div>

      <input type="file" id="profilePfpInput" accept="image/*">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
    </div>

    <div class="profile-info">
      <label>Username</label>
      <input id="usernameInput" type="text">

      <label>Bio</label>
      <textarea id="bioInput"></textarea>

      <label>Location</label>
      <input id="locationInput" type="text">

      <button id="saveProfileBtn">Save Profile</button>
    </div>

    <hr>

    <h2>Wall</h2>
    <div class="wall-input">
      <input id="wallCommentInput" type="text" placeholder="Write on your wall">
      <button id="addWallCommentBtn">Post</button>
    </div>

    <div id="wallCommentsContainer"></div>

    <hr>

    <h2>Top 10 Friends</h2>
    <div id="top10FriendsContainer"></div>

  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
