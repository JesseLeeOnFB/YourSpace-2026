<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>

<!-- NAVIGATION -->
<nav class="top-nav">
  <button id="navFeed">Feed</button>
  <button id="navProfile">Profile</button>
  <button id="navNotifications">Notifications</button>
  <button id="navMessages">Messages</button>
</nav>

<!-- MAIN CONTAINER -->
<div class="profile-container">

  <!-- PROFILE SECTION -->
  <section class="profile-section">
    <div class="pfp-container">
      <img id="profilePfp" src="placeholder.png" alt="Profile Picture">
      <input type="file" id="profilePfpInput" accept="image/*">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
    </div>

    <div class="info-container">
      <label>Username:</label>
      <input type="text" id="usernameInput" placeholder="Username">

      <label>Bio:</label>
      <textarea id="bioInput" placeholder="Write something about yourself..."></textarea>

      <label>Location:</label>
      <input type="text" id="locationInput" placeholder="Location">

      <button id="saveProfileBtn">Save Profile Info</button>
    </div>
  </section>

  <!-- TOP 10 FRIENDS -->
  <section class="top10-section">
    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer" class="friends-container"></div>
    <button id="editTop10Btn">Edit Top 10 Friends</button>
  </section>

  <!-- WALL COMMENTS -->
  <section class="wall-section">
    <h3>Wall Comments</h3>
    <div id="wallCommentsContainer" class="wall-container"></div>
    <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
    <button id="addWallCommentBtn">Post Comment</button>
  </section>

  <!-- MUSIC PLAYER -->
  <section class="music-section">
    <h3>Music Player</h3>
    <input type="text" id="musicLinkInput" placeholder="Paste YouTube/SoundCloud/Spotify link">
    <button id="loadMusicBtn">Load Music</button>
    <div id="musicPlayerContainer"></div>
  </section>

  <!-- THEME / CUSTOM HTML -->
  <section class="theme-section">
    <h3>Theme & Custom HTML</h3>
    <select id="themeSelector">
      <option value="default">Default</option>
      <option value="red">Red</option>
      <option value="blue">Blue</option>
      <option value="green">Green</option>
      <option value="gradient">Gradient</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>

    <label>Custom HTML Background:</label>
    <textarea id="customHtmlInput" placeholder="Paste HTML code here..."></textarea>
    <button id="saveCustomHtmlBtn">Save Custom HTML</button>
  </section>

</div>

<script src="profile.js"></script>
</body>
</html>
