<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Info -->
  <section class="profileSection">
    <h2>Profile Info</h2>

    <div class="profilePhotoSection">
      <img id="profilePhotoPreview" src="" alt="Profile Photo" class="profilePhoto">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Profile Photo</button>
    </div>

    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <div class="friendsSection">
      <h3>Top 10 Friends</h3>
      <div id="topFriendsContainer"></div>
    </div>
  </section>

  <!-- Customization Section -->
  <section class="customizationSection">
    <h2>Profile Customization</h2>
    <label>Background Image URL:</label>
    <input type="text" id="bgImageInput" placeholder="Paste image URL">
    
    <label>Background Color:</label>
    <input type="color" id="bgColorInput">

    <label>Theme:</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>

    <button id="saveCustomizationBtn">Save Customization</button>
  </section>

  <!-- Embedded Music Player -->
  <section class="musicPlayerSection">
    <h2>Music Player</h2>
    <audio id="musicPlayer" controls>
      Your browser does not support the audio element.
    </audio>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
