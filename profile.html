<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script type="module" src="profile.js" defer></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <button id="feedBtn">Feed</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="profile-container">

    <!-- Profile Info -->
    <section class="profile-info">
      <div class="profile-pfp-frame">
        <img id="profilePfp" src="default-profile.png" alt="Profile Picture">
      </div>
      <input type="file" id="profilePfpInput" accept="image/*">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>

      <div class="profile-details">
        <label>Username</label>
        <input type="text" id="usernameInput">
        <label>Bio</label>
        <textarea id="bioInput"></textarea>
        <label>Location</label>
        <input type="text" id="locationInput">
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </section>

    <!-- Wall Comments -->
    <section class="wall-section">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer" class="wall-comments-container"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Post Comment</button>
    </section>

    <!-- Top 10 Friends -->
    <section class="top-friends-section">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer" class="top-friends-container"></div>

      <div class="add-friend-section">
        <input type="text" id="addFriendInput" placeholder="Search username...">
        <div id="addFriendPreview" class="add-friend-preview"></div>
        <button id="addFriendBtn">Add Friend</button>
      </div>
    </section>

    <!-- Music Player -->
    <section class="music-section">
      <h2>Profile Music</h2>
      <input type="text" id="profileMusicInput" placeholder="Enter YouTube link or audio URL">
      <button id="saveProfileMusicBtn">Save & Play</button>
      <div id="musicPlayerContainer"></div>
    </section>

  </main>
</body>
</html>
