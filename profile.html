<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

<nav class="navbar">
  <button id="homeBtn">Home</button>
  <button id="logoutBtn">Logout</button>
</nav>

<main class="profileContainer">

  <!-- PROFILE HEADER -->
  <section class="profileHeader">
    <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Photo">
    <input type="file" id="profilePhotoInput" accept="image/*">
    <button id="savePhotoBtn">Save Profile Photo</button>
  </section>

  <!-- PROFILE INFO -->
  <section class="profileInfo">
    <input id="usernameInput" placeholder="Username">
    <input id="locationInput" placeholder="Location">
    <textarea id="bioInput" placeholder="Bio"></textarea>
    <input id="musicInput" placeholder="YouTube Music URL">
    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <!-- MUSIC PLAYER -->
  <section class="musicSection">
    <h3>Music</h3>
    <iframe id="musicPlayer" frameborder="0" allow="autoplay"></iframe>
  </section>

  <!-- TOP FRIENDS -->
  <section class="friendsSection">
    <h3>Top 10 Friends</h3>
    <div id="topFriendsList"></div>
  </section>

  <!-- THEMES -->
  <section class="customizationSection">
    <h3>Theme</h3>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>
  </section>

  <!-- CUSTOM HTML -->
  <section class="customHTMLSection">
    <h3>MySpace Custom HTML</h3>
    <textarea id="customHTMLInput" rows="6"
      placeholder="Paste HTML/CSS here (advanced users)"></textarea>
    <button id="saveHTMLBtn">Save Custom Code</button>
  </section>

  <section class="customRenderSection">
    <div id="customProfileContent"></div>
  </section>

</main>

<script type="module" src="profile.js"></script>
</body>
</html>
