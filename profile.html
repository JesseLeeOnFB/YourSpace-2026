<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
</head>
<body class="default-theme">

<div class="navbar">
  <button id="navFeed">Feed</button>
  <button id="navProfile">Profile</button>
  <button id="navMessages">Messages</button>
  <button id="navLogout">Logout</button>
</div>

<div class="profile-main">
  <div class="profile-top">
    <div class="pfp-container">
      <img id="profilePfp" src="" alt="Profile Picture">
      <input type="file" id="profilePfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>
    </div>

    <div class="profile-info-box">
      <input id="usernameInput" placeholder="Username">
      <textarea id="bioInput" placeholder="Bio"></textarea>
      <input id="locationInput" placeholder="Location">
      <button id="saveProfileBtn">Save Profile Info</button>
      <select id="themeSelect">
        <option value="default-theme">Default</option>
        <option value="red-theme">Red</option>
        <option value="blue-theme">Blue</option>
        <option value="green-theme">Green</option>
        <option value="neon-theme">Neon</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>
  </div>

  <div class="wall-container">
    <h3>Wall Comments</h3>
    <div id="wallComments"></div>
    <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
    <button id="postWallCommentBtn">Post Comment</button>
  </div>

  <div class="top10-container">
    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer"></div>
    <button id="editTop10Btn">Save Top 10</button>
  </div>

  <div class="music-player">
    <h3>Music Player</h3>
    <input id="musicLinkInput" placeholder="YouTube/SoundCloud/Pandora/Spotify link">
    <button id="saveMusicBtn">Play Music</button>
    <iframe id="musicIframe"></iframe>
  </div>

  <div class="theme-custom-box">
    <h3>Custom HTML / Themes</h3>
    <textarea id="customHtmlInput" placeholder="Add your HTML, CSS, animations here..."></textarea>
    <button id="saveCustomHtmlBtn">Save Custom HTML</button>
    <div id="customHtmlContainer"></div>
  </div>
</div>

<script src="profile.js"></script>
</body>
</html>
