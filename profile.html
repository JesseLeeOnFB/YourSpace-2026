<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="firebase_config.js"></script> <!-- Your Firebase config -->
</head>
<body>
  <header>
    <h1>YourSpace</h1>
    <nav>
      <button id="feedNavBtn">Feed</button>
      <button id="profileNavBtn">Profile</button>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main>
    <section class="profile-section">
      <div class="profile-pfp-container">
        <img id="profilePfp" src="default_profile.png" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>

      <div class="profile-info">
        <label>Username:</label>
        <input id="usernameInput" type="text">
        <label>Bio:</label>
        <textarea id="bioInput"></textarea>
        <label>Location:</label>
        <input id="locationInput" type="text">
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </section>

    <section class="wall-section">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer" class="wall-comments"></div>
      <input id="wallCommentInput" type="text" placeholder="Write a comment...">
      <button id="addWallCommentBtn">Post Comment</button>
    </section>

    <section class="friends-section">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer" class="top-friends-container"></div>

      <h3>Add Friend</h3>
      <input id="addFriendInput" type="text" placeholder="Enter username">
      <button id="addFriendBtn">Add Friend</button>
      <div id="friendPreviewContainer" class="friend-preview"></div>
    </section>
  </main>

  <script src="profile.js"></script>
</body>
</html>
