<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <nav>
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="navLogout">Logout</button>
  </nav>

  <div class="profile-container">
    <div class="profile-left">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <input type="file" id="pfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>

      <h2 id="profileName">YourSpace User</h2>
      <textarea id="bioInput" placeholder="Write your bio..."></textarea>
      <button id="saveBioBtn">Save Bio</button>

      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>
    </div>

    <div class="profile-right">
      <div class="wall-section">
        <h3>Wall Comments</h3>
        <textarea id="wallInput" placeholder="Write a comment..."></textarea>
        <button id="postWallBtn">Post</button>
        <div id="wallContainer"></div>
      </div>

      <div class="top10-section">
        <h3>Top 10 Friends</h3>
        <div id="top10Container"></div>
      </div>

      <div class="music-section">
        <h3>Music Player</h3>
        <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify link">
        <button id="addMusicBtn">Add Song</button>
        <div id="musicPlayer"></div>
        <div id="musicPlaylist"></div>
      </div>
    </div>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
