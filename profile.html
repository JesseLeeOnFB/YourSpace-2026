<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>My Profile</h2>
    
    <!-- Profile Photo -->
    <div class="profilePhotoContainer">
      <img id="profilePhoto" src="" alt="Profile Photo" class="profilePhoto">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="savePhotoBtn">Save Photo</button>
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <!-- Top 10 Friends -->
    <div class="friendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
      <input type="text" id="friendSearchInput" placeholder="Search friends by username">
      <button id="addFriendBtn">Add Friend</button>
    </div>

    <!-- Embedded Music Player -->
    <div class="musicPlayerSection">
      <h3>Music Player</h3>
      <audio id="musicPlayer" controls src=""></audio>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
