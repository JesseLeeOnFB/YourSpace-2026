<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="profileMain">

    <!-- PROFILE PICTURE -->
    <section class="profileSection">
      <h2>Your Profile</h2>
      <img id="profilePhoto" class="profilePhoto" src="default-pfp.png" alt="Profile Photo">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Profile Photo</button>
    </section>

    <!-- BIO, LOCATION, MUSIC -->
    <section class="profileSection">
      <h3>Profile Info</h3>
      <label for="bioInput">Bio:</label>
      <textarea id="bioInput" rows="3"></textarea>

      <label for="locationInput">Location:</label>
      <input type="text" id="locationInput">

      <label for="musicInput">Music (YouTube link):</label>
      <input type="text" id="musicInput">
      <button id="saveMusicBtn">Save Music</button>

      <button id="saveProfileBtn">Save Profile Info</button>
    </section>

    <!-- TOP FRIENDS -->
    <section class="profileSection">
      <h3>Top 10 Friends</h3>
      <input type="text" id="topFriendsInput" placeholder="Enter friend username">
      <button id="saveTopFriendsBtn">Save Top Friends</button>
      <ul id="topFriendsList"></ul>
    </section>

    <!-- SEARCH USERS -->
    <section class="profileSection">
      <h3>Search Users</h3>
      <input type="text" id="searchUserInput" placeholder="Search by username">
      <button id="searchUserBtn">Search</button>
      <ul id="searchResults"></ul>
    </section>

  </main>

  <!-- MUSIC PLAYER -->
  <section class="musicPlayerSection">
    <h3>Music Player</h3>
    <iframe id="musicPlayer" width="300" height="80" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
