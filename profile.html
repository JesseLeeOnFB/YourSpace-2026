<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="default">

<nav class="navbar">
  <button id="homeBtn">Home</button>
  <button id="logoutBtn">Logout</button>
</nav>

<section class="profileSection">
  <h2>Your Profile</h2>

  <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Photo">

  <input type="file" id="profilePhotoInput" accept="image/*">
  <button id="savePhotoBtn">Save Profile Photo</button>

  <input id="usernameInput" placeholder="Username">
  <input id="locationInput" placeholder="Location">
  <textarea id="bioInput" placeholder="Bio"></textarea>
  <input id="musicInput" placeholder="YouTube Music URL">

  <button id="saveProfileBtn">Save Profile</button>
</section>

<section class="customizationSection">
  <h3>Theme</h3>
  <select id="themeSelect">
    <option value="default">Default</option>
    <option value="dark">Dark</option>
    <option value="neon">Neon</option>
    <option value="animated">Animated</option>
  </select>
  <button id="saveThemeBtn">Save Theme</button>
</section>

<section class="friendsSection">
  <h3>Find Friends</h3>
  <input id="friendSearchInput" placeholder="Search username">
  <button id="searchFriendBtn">Search</button>
  <div id="searchResults"></div>
</section>

<section class="topFriendsSection">
  <h3>Top 10 Friends</h3>
  <ul id="topFriendsList"></ul>
</section>

<section class="userPostsSection">
  <h3>Your Posts</h3>
  <div id="userPosts"></div>
</section>

<script type="module" src="profile.js"></script>
</body>
</html>
