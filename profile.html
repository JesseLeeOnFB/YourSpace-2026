<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="default">

<nav class="navbar">
  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<section class="profile-section">
  <h2>Your Profile</h2>
  <img id="profilePic" src="" alt="Profile Picture" class="profile-pic">
  <input type="file" id="profilePicInput" accept="image/*">
  <button id="saveProfilePic">Save Profile Picture</button>
  
  <input type="text" id="bioInput" placeholder="Bio">
  <input type="text" id="locationInput" placeholder="Location">
  <button id="saveProfileInfo">Save Profile Info</button>
  
  <h3>Top Friends</h3>
  <div id="topFriendsContainer"></div>
  <input type="text" id="topFriendInput" placeholder="Add Top Friend">
  <button id="saveTopFriends">Save Top Friends</button>

  <h3>Music</h3>
  <input type="text" id="musicInput" placeholder="Paste YouTube/SoundCloud/Spotify link">
  <button id="saveMusic">Save Music</button>
  <div id="musicPlayer"></div>
</section>

<script type="module">
  import { auth, onAuthStateChanged } from './firebase.js';
  onAuthStateChanged(auth, user => {
    if(!user) window.location.href='index.html';
  });
</script>
<script type="module" src="profile.js"></script>
</body>
</html>
