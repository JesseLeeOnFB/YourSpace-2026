<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAV BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- PROFILE PHOTO -->
    <img id="profilePhoto" src="" alt="Profile Photo" class="profilePhoto">
    <input type="file" id="profilePhotoInput">
    <button id="saveProfilePhotoBtn">Save Profile Photo</button>

    <!-- PROFILE INFO -->
    <div class="profileInputs">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <!-- THEME SELECT -->
    <div class="themeSection">
      <select id="themeSelect">
        <option value="">Select Theme</option>
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- TOP FRIENDS -->
    <div class="topFriendsSection">
      <input type="text" id="topFriendInput" placeholder="Add top friend by username">
      <button id="addTopFriendBtn">Add Top Friend</button>
      <div id="topFriendsList" class="topFriendsList"></div>
    </div>

    <!-- FRIEND SEARCH SECTION (Step 1) -->
    <div class="friendSearchSection">
      <h3>Search Users</h3>
      <input type="text" id="friendSearchInput" placeholder="Enter username to search">
      <button id="friendSearchBtn">Search</button>
      <div id="friendSearchResults"></div>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="musicPlayerSection">
      <iframe id="musicPlayer" src="" allow="autoplay" width="300" height="80"></iframe>
    </div>
    
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
