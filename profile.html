<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
<div id="profilePage">

  <!-- NAVIGATION -->
  <nav id="topnav">
    <ul>
      <li><a href="#" id="feedNavBtn">Feed</a></li>
      <li><a href="#" id="profileNavBtn">Profile</a></li>
      <li><button id="logoutBtn">Logout</button></li>
    </ul>
  </nav>

  <!-- HEADER / PROFILE INFO -->
  <div class="profile-header">
    <img id="pfp" src="default-avatar.png" alt="Profile Picture">
    <h2 id="usernameDisplay">Username</h2>
    <p id="bioDisplay">This is the bio.</p>
  </div>

  <!-- CUSTOM HTML / THEME INJECTOR -->
  <div class="custom-html-section">
    <h3>💻 Custom HTML / Theme</h3>
    <textarea id="customHtmlInput" placeholder="Paste HTML/CSS here"></textarea>
    <button id="applyCustomBtn">Apply</button>
    <button id="resetCustomBtn">Reset</button>
  </div>

  <!-- TOP 10 FRIENDS -->
  <div class="top10-container">
    <h3>⭐ Top 10 Friends</h3>
    <div id="top10FriendsContainer"></div>
  </div>

  <!-- WALL -->
  <div class="wall-section">
    <h3>📝 Wall</h3>
    <div id="wallPostsContainer"></div>
    <textarea id="wallInput" placeholder="Write on this wall"></textarea>
    <button id="postWallBtn">Post</button>
  </div>

  <!-- MUSIC PLAYER -->
  <div class="music-player">
    <h3>🎵 Profile Music</h3>
    <input type="text" id="musicLinkInput" placeholder="Paste YouTube, Spotify, or SoundCloud link">
    <button id="saveMusicBtn">Save Music</button>
    <button id="clearMusicBtn">Reset</button>
    <div id="musicEmbedContainer"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
