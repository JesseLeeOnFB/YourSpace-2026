<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourSpace – Profile</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body>

<header class="top-nav">
  <button onclick="window.location.href='feed.html'">Feed</button>
  <button id="logoutBtn">Logout</button>
</header>

<main class="profile-container">

  <!-- PROFILE INFO -->
  <section class="profile-card">
    <div class="pfp-wrapper">
      <img id="profilePfp" src="default-avatar.png" />
      <input type="file" id="profilePfpInput" accept="image/*" />
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
    </div>

    <div class="profile-fields">
      <label>Username</label>
      <input id="usernameInput" />

      <label>Bio</label>
      <textarea id="bioInput"></textarea>

      <label>Location</label>
      <input id="locationInput" />

      <button id="saveProfileBtn">Save Profile</button>
    </div>
  </section>

  <!-- TOP FRIENDS -->
  <section class="card">
    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer"></div>
  </section>

  <!-- WALL -->
  <section class="card">
    <h3>Wall</h3>
    <div id="wallCommentsContainer"></div>
    <input id="wallCommentInput" placeholder="Write something..." />
    <button id="addWallCommentBtn">Post</button>
  </section>

  <!-- MUSIC -->
  <section class="card">
    <h3>Music</h3>
    <input id="musicInput" placeholder="YouTube link" />
    <button id="saveMusicBtn">Save & Play</button>
    <div id="musicPlayerContainer"></div>
  </section>

</main>

<script type="module" src="profile.js"></script>
</body>
</html>
