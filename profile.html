<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <button onclick="location.href='feed.html'">Global Feed</button>
    <button onclick="location.href='profile.html'">Profile</button>
    <button id="logoutBtn">Logout</button>
</nav>

<h2>My Profile</h2>

<div class="profile-section">
    <img id="profilePic" src="placeholder.png" alt="Profile Picture" width="100">
    <input type="file" id="photoUpload">
    <input type="text" id="bio" placeholder="Bio">
    <input type="text" id="location" placeholder="Location">
    <input type="text" id="musicUrl" placeholder="Music URL (Audio tag)">
    <textarea id="customHtml" placeholder="Optional HTML/CSS customization"></textarea>
    <button id="saveProfileBtn">Save Profile</button>
</div>

<h3>My Posts</h3>
<div id="myPostsContainer"></div>

<script type="module" src="profile.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
