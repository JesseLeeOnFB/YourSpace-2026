<!-- profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div class="profile-container">
    <img id="profilePhoto" class="profile-picture" src="default.png" alt="Profile Photo">

    <div class="profile-info">
      <h2 id="displayName">Your Name</h2>
      <p id="bio">Your bio here...</p>
      <p id="location">Location: </p>
      <p id="music">Music: </p>
    </div>

    <div>
      <label>Change Profile Photo:</label>
      <input type="file" id="photoUpload">
      <button id="saveProfileBtn">Save Profile</button>
    </div>
  </div>

  <div class="profile-posts" id="profilePosts">
    <h3>Your Posts</h3>
    <div id="postsContainer"></div>
  </div>

  <script type="module" src="profile.js?v=2"></script>
</body>
</html>
