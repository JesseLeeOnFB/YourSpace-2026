<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <h1>Your Profile</h1>

  <div id="profileContainer">
    <img id="profilePhoto" src="default.png" alt="Profile Photo" class="profile-photo">
    <input type="file" id="photoInput">
    
    <label>Display Name:</label>
    <input type="text" id="displayName" placeholder="Your name">

    <label>Bio:</label>
    <textarea id="bio" placeholder="Tell something about yourself"></textarea>

    <label>Location:</label>
    <input type="text" id="location" placeholder="City, State">

    <label>Music URL:</label>
    <input type="text" id="musicURL" placeholder="https://">

    <button id="saveProfileBtn">Save Profile</button>
  </div>

  <h2>Your Posts</h2>
  <div id="userPostsContainer" class="posts-container"></div>

  <script type="module" src="profile.js?v=2"></script>
</body>
</html>
