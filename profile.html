<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>

<header class="nav">
  <button onclick="location.href='feed.html'">Feed</button>
  <button onclick="location.href='profile.html'">My Profile</button>
  <button onclick="location.href='messages.html'">Messages</button>
</header>

<main class="profile-page">

  <section class="profile-header">
    <img id="profilePic" src="default-pfp.png">
    <input type="file" id="pfpInput">
    <button id="savePfpBtn">Save Profile Picture</button>

    <h2 id="usernameDisplay"></h2>
    <p id="bioDisplay"></p>

    <button id="pmBtn" style="display:none;">Send Message</button>
  </section>

  <section class="music-player">
    <h3>Music</h3>
    <input type="text" id="musicUrl" placeholder="Paste YouTube / Spotify / SoundCloud link">
    <button id="saveMusicBtn">Add Song</button>
    <div id="musicEmbed"></div>
  </section>

  <section class="top10">
    <h3>Top 10 Friends</h3>
    <div id="top10List"></div>
  </section>

  <section class="wall">
    <h3>Wall</h3>
    <textarea id="wallText" placeholder="Write something..."></textarea>
    <button id="postWallBtn">Post</button>
    <div id="wallComments"></div>
  </section>

</main>

<script type="module" src="profile.js"></script>
</body>
</html>
