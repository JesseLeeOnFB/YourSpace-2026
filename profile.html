<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YourSpace – Profile</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body>

<header class="top-nav">
  <button onclick="window.location.href='feed.html'">Feed</button>
  <button id="logoutBtn">Logout</button>
</header>

<main class="profile-container">

  <!-- PROFILE INFO -->
  <section class="profile-card">
    <div class="profile-pfp-wrapper">
      <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
    </div>

    <input type="file" id="profilePfpInput" accept="image/*">
    <button id="savePfpBtn">Save Profile Picture</button>

    <label>Username</label>
    <input type="text" id="usernameInput">

    <label>Bio</label>
    <textarea id="bioInput"></textarea>

    <label>Location</label>
    <input type="text" id="locationInput">

    <button id="saveProfileBtn">Save Profile Info</button>
  </section>

  <!-- TOP FRIENDS -->
  <section class="card">
    <h3>Top 10 Friends</h3>
    <div id="topFriendsContainer" class="top-friends-grid"></div>
  </section>

  <!-- ADD FRIEND -->
  <section class="card">
    <h3>Add Friend</h3>
    <input type="text" id="friendSearchInput" placeholder="Search username">
    <div id="friendSearchResults"></div>
  </section>

  <!-- WALL -->
  <section class="card">
    <h3>Wall</h3>
    <div id="commentContainer"></div>
    <input type="text" id="wallCommentInput" placeholder="Write a comment">
    <button id="postWallCommentBtn">Post</button>
  </section>

  <!-- MUSIC -->
  <section class="card">
    <h3>Music</h3>
    <input type="text" id="musicInput" placeholder="YouTube link">
    <button id="saveMusicBtn">Save & Play</button>
    <div id="musicPlayerContainer"></div>
  </section>

</main>

<script type="module" src="profile.js"></script>
</body>
</html>
