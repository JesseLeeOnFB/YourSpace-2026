<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAV -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="profile-container">

    <!-- PROFILE HEADER -->
    <section class="profile-header">
      <div class="profile-pic-wrapper">
        <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
        <input type="file" id="profilePicInput" accept="image/*">
      </div>

      <div class="profile-info">
        <input type="text" id="displayName" placeholder="Display Name">
        <textarea id="bio" placeholder="Bio"></textarea>
        <input type="text" id="location" placeholder="Location">
        <input type="text" id="music" placeholder="Music link">
        <button id="saveProfileBtn">Save Profile</button>
        <button id="saveMusicBtn">Save Music</button>
      </div>
    </section>

    <!-- TOP FRIENDS -->
    <section class="top-friends-section">
      <h3>Top Friends</h3>
      <div id="topFriendsContainer"></div>
      <input type="text" id="topFriendInput" placeholder="Add top friend by username">
      <button id="addTopFriendBtn">Add Top Friend</button>
    </section>

    <!-- WALL COMMENTS -->
    <section class="wall-comments-section">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="newComment" placeholder="Write a comment..."></textarea>
      <button id="postCommentBtn">Post Comment</button>
    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
