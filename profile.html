<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
</head>
<body>

  <div class="profile-container">
    <h1>My Profile</h1>

    <!-- Profile Picture -->
    <div class="profile-pfp-section">
      <img id="profilePfp" src="" alt="Profile Picture">
      <input type="file" id="profilePfpInput" accept="image/*">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
    </div>

    <!-- Profile Info -->
    <div class="profile-info-section">
      <label>Username: <input type="text" id="usernameInput"></label>
      <label>Bio: <textarea id="bioInput" rows="3"></textarea></label>
      <label>Location: <input type="text" id="locationInput"></label>
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <!-- Wall Comments -->
    <div class="wall-comments-section">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer" class="wall-comments-container"></div>
      <textarea id="wallCommentInput" rows="2" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Post Comment</button>
    </div>

    <!-- Friends -->
    <div class="friends-section">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer" class="friends-container"></div>

      <h2>Pending Friend Requests</h2>
      <div id="pendingFriendsContainer" class="friends-container"></div>

      <h2>Add Friend</h2>
      <input type="text" id="searchUserInput" placeholder="Enter username...">
      <div id="searchUserPreview"></div>
      <button id="sendFriendRequestBtn">Send Friend Request</button>
    </div>

  </div>

  <script src="profile.js"></script>
</body>
</html>
