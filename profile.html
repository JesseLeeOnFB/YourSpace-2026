<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profilePage">
    <h2>My Profile</h2>

    <!-- Profile Photo -->
    <img id="profileAvatar" class="profileAvatar" src="" alt="Profile Picture">
    <input type="file" id="profilePhotoInput" accept="image/*">
    
    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
    </div>

    <!-- Top 10 Friends Box -->
    <div class="friendsBox">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList">
        <!-- Friend list items go here -->
      </ul>
      <input type="text" id="addFriendInput" placeholder="Add friend by username">
      <button id="addFriendBtn">Add Friend</button>
    </div>

    <!-- Save Button -->
    <div class="profileActions">
      <button id="saveProfileBtn">Save Profile</button>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
