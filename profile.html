<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Your Profile</h1>

  <div id="profileDiv">
    <input type="text" id="username" placeholder="Username">
    <textarea id="bio" placeholder="Bio"></textarea>
    <input type="text" id="location" placeholder="Location">
    <input type="text" id="themeColor" placeholder="Theme Color (#hex)">
    <input type="text" id="musicUrl" placeholder="Music URL (embed link)">
    <input type="file" id="profileImage" accept="image/*">
    <button id="saveProfileBtn">Save Profile</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <h2>Create a Post</h2>
  <textarea id="postContent" placeholder="Write something..."></textarea>
  <input type="text" id="postImageUrl" placeholder="Image URL">
  <button id="createPostBtn">Post</button>

  <h2>Your Posts</h2>
  <div id="userPosts"></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
