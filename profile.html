<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <section class="profile-container">
    <div class="profile-header">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <div class="profile-info">
        <input type="file" id="profilePicInput" accept="image/*">
        <input type="text" id="usernameInput" placeholder="Username">
        <input type="text" id="locationInput" placeholder="Location">
      </div>
    </div>

    <textarea id="bioInput" placeholder="Your bio..." rows="3"></textarea>

    <h3>Top 10 Friends</h3>
    <div class="top-friends" id="topFriendsContainer">
      <!-- Friends added dynamically -->
    </div>
    <input type="text" id="addFriendInput" placeholder="Add friend username">
    <button id="addFriendBtn">Add Friend</button>

    <h3>Custom HTML / Embedded Music</h3>
    <textarea id="customHTMLInput" placeholder="Paste custom HTML or embed music here..." rows="5"></textarea>

    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
