<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profilePage">
    <h2>My Profile</h2>
    
    <!-- Profile Picture -->
    <img src="" id="profilePic" class="profilePic" alt="Profile Picture">
    <input type="file" id="profilePicInput" accept="image/*">

    <!-- Username / Bio / Location -->
    <label>Username</label>
    <input type="text" id="usernameInput" placeholder="Enter username">

    <label>Bio</label>
    <textarea id="bioInput" rows="3" placeholder="Write something about yourself"></textarea>

    <label>Location</label>
    <input type="text" id="locationInput" placeholder="Enter location">

    <!-- Embedded Music -->
    <label>Music URL (Spotify / YouTube / etc.)</label>
    <input type="text" id="musicInput" placeholder="Paste your embed link">

    <!-- Top 10 Friends -->
    <h3>Top 10 Friends</h3>
    <ul id="topFriendsList">
      <!-- Dynamically populated -->
    </ul>
    <input type="text" id="newFriendInput" placeholder="Add friend by username">
    <button id="addFriendBtn">Add Friend</button>

    <!-- Save Button -->
    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
