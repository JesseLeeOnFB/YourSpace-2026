<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">
  <!-- Navigation -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>Your Profile</h2>
    
    <!-- Profile Picture -->
    <div class="profilePhotoSection">
      <img id="profileImage" src="defaultProfile.png" class="profilePhoto">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL (YouTube etc.)">
    </div>

    <!-- Theme Selection -->
    <div class="themeSection">
      <label for="themeSelect">Select Theme:</label>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- Save Profile Info -->
    <button id="saveProfileBtn">Save Profile Info</button>
  </section>

  <!-- Top Friends Section -->
  <section class="topFriendsSection">
    <h2>Top Friends</h2>
    <div id="topFriendsContainer"></div>

    <div class="addFriendSection">
      <input type="text" id="addFriendInput" placeholder="Enter username to add">
      <button id="sendFriendRequestBtn">Send Friend Request</button>
    </div>
  </section>

  <!-- Friend Requests Section -->
  <section class="friendRequestsSection">
    <h2>Incoming Friend Requests</h2>
    <div id="friendRequestsContainer"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
