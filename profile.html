<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAV -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE HEADER -->
  <section class="profile-header">
    <div class="profile-pic-container">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <input type="file" id="profilePicInput" accept="image/*">
      <button id="saveProfilePicBtn">Save Profile Photo</button>
    </div>
    <div class="profile-info">
      <input type="text" id="displayName" placeholder="Display Name">
      <input type="text" id="bio" placeholder="Bio">
      <input type="text" id="location" placeholder="Location">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>
  </section>

  <!-- THEME SELECTOR -->
  <section class="theme-selector">
    <h3>Choose Theme:</h3>
    <select id="themeSelect">
      <option value="">Default</option>
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
      <option value="blue">Blue</option>
      <option value="red">Red</option>
      <option value="gradient">Gradient</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>
  </section>

  <!-- MUSIC PLAYER -->
  <section class="music-player">
    <h3>Music</h3>
    <input type="text" id="musicLink" placeholder="YouTube / Spotify / SoundCloud URL">
    <button id="saveMusicBtn">Save Music</button>
    <div id="musicContainer"></div>
  </section>

  <!-- TOP FRIENDS -->
  <section class="top-friends">
    <h3>Top Friends</h3>
    <div id="topFriendsContainer"></div>
    <input type="text" id="addTopFriendInput" placeholder="Add friend username">
    <button id="addTopFriendBtn">Add to Top Friends</button>
  </section>

  <!-- WALL / COMMENTS -->
  <section class="wall-comments">
    <h3>Friends Wall</h3>
    <div id="wallContainer"></div>
    <textarea id="wallCommentInput" placeholder="Leave a note on the wall"></textarea>
    <button id="postWallCommentBtn">Post Comment</button>
  </section>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
