<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="feedBtn">Feed</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePhotoWrapper">
      <img id="profilePicDisplay" src="" alt="Profile Picture" style="display:none; border-radius:50%; width:150px; height:150px; object-fit:cover;">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <label>Username</label>
      <input type="text" id="usernameInput" placeholder="Username">

      <label>Location</label>
      <input type="text" id="locationInput" placeholder="Location">

      <label>Bio</label>
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>

      <label>Music URL</label>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">

      <label>Top Friends (comma separated usernames)</label>
      <input type="text" id="topFriendsInput" placeholder="Top friends">
    </div>

    <!-- Theme Selector -->
    <div class="customizationSection">
      <label>Theme</label>
      <select id="themeSelect">
        <option value="">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
    </div>

    <!-- Save Profile Info -->
    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <!-- Music Player Section -->
  <section class="musicPlayerSection">
    <h3>Music Player</h3>
    <audio id="musicPlayer" controls style="width:100%;"></audio>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
