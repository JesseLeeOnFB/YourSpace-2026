<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="profile.css">
</head>

<body>
<header class="top-nav">
  <button id="feedBtn">Feed</button>
  <button id="logoutBtn">Logout</button>
</header>

<main class="profile-container">

  <section class="card">
    <div class="pfp-wrapper">
      <img id="profilePfp" src="default-avatar.png">
      <input type="file" id="profilePfpInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Profile Picture</button>
    </div>

    <label>Username</label>
    <input id="usernameInput">

    <label>Bio</label>
    <textarea id="bioInput"></textarea>

    <label>Location</label>
    <input id="locationInput">

    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <section class="card">
    <h3>Add Friend</h3>
    <input id="friendSearchInput" placeholder="Search username">
    <div id="friendPreviewContainer"></div>
  </section>

  <section class="card">
    <h3>Friend Requests</h3>
    <div id="incomingRequestsContainer"></div>
  </section>

  <section class="card">
    <h3>Wall</h3>
    <div id="commentContainer"></div>
    <input id="wallCommentInput" placeholder="Write a comment">
    <button id="postWallCommentBtn">Post</button>
  </section>

</main>

<script type="module" src="profile.js"></script>
</body>
</html>
