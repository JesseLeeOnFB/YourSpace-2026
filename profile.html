<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace - Profile</title>
<link rel="stylesheet" href="profile.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="profile.js" defer></script>
</head>
<body class="default-theme">

<div class="navbar">
  <button id="navFeedBtn">Feed</button>
  <button id="navProfileBtn">Profile</button>
  <button id="navMessagesBtn">Messages</button>
  <button id="navNotificationsBtn">Notifications</button>
</div>

<main class="profile-main">

  <!-- Top Section: Profile Picture & Info -->
  <div class="profile-top">
    <div class="pfp-container">
      <img id="profilePfp" src="" alt="Profile Picture">
      <input type="file" id="profilePfpInput">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
    </div>

    <div class="profile-info-box">
      <input id="usernameInput" placeholder="Username">
      <textarea id="bioInput" placeholder="Bio"></textarea>
      <input id="locationInput" placeholder="Location">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>
  </div>

  <!-- Top 10 Friends Section -->
  <div class="top10-container">
    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer"></div>
    <button id="saveTop10Btn">Save Top 10 Ranking</button>
  </div>

  <!-- Comment Wall -->
  <div class="wall-container">
    <h3>Wall Comments</h3>
    <div id="wallCommentsContainer"></div>
    <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
    <button id="postWallCommentBtn">Post Comment</button>
  </div>

  <!-- Music Player -->
  <div class="music-player">
    <h3>Music Player</h3>
    <input id="musicInput" placeholder="Paste YouTube / SoundCloud / Spotify link">
    <button id="musicLoadBtn">Load Music</button>
    <iframe id="musicIframe" src="" allow="autoplay"></iframe>
  </div>

  <!-- Custom HTML / Themes -->
  <div class="theme-custom-box">
    <h3>Custom HTML / Theme</h3>
    <textarea id="customHtmlInput" placeholder="Paste custom HTML/CSS here"></textarea>
    <button id="applyCustomHtmlBtn">Apply</button>
    <div id="customHtmlContainer"></div>
  </div>

</main>

</body>
</html>
