<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body class="theme-dark">

<header>
  <h1 id="profileName">YourSpace User</h1>
</header>

<section class="profile-section">
  <div class="profile-left">
    <img id="profilePic" src="default-avatar.png" alt="Profile Picture" class="profile-pic">
    <input type="file" id="pfpInput">
    <button id="savePfpBtn">Save Profile Picture</button>

    <h3>Bio</h3>
    <p id="profileBio">This is the bio lol</p>
    <textarea id="bioInput" placeholder="Edit your bio"></textarea>
    <button id="saveBioBtn">Save Bio</button>

    <h3>Themes</h3>
    <select id="themeSelect">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="retro">Retro</option>
    </select>

    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer" class="top10-container"></div>

    <h3>Music Player</h3>
    <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify URL">
    <button id="addMusicBtn">Add Song</button>
    <div id="musicListContainer"></div>
    <div id="musicPlayerContainer"></div>
  </div>

  <div class="profile-right">
    <h3>Wall</h3>
    <textarea id="wallInput" placeholder="Write on the wall..."></textarea>
    <button id="postWallBtn">Post</button>
    <div id="wallContainer"></div>
  </div>
</section>

<script type="module" src="profile.js"></script>
</body>
</html>
