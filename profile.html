<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <h1>Your Profile</h1>

  <!-- Profile info -->
  <div id="profileInfo">
    <img id="profilePic" class="profile-picture" src="" alt="Profile Picture">
    <input type="file" id="photoInput">
    <input type="text" id="displayName" placeholder="Username">
    <input type="text" id="bio" placeholder="Bio">
    <input type="text" id="location" placeholder="Location">
    <input type="text" id="musicURL" placeholder="Music URL (YouTube/SoundCloud)">
    <button id="saveProfile">Save Profile</button>
  </div>

  <!-- Custom HTML / CSS for profile customization -->
  <h3>Custom Profile Code</h3>
  <textarea id="customCode" placeholder="Paste HTML/CSS here"></textarea>
  <button id="saveCustom">Save</button>
  <div id="customProfileDiv"></div>

  <!-- User's posts -->
  <h2>Your Posts</h2>
  <div id="userPostsContainer"></div>

<script type="module" src="profile.js?v=4"></script>
</body>
</html>
