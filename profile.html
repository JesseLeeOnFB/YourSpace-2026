<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="theme-light">

  <nav id="topNav">
    <ul>
      <li><button id="navFeed">Feed</button></li>
      <li><button id="navProfile">Profile</button></li>
      <li><button id="navMessages">Messages</button></li>
      <li><button id="logoutBtn">Logout</button></li>
    </ul>
  </nav>

  <div class="profile-container">
    <div class="profile-header">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <h2 id="profileName">YourSpace User</h2>
      <p id="profileBio">This is the bio lol</p>

      <input type="file" id="pfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>

      <textarea id="bioInput" placeholder="Edit your bio..."></textarea>
      <button id="saveBioBtn">Save Bio</button>

      <select id="themeSelect">
        <option value="theme-light">Light</option>
        <option value="theme-dark">Dark</option>
        <option value="theme-retro">Retro</option>
      </select>
    </div>

    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <ul id="top10List"></ul>
    </div>

    <div class="wall-container">
      <h3>Wall</h3>
      <textarea id="wallInput" placeholder="Write on the wall..."></textarea>
      <button id="postWallBtn">Post</button>
      <div id="wallContainer"></div>
    </div>

    <div class="music-container">
      <h3>Music Player</h3>
      <input type="text" id="musicInput" placeholder="Paste song URL here">
      <button id="addSongBtn">Add Song</button>
      <ul id="musicList"></ul>
      <iframe id="musicPlayer" width="100%" height="80" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
