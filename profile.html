<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE CARD -->
  <section class="profile card">
    <h2>Your Profile</h2>
    <div class="profilePicContainer">
      <img id="profilePic" src="" alt="Profile Picture" class="profilePic">
      <input type="file" id="profilePicInput" accept="image/*">
      <button id="saveProfilePicBtn">Save Profile Photo</button>
    </div>

    <div class="profileFields">
      <label>Display Name</label>
      <input type="text" id="displayName">
      
      <label>Bio</label>
      <textarea id="bio" rows="3"></textarea>

      <label>Location</label>
      <input type="text" id="location">

      <label>Music Player Link</label>
      <input type="text" id="musicLink">
      <button id="saveMusicBtn">Save Music</button>
      <div id="musicPlayerContainer"></div>

      <label>Top 10 Friends (Add username to box, separate by comma)</label>
      <input type="text" id="topFriends">
      <button id="saveTopFriendsBtn">Save Top Friends</button>
    </div>

    <button id="saveProfileBtn">Save Profile Info</button>
  </section>

  <!-- USER WALL / COMMENTS -->
  <section class="comments card">
    <h2>Your Wall</h2>
    <textarea id="commentInput" rows="2" placeholder="Leave a note on your wall"></textarea>
    <button id="postCommentBtn">Post Comment</button>
    <div id="commentsContainer"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
