<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profilePage">
    <div class="profileHeader">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <div class="profileInfo">
      <label>Username:</label>
      <input type="text" id="usernameInput" placeholder="Enter username">

      <label>Bio:</label>
      <textarea id="bioInput" placeholder="Write a short bio..." rows="3"></textarea>

      <label>Location:</label>
      <input type="text" id="locationInput" placeholder="City, Country">

      <label>Embedded Music (URL or Embed Code):</label>
      <textarea id="musicInput" placeholder="Paste your embedded music URL or code..." rows="2"></textarea>

      <button id="saveProfileBtn">Save Profile</button>
    </div>

    <!-- Top Friends Box -->
    <div class="topFriends">
      <h3>Top 10 Friends</h3>
      <div id="friendsContainer">
        <!-- Friends will be loaded here dynamically -->
      </div>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
