<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAV BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE INFO -->
  <section class="profileContainer">
    <h2>Profile</h2>
    <div class="profilePicSection">
      <img id="profilePicDisplay" src="" alt="Profile Picture" class="profilePic">
      <input type="file" id="savePfpBtn" accept="image/*">
    </div>

    <label>Bio:</label>
    <textarea id="bioInput" placeholder="Write something about yourself"></textarea>

    <label>Location:</label>
    <input type="text" id="locationInput" placeholder="City, Country">

    <label>Top Friends (comma separated):</label>
    <input type="text" id="topFriendsInput" placeholder="Add top 10 friends">

    <label>Music Player (YouTube, SoundCloud, Spotify links):</label>
    <input type="text" id="musicInput" placeholder="Paste music link here">
    <button id="saveMusicBtn">Save Music</button>

    <button id="saveProfileBtn">Save Profile Info</button>
  </section>

  <!-- WALL COMMENTS -->
  <section class="wallCommentsSection">
    <h3>Wall Comments</h3>
    <div id="wallCommentsContainer"></div>
    <textarea id="wallCommentInput" placeholder="Leave a comment"></textarea>
    <button id="postWallCommentBtn">Post Comment</button>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
