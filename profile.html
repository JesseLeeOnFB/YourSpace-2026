<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="feed.html">Home</a>
    <a href="profile.html">Profile</a>
    <button id="logoutBtn">Logout</button>
  </nav>

  <section id="profileSection">
    <h1 id="profileUsername">Username</h1>
    <img id="profilePic" src="placeholder.png" alt="Profile Picture" width="150"/>
    <input type="file" id="profileImageInput"/>
    <p>Bio:</p>
    <textarea id="bioInput" placeholder="Enter your bio"></textarea>
    <p>Location:</p>
    <input type="text" id="locationInput" placeholder="City, State"/>
    <p>Theme/Background HTML/CSS:</p>
    <textarea id="themeInput" placeholder="Custom HTML/CSS for your profile"></textarea>
    <p>Music URL (embedded player):</p>
    <input type="text" id="musicInput" placeholder="Paste link to audio file"/>
    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <section id="userPostsSection">
    <h2>Your Posts</h2>
    <div id="userPostsContainer"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
