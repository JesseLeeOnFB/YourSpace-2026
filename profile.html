<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - YourSpace 2026</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <h1>Profile</h1>
  <input type="text" id="displayName" placeholder="Username"/>
  <input type="text" id="bio" placeholder="Bio"/>
  <input type="text" id="location" placeholder="Location"/>
  <input type="file" id="photo" accept="image/*"/>
  <input type="text" id="theme" placeholder="Theme CSS or color"/>
  <input type="text" id="music" placeholder="Music URL (embed)"/>
  <button id="saveProfileBtn">Save Profile</button>

<script type="module" src="profile.js"></script>
</body>
</html>
