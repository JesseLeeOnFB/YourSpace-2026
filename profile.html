<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePicContainer">
      <img id="profilePicDisplay" src="" alt="Profile Picture">
      <input type="file" id="profilePicInput" accept="image/*">
      <button id="saveProfilePicBtn">Save Profile Picture</button>
    </div>

    <!-- User Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <!-- Theme Selection -->
    <div class="customizationSection">
      <h3>Theme</h3>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- Top Friends -->
    <div class="topFriendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
      <input type="text" id="addTopFriendInput" placeholder="Enter username to add">
      <button id="addTopFriendBtn">Add Top Friend</button>
    </div>

    <!-- Search & Add Friends -->
    <div class="friendSearchSection">
      <h3>Search Users</h3>
      <input type="text" id="searchUserInput" placeholder="Enter username">
      <button id="searchUserBtn">Search</button>
      <div id="searchResults"></div>
    </div>

  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
