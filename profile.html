<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body class="default-theme">
  <!-- NAVIGATION -->
  <div class="navbar">
    <button id="navFeedBtn">Feed</button>
    <button id="navProfileBtn">Profile</button>
    <button id="navMessagesBtn">Messages</button>
    <button id="navNotificationsBtn">Notifications</button>
  </div>

  <div class="profile-main">
    <!-- PROFILE TOP -->
    <div class="profile-top">
      <div class="pfp-container">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>

      <div class="profile-info-box">
        <input id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input id="locationInput" placeholder="Location">
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </div>

    <!-- THEME & CUSTOM HTML -->
    <div class="theme-custom-box">
      <select id="themeSelect">
        <option value="default-theme">Default</option>
        <option value="red-theme">Red</option>
        <option value="blue-theme">Blue</option>
        <option value="green-theme">Green</option>
        <option value="neon-theme">Neon</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
      <textarea id="customHtmlInput" placeholder="Custom HTML"></textarea>
      <button id="saveCustomHtmlBtn">Apply Custom HTML</button>
      <div id="customHtmlContainer"></div>
    </div>

    <!-- WALL COMMENTS -->
    <div class="wall-container">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Post Comment</button>
    </div>

    <!-- TOP 10 FRIENDS -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer" class="top10-list"></div>
      <button id="editTop10Btn">Edit Top 10</button>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="music-player">
      <input id="musicLinkInput" placeholder="Paste YouTube / SoundCloud / Spotify link">
      <button id="playMusicBtn">Play Music</button>
      <iframe id="musicIframe" src="" allow="autoplay"></iframe>
      <button id="pauseMusicBtn">Pause Music</button>
    </div>
  </div>

  <script src="profile.js?cb=<?=Date.now()?>"></script>
</body>
</html>
