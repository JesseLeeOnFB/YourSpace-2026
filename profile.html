<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePicContainer">
      <img id="profilePicPreview" src="" alt="Profile Picture">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <label>Username:
        <input type="text" id="usernameInput" placeholder="Enter username">
      </label>
      <label>Bio:
        <textarea id="bioInput" rows="3" placeholder="Write a short bio"></textarea>
      </label>
      <label>Location:
        <input type="text" id="locationInput" placeholder="Enter your location">
      </label>
    </div>

    <!-- Embedded Music -->
    <div class="embeddedMusic">
      <label>Embed Music URL:
        <input type="text" id="musicInput" placeholder="Paste a music link (Spotify, YouTube, etc.)">
      </label>
      <div id="musicPlayer"></div>
    </div>

    <!-- Top 10 Friends -->
    <div class="topFriends">
      <h3>Top 10 Friends</h3>
      <div id="friendsList">
        <!-- Friends entries will be dynamically loaded -->
      </div>
      <input type="text" id="addFriendInput" placeholder="Enter friend's username">
      <button id="addFriendBtn">Add Friend</button>
    </div>

    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
