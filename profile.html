<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Header -->
  <div id="profileHeader" class="container-box">
    <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
    <h1 id="profileName">YourSpace User</h1>
    <p id="profileBio">This is the bio lol</p>
    <input type="file" id="pfpInput" style="display:none;">
    <button id="savePfpBtn" style="display:none;">Save Profile Picture</button>
    <textarea id="bioInput" placeholder="Update your bio" style="display:none;"></textarea>
    <button id="saveBioBtn" style="display:none;">Save Bio</button>
  </div>

  <!-- Top 10 Friends -->
  <div id="top10FriendsContainer" class="container-box">
    <h2>Top 10 Friends</h2>
    <div id="top10List"></div>
  </div>

  <!-- Music Player -->
  <div id="musicPlayerContainer" class="container-box">
    <h2>Music Player</h2>
    <input type="text" id="musicInput" placeholder="Paste song URL">
    <button id="addSongBtn">Add Song</button>
    <div id="playlistContainer"></div>
    <audio id="audioPlayer" controls></audio>
  </div>

  <!-- Wall Comments -->
  <div id="wallContainerBox" class="container-box">
    <h2>Wall Comments</h2>
    <textarea id="wallInput" placeholder="Write on the wall"></textarea>
    <button id="postWallBtn">Post</button>
    <div id="wallContainer"></div>
  </div>

  <!-- Private Messages -->
  <div id="privateMessagesBox" class="container-box">
    <h2>Private Messages</h2>
    <div id="conversationsContainer"></div>
    <button id="newConversationBtn">New Message</button>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
