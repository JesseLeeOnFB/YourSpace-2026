<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body class="default-theme">

  <!-- NAVIGATION -->
  <div class="navbar">
    <button data-target="feed">Feed</button>
    <button data-target="profile">Profile</button>
    <button data-target="messages">Messages</button>
    <button data-target="settings">Settings</button>
  </div>

  <div class="profile-main">

    <!-- PROFILE TOP -->
    <div class="profile-top">

      <!-- PROFILE PICTURE -->
      <div class="pfp-container">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>

      <!-- PROFILE INFO -->
      <div class="profile-info-box">
        <input id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input id="locationInput" placeholder="Location">
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>

    </div>

    <!-- WALL COMMENTS -->
    <div class="wall-container">
      <h3>Comments Wall</h3>
      <div id="wallContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="wallCommentBtn">Post Comment</button>
    </div>

    <!-- TOP 10 FRIENDS -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
      <button id="editTop10Btn">Save Top 10</button>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="music-player">
      <h3>Music Player</h3>
      <input type="text" id="musicInput" placeholder="Paste YouTube or SoundCloud URL">
      <button id="musicPlayBtn">Play</button>
      <button id="musicPauseBtn">Pause</button>
      <iframe id="musicIframe"></iframe>
    </div>

    <!-- CUSTOM HTML / THEMES -->
    <div class="theme-custom-box">
      <h3>Custom HTML / Backgrounds / Animations</h3>
      <textarea id="customHtmlInput" placeholder="Paste custom HTML or code here"></textarea>
      <button id="applyCustomHtmlBtn">Apply</button>
      <div id="customHtmlContainer"></div>
    </div>

  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
