<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">

  <nav>
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div class="profile-container">
    <h2>My Profile</h2>

    <img id="profilePicPreview" src="assets/placeholder.png" alt="Profile Picture" class="profile-pic">
    <input type="file" id="profilePicInput" accept="image/*">
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="locationInput" placeholder="Location">
    <textarea id="bioInput" placeholder="Bio"></textarea>
    <input type="text" id="musicInput" placeholder="Music URL (optional)">
    <textarea id="themeInput" placeholder="Custom HTML/CSS for profile (optional)"></textarea>
    <button id="saveProfileBtn">Save Profile</button>
    <p id="profileError" class="error"></p>

    <h3>My Posts</h3>
    <div id="myPostsContainer"></div>
  </div>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
