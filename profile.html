<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>

<div class="profile-container">
  <div class="profile-left">
    <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
    <input type="file" id="profilePfpInput">
    <button id="saveProfilePfpBtn">Save Profile Picture</button>
  </div>

  <div class="profile-right">
    <label>Username:</label>
    <input type="text" id="usernameInput">
    <label>Bio:</label>
    <textarea id="bioInput"></textarea>
    <label>Location:</label>
    <input type="text" id="locationInput">
    <button id="saveProfileBtn">Save Profile Info</button>

    <h3>Wall Comments</h3>
    <div id="wallCommentsContainer"></div>
    <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
    <button id="addWallCommentBtn">Post Comment</button>

    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer"></div>
  </div>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
