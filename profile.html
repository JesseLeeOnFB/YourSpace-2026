<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileInfo">
    <h2>Your Profile</h2>

    <!-- Profile Picture -->
    <img id="profileImagePreview" src="default-profile.png" alt="Profile Picture">
    <input type="file" id="profileImageInput" accept="image/*">

    <!-- Editable Info -->
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="locationInput" placeholder="Location">
    <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
    <input type="text" id="musicInput" placeholder="Embedded Music URL">

    <!-- Save Button -->
    <button id="saveProfileBtn">Save Profile</button>

    <!-- Top 10 Friends -->
    <h3>Top 10 Friends</h3>
    <ul id="topFriendsList">
      <!-- Dynamically populated -->
    </ul>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
