<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YourSpace - Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button id="homeBtn">Home</button>
        <button id="logoutBtn">Logout</button>
    </nav>

    <h1>Your Profile</h1>

    <div id="profileSection">
        <img id="profilePhotoPreview" src="https://via.placeholder.com/150" alt="Profile Photo">
        <input type="file" id="profilePhotoInput">
        <br>

        <label for="displayName">Display Name:</label>
        <input type="text" id="displayName" placeholder="Your display name">
        <br>

        <label for="bio">Bio:</label>
        <textarea id="bio" placeholder="Write something about yourself"></textarea>
        <br>

        <label for="musicURL">Music URL (embed player link):</label>
        <input type="text" id="musicURL" placeholder="https://...">
        <br>

        <label for="themeHTML">Profile Theme HTML/CSS:</label>
        <textarea id="themeHTML" placeholder="<style>body{background:#000;}</style>"></textarea>
        <br>

        <button id="saveProfileBtn">Save Profile</button>
    </div>

    <script type="module" src="profile.js"></script>
</body>
</html>
