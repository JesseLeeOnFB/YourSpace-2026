<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourSpace Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="default">

    <!-- NAVIGATION -->
    <nav class="navbar">
        <button id="homeBtn">Home</button>
        <button id="profileBtn">Profile</button>
        <button id="logoutBtn">Logout</button>
    </nav>

    <!-- PROFILE SECTION -->
    <section class="profileSection">
        <h2>My Profile</h2>
        <img id="profilePhoto" src="defaultProfile.png" alt="Profile Photo">
        <input type="file" id="profilePicInput" accept="image/*">
        <button id="saveProfileBtn">Save Profile Info</button>

        <label>Username</label>
        <input type="text" id="usernameInput" placeholder="Username">

        <label>Location</label>
        <input type="text" id="locationInput" placeholder="Location">

        <label>Bio</label>
        <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>

        <!-- MUSIC PLAYER -->
        <div class="musicPlayerSection">
            <label>Music Link (YouTube URL)</label>
            <input type="text" id="musicInput" placeholder="Enter YouTube link">
            <button id="saveMusicBtn">Save Music</button>
            <div id="musicPlayerContainer"></div>
        </div>

        <!-- THEME SELECTION -->
        <div class="customizationSection">
            <label>Theme</label>
            <select id="themeSelect">
                <option value="">Default</option>
                <option value="dark">Dark</option>
                <option value="neon">Neon</option>
                <option value="animated">Animated</option>
            </select>
            <button id="saveThemeBtn">Save Theme</button>
        </div>

        <!-- TOP 10 FRIENDS -->
        <div class="friendsSection">
            <h3>Top 10 Friends</h3>
            <ul id="topFriendsList"></ul>
            <input type="text" id="friendSearchInput" placeholder="Search user">
            <button id="searchFriendBtn">Search/Add Friend</button>
        </div>
    </section>

    <script type="module" src="profile.js"></script>
</body>
</html>
