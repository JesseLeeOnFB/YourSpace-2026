<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="feedBtn">Feed</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <section class="profileSection">
    <h2>Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePhotoWrapper">
      <img id="profilePhoto" src="" alt="Profile Picture">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Profile Photo</button>
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Info</button>
    </div>

    <!-- Theme Selector -->
    <div class="customizationSection">
      <h3>Choose Theme</h3>
      <select id="themeSelect">
        <option value="">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- Top Friends -->
    <div class="topFriendsSection">
      <h3>Top 10 Friends</h3>
      <input type="text" id="topFriendsInput" placeholder="Enter username">
      <button id="addTopFriendBtn">Add to Top Friends</button>
      <ul id="topFriendsList"></ul>
    </div>

  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
