<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="messagesBtn">Messages</button>
    <button id="notificationsBtn">Notifications</button>
  </nav>

  <!-- MAIN PROFILE CONTAINER -->
  <div class="profile-container">

    <!-- PROFILE INFO -->
    <div class="profile-info">
      <img id="profilePfp" src="default-pfp.png" alt="Profile Picture">
      <div class="profile-fields">
        <input type="text" id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input type="text" id="locationInput" placeholder="Location">
        <input type="file" id="profilePfpInput">
        <button id="saveProfileBtn">Save Profile Info</button>
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>
    </div>

    <!-- THEMES -->
    <div class="theme-section">
      <label for="themeSelect">Choose Theme:</label>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="black-neon">Black Neon</option>
        <option value="animated">Animated Gradient</option>
      </select>
      <button id="saveThemeBtn">Apply Theme</button>
    </div>

    <!-- COMMENT WALL -->
    <div class="comment-wall-container">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer"></div>
      <div class="comment-input-section">
        <input type="text" id="wallCommentInput" placeholder="Write a comment...">
        <button id="addWallCommentBtn">Post</button>
      </div>
    </div>

    <!-- TOP 10 FRIENDS -->
    <div class="top10-friends-container" id="top10FriendsContainer">
      <h3>Top 10 Friends</h3>
      <!-- JS will populate top friend cards here -->
    </div>

    <!-- MUSIC PLAYER -->
    <div class="music-player-container" id="musicPlayerContainer">
      <iframe id="musicPlayer" src="" allow="autoplay"></iframe>
    </div>

  </div>

  <!-- PROFILE.JS -->
  <script type="module" src="profile.js"></script>

</body>
</html>
