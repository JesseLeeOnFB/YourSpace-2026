<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="default">

<!-- NAV BAR -->
<nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
</nav>

<!-- PROFILE SECTION -->
<section class="profileSection">
    <h2>My Profile</h2>
    
    <div class="profilePhotoContainer">
        <img id="profilePhoto" src="defaultAvatar.png" alt="Profile Photo">
        <input type="file" id="profilePhotoInput" accept="image/*">
        <button id="saveProfilePhotoBtn">Save Photo</button>
    </div>

    <div class="profileInfo">
        <label>Username: <input type="text" id="usernameInput" disabled></label>
        <label>Display Name: <input type="text" id="displayNameInput"></label>
        <label>Bio: <textarea id="bioInput" rows="3"></textarea></label>
        <label>Location: <input type="text" id="locationInput"></label>
        <label>Music URL: <input type="text" id="musicInput"></label>
        <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <div class="topFriendsSection">
        <h3>Top 10 Friends</h3>
        <input type="text" id="topFriendsInput" placeholder="Add a friend">
        <button id="addTopFriendBtn">Add</button>
        <ul id="topFriendsList"></ul>
    </div>

    <div class="themeSection">
        <h3>Theme</h3>
        <select id="themeSelect">
            <option value="">Default</option>
            <option value="dark">Dark</option>
            <option value="neon">Neon</option>
            <option value="animated">Animated</option>
        </select>
        <button id="saveThemeBtn">Save Theme</button>
    </div>
</section>

<script type="module" src="profile.js"></script>
</body>
</html>
