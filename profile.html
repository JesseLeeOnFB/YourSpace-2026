<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourSpace – Profile</title>
  <link rel="stylesheet" href="profile.css" />
</head>

<body>
<header class="top-nav">
  <button onclick="window.location.href='feed.html'">Feed</button>
  <button id="logoutBtn">Logout</button>
</header>

<main class="profile-container">

  <!-- PROFILE INFO -->
  <section class="card">
    <div class="pfp-wrapper">
      <img id="profilePfp" src="default-avatar.png" />
      <input type="file" id="profilePfpInput" accept="image/*" />
      <button id="saveProfilePhotoBtn">Save Profile Picture</button>
    </div>

    <div class="profile-fields">
      <label>Username</label>
      <input id="usernameInput" />

      <label>Bio</label>
      <textarea id="bioInput"></textarea>

      <label>Location</label>
      <input id="locationInput" />

      <button id="saveProfileBtn">Save Profile</button>
    </div>
  </section>

  <!-- FRIEND SEARCH -->
  <section class="card">
    <h3>Add Friend</h3>
    <input id="topFriendInput" placeholder="Search username" />
    <div id="friendPreviewContainer"></div>
  </section>

  <!-- INCOMING REQUESTS -->
  <section class="card">
    <h3>Friend Requests</h3>
    <div id="incomingRequestsContainer"></div>
  </section>

  <!-- TOP FRIENDS -->
  <section class="card">
    <h3>Top Friends</h3>
    <div class="top-friends-container"></div>
  </section>

  <!-- WALL -->
  <section class="card">
    <h3>Wall</h3>
    <div id="commentContainer"></div>
    <input id="wallCommentInput" placeholder="Write a comment" />
    <button id="postWallCommentBtn">Post</button>
  </section>

</main>

<script type="module" src="profile.js"></script>
</body>
</html>
