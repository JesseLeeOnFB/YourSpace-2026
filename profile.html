<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script type="module" src="profile.js" defer></script>
</head>
<body>
  <nav>
    <button id="feedBtn">Feed</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div class="profile-container">
    <div class="profile-picture-container">
      <img id="profilePfp" src="default-profile.png" alt="Profile Picture" />
      <input type="file" id="profilePfpInput" accept="image/*" />
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
    </div>

    <div class="profile-info">
      <input type="text" id="usernameInput" placeholder="Username" />
      <input type="text" id="bioInput" placeholder="Bio" />
      <input type="text" id="locationInput" placeholder="Location" />
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <div class="top-friends-container">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
      <input type="text" id="addFriendInput" placeholder="Enter username to add friend">
      <div id="addFriendPreview"></div>
      <button id="addFriendBtn">Add Friend</button>
    </div>

    <div class="wall-comments-container">
      <h3>Wall Comments</h3>
      <ul id="wallCommentsList"></ul>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="postWallCommentBtn">Post Comment</button>
    </div>

    <div class="music-container">
      <input type="text" id="musicInput" placeholder="Insert music/video URL">
      <button id="saveMusicBtn">Save & Play Music</button>
      <div id="musicPlayer"></div>
    </div>
  </div>
</body>
</html>
