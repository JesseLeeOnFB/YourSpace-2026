<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="theme-dark">
  <!-- Navigation -->
  <nav id="topNav">
    <ul>
      <li><button id="feedNavBtn">Feed</button></li>
      <li><button id="profileNavBtn">Profile</button></li>
      <li><button id="messagesNavBtn">Messages</button></li>
      <li><button id="logoutBtn">Logout</button></li>
    </ul>
  </nav>

  <!-- Profile Header -->
  <section class="profile-header">
    <img id="profilePic" src="default-avatar.png" alt="Profile Picture" class="profile-pic">
    <h1 id="profileName">YourSpace User</h1>
    <p id="profileBio">This is the bio lol</p>

    <!-- Profile Owner Controls -->
    <div class="profile-controls">
      <input type="file" id="pfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>
      <textarea id="bioInput" placeholder="Update your bio"></textarea>
      <button id="saveBioBtn">Save Bio</button>
      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>
    </div>
  </section>

  <!-- Top 10 Friends -->
  <section class="top10-section">
    <h2>Top 10 Friends</h2>
    <div id="top10Container" class="top10-container">
      <!-- Populated dynamically -->
    </div>
  </section>

  <!-- Wall -->
  <section class="wall-section">
    <h2>Wall</h2>
    <div class="wall-controls">
      <textarea id="wallInput" placeholder="Write something on the wall"></textarea>
      <button id="postWallBtn">Post</button>
    </div>
    <div id="wallContainer" class="wall-container">
      <!-- Wall comments populated dynamically -->
    </div>
  </section>

  <!-- Music Player -->
  <section class="music-section">
    <h2>Music Player</h2>
    <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify/SoundCloud link">
    <button id="addMusicBtn">Add Song</button>
    <div id="musicPlaylist" class="music-playlist">
      <!-- Playlist populated dynamically -->
    </div>
    <audio id="musicPlayer" controls></audio>
  </section>

  <!-- Scripts -->
  <script type="module" src="profile.js"></script>
</body>
</html>
