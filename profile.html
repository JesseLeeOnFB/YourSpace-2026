<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script type="module" src="profile.js" defer></script>
</head>
<body>
  <div id="profileContainer">

    <!-- Profile Info -->
    <div id="profileInfo" class="card">
      <img id="profilePfp" src="" alt="Profile Picture">
      <input type="file" id="profilePfpInput">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="bioInput" placeholder="Bio">
      <input type="text" id="locationInput" placeholder="Location">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <!-- Top 10 Friends -->
    <div id="top10Container" class="card">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer"></div>
      <button id="editTop10Btn">Edit Top 10</button>
    </div>

    <!-- Wall Comments -->
    <div id="wallContainer" class="card">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer"></div>
      <input type="text" id="wallCommentInput" placeholder="Write a comment...">
      <button id="addWallCommentBtn">Post Comment</button>
    </div>

    <!-- Music Player -->
    <div id="musicPlayerContainer" class="card">
      <h2>Music Player</h2>
      <input type="text" id="musicLinkInput" placeholder="Paste YouTube/Spotify/Pandora/SoundCloud link">
      <button id="saveMusicBtn">Load Music</button>
      <div id="musicEmbedContainer"></div>
    </div>

    <!-- Custom Theme / HTML Background -->
    <div id="themeContainer" class="card">
      <h2>Profile Theme</h2>
      <select id="presetThemes">
        <option value="">Select Preset Theme</option>
        <option value="gradientRed">Red Gradient</option>
        <option value="gradientBlue">Blue Gradient</option>
        <option value="gradientGreen">Green Gradient</option>
        <option value="neonBlack">Neon Black</option>
        <option value="animatedRainbow">Animated Rainbow</option>
      </select>
      <textarea id="customHTML" placeholder="Custom HTML/CSS for background"></textarea>
      <button id="applyThemeBtn">Apply Theme</button>
    </div>

    <!-- Private Messaging (UI only, ready to connect) -->
    <div id="privateMessagingContainer" class="card">
      <h2>Private Messages</h2>
      <div id="messageList"></div>
      <input type="text" id="messageRecipientInput" placeholder="Recipient Username">
      <textarea id="messageInput" placeholder="Your message..."></textarea>
      <button id="sendMessageBtn">Send Message</button>
    </div>

  </div>
</body>
</html>
