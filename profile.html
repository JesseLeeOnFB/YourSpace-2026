<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace - Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <nav>
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div id="themeContainer">
    <label for="themeSelect">Select Theme:</label>
    <select id="themeSelect">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="retro">Retro</option>
    </select>
    <button id="applyThemeBtn">Apply Theme</button>
    <button id="resetThemeBtn">Reset Default</button>
  </div>

  <div id="profileContainer">
    <div id="profileHeader">
      <div id="pfpContainer">
        <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
        <input type="file" id="profilePicInput">
        <button id="savePfpBtn">Save Profile Picture</button>
      </div>
      <div id="bioContainer">
        <textarea id="bioInput" placeholder="This is the bio lol"></textarea>
        <input type="text" id="locationInput" placeholder="Location">
        <button id="saveBioBtn">Save Bio & Location</button>
      </div>
    </div>

    <div id="top10Container">
      <h3>Top 10 Friends</h3>
      <div id="top10Friends"></div>
    </div>

    <div id="wallContainer">
      <h3>Wall</h3>
      <div id="wallPostsContainer"></div>
      <textarea id="wallInput" placeholder="Write on the wall..."></textarea>
      <button id="postWallBtn">Post</button>
    </div>

    <div id="musicContainer">
      <h3>Music Player</h3>
      <input type="text" id="musicUrlInput" placeholder="Paste YouTube/Spotify/SoundCloud URL">
      <button id="playMusicBtn">Play</button>
      <div id="musicPlayer"></div>
    </div>

    <div id="customHtmlContainer">
      <h3>Custom HTML / CSS</h3>
      <textarea id="customHtmlInput" placeholder="Paste custom code here"></textarea>
      <button id="applyCustomHtmlBtn">Apply Custom HTML</button>
      <button id="resetCustomHtmlBtn">Reset Custom HTML</button>
    </div>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
