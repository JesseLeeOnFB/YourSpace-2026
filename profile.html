<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="topNav">
    <ul>
      <li><a href="feed.html">Feed</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="messages.html">Messages</a></li>
      <li><button id="logoutBtn">Logout</button></li>
    </ul>
  </nav>

  <main class="profile-container">
    <!-- Profile Section -->
    <section class="profile-section">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture" class="profile-picture">
      <h1 id="profileName">YourSpace User</h1>
      <p id="profileBio">This is the bio lol</p>

      <!-- Edit Own Profile -->
      <input type="text" id="bioInput" placeholder="Update your bio">
      <button id="saveBioBtn">Save Bio</button>
      <input type="file" id="pfpInput" accept="image/*">
      <button id="savePfpBtn">Change Profile Picture</button>

      <label for="themeSelect">Theme:</label>
      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>
    </section>

    <!-- Top 10 Friends -->
    <section class="top10-section">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer" class="top10-container"></div>
    </section>

    <!-- Wall Comments -->
    <section class="wall-section">
      <h2>Wall</h2>
      <div id="wallContainer" class="wall-container"></div>
      <input type="text" id="wallInput" placeholder="Write a comment...">
      <button id="postWallBtn">Post</button>
    </section>

    <!-- Music Player -->
    <section class="music-section">
      <h2>Music Playlist</h2>
      <div id="musicPlaylistContainer" class="music-buttons-container"></div>
      <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify link">
      <button id="addMusicBtn">Add Song</button>
      <iframe id="musicPlayerIframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen class="music-player"></iframe>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
  <script type="module" src="auth-guard.js"></script>
</body>
</html>
