<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>

<!-- Navigation -->
<nav>
  <button id="feedNavBtn">Feed</button>
  <button id="profileNavBtn">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<!-- Main Profile Container -->
<div class="profile-container">

  <!-- Profile Picture -->
  <div class="profile-section">
    <h2>Profile Picture</h2>
    <img id="profilePicture" src="default-avatar.png" alt="Profile Picture" class="profile-pic">
    <input type="file" id="profilePicInput">
    <button id="savePfpBtn">Save Profile Picture</button>
  </div>

  <!-- Bio -->
  <div class="profile-section">
    <h2>Bio</h2>
    <textarea id="bioText" rows="4" placeholder="This is your bio..."></textarea>
    <button id="saveBioBtn">Save Bio</button>
  </div>

  <!-- Wall -->
  <div class="profile-section">
    <h2>Wall</h2>
    <div id="wallContainer" class="wall-container">
      <!-- Wall comments load here -->
    </div>
    <input type="text" id="wallInput" placeholder="Write on the wall...">
    <button id="postWallBtn">Post</button>
  </div>

  <!-- Custom HTML / Themes (Placeholder) -->
  <div class="profile-section">
    <h2>Custom Layout / Theme</h2>
    <textarea id="customHtmlInput" rows="6" placeholder="Paste your custom HTML/CSS here..."></textarea>
    <button id="applyCustomHtmlBtn">Apply</button>
    <button id="resetCustomHtmlBtn">Reset to Default</button>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
