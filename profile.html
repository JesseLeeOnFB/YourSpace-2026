<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profile">
    <h2>Your Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePicContainer">
      <img id="profilePicPreview" src="default-avatar.png" alt="Profile Picture" style="max-width:150px; max-height:150px; border-radius:50%;">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <!-- Basic Info -->
    <label>Display Name:</label>
    <input type="text" id="displayName" placeholder="Enter your display name">

    <label>Bio:</label>
    <textarea id="bio" rows="3" placeholder="Write a short bio"></textarea>

    <label>Location:</label>
    <input type="text" id="location" placeholder="Your location">

    <label>Embedded Music URL:</label>
    <input type="text" id="musicURL" placeholder="Paste your music link here">

    <!-- Top 10 Friends -->
    <fieldset>
      <legend>Top 10 Friends</legend>
      <div class="topFriendsContainer">
        <input type="text" class="topFriendInput" placeholder="Friend 1">
        <input type="text" class="topFriendInput" placeholder="Friend 2">
        <input type="text" class="topFriendInput" placeholder="Friend 3">
        <input type="text" class="topFriendInput" placeholder="Friend 4">
        <input type="text" class="topFriendInput" placeholder="Friend 5">
        <input type="text" class="topFriendInput" placeholder="Friend 6">
        <input type="text" class="topFriendInput" placeholder="Friend 7">
        <input type="text" class="topFriendInput" placeholder="Friend 8">
        <input type="text" class="topFriendInput" placeholder="Friend 9">
        <input type="text" class="topFriendInput" placeholder="Friend 10">
      </div>
    </fieldset>

    <!-- Notification Preferences -->
    <div class="notifications">
      <label><input type="checkbox" id="notifyEmail"> Email notifications</label>
      <label><input type="checkbox" id="notifyBrowser"> Browser notifications</label>
    </div>

    <!-- Save Button -->
    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
