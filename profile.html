<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div class="profile-header">
    <img id="profileImage" class="profile-photo" src="default.png" alt="Profile Picture">
    <div>
      <h2 id="displayNameHeader">Display Name</h2>
      <p id="bioHeader">Bio</p>
      <p id="locationHeader">Location</p>
    </div>
  </div>

  <div class="profile-inputs">
    <label>Change Display Name</label>
    <input type="text" id="displayNameInput" placeholder="Enter new display name">

    <label>Bio</label>
    <input type="text" id="bioInput" placeholder="Enter your bio">

    <label>Location</label>
    <input type="text" id="locationInput" placeholder="Enter your location">

    <label>Music URL (embed player)</label>
    <input type="text" id="musicInput" placeholder="Enter music URL">

    <label>Upload Profile Photo</label>
    <input type="file" id="photoInput" accept="image/*">

    <button id="saveProfileBtn">Save Profile</button>
  </div>

  <h2>Your Posts</h2>
  <div class="posts-container" id="postsContainer"></div>

  <script type="module" src="profile.js"></script>
</body>
</html>
