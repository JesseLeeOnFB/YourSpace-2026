<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Picture Section -->
  <section class="profilePicSection">
    <h2>Profile Picture</h2>
    <img id="profilePicDisplay" src="defaultProfile.png" alt="Profile Picture" class="profilePic">
    <input type="file" id="profilePicInput" accept="image/*">
    <button id="saveProfilePicBtn">Save Profile Picture</button>
  </section>

  <!-- Profile Info Section -->
  <section class="profileInfoSection">
    <h2>Profile Info</h2>
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="locationInput" placeholder="Location">
    <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
    <input type="text" id="musicInput" placeholder="Embedded Music URL">
    <button id="saveProfileInfoBtn">Save Profile Info</button>
  </section>

  <!-- Top 10 Friends -->
  <section class="friendsSection">
    <h2>Top 10 Friends</h2>
    <ul id="friendsList"></ul>
  </section>

  <!-- Search People -->
  <section class="searchSection">
    <h2>Search People</h2>
    <input type="text" id="searchInput" placeholder="Enter username">
    <button id="searchBtn">Search</button>
    <div id="searchResults"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
