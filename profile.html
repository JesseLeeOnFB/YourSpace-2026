<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="default">

  <!-- NAVBAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="feedBtn">Feed</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">

    <h2>Your Profile</h2>

    <!-- PROFILE PHOTO -->
    <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Photo">

    <input type="file" id="profilePhotoInput" accept="image/*">
    <button id="saveProfilePhotoBtn">Save Profile Photo</button>

    <!-- PROFILE INFO -->
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="locationInput" placeholder="Location">
    <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>

    <button id="saveProfileBtn">Save Profile Info</button>

  </section>

  <!-- MUSIC PLAYER -->
  <section class="profileSection musicPlayerSection">
    <h2>Music Player</h2>

    <input type="text" id="musicInput" placeholder="Paste YouTube link here">
    <button id="saveMusicBtn">Save Music</button>

    <iframe id="musicPlayer" allow="autoplay"></iframe>
  </section>

  <!-- TOP 10 FRIENDS -->
  <section class="profileSection topFriendsSection">
    <h2>Top 10 Friends</h2>
    <ul id="topFriendsList">
      <!-- Filled later -->
    </ul>
  </section>

  <!-- PROFILE SCRIPT -->
  <script type="module" src="profile.js"></script>

</body>
</html>
