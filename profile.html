<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVBAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>Your Profile</h2>
    
    <img id="profilePhoto" class="profilePhoto" src="">

    <input type="file" id="profilePhotoInput" accept="image/*">
    <button id="saveProfilePhotoBtn">Save Profile Photo</button>

    <label>Username:</label>
    <input type="text" id="usernameInput">
    <label>Bio:</label>
    <textarea id="bioInput" rows="3"></textarea>
    <label>Location:</label>
    <input type="text" id="locationInput">
    <label>Music (YouTube Embed URL):</label>
    <input type="text" id="musicInput">
    <button id="saveProfileInfoBtn">Save Profile Info</button>

    <label>Theme:</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>

    <h3>Top Friends</h3>
    <div id="topFriendsContainer" class="topFriendsSection"></div>

    <h3>Search Members</h3>
    <input type="text" id="searchUserInput" placeholder="Enter username...">
    <button id="searchUserBtn">Search</button>
    <div id="searchResults"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
