<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace — Profile</title>
  <link rel="stylesheet" href="profile.css?v=1.0.0">
</head>

<body class="default-theme">

  <!-- NAVBAR -->
  <div class="navbar">
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="navSettings">Settings</button>
    <button id="navLogout">Logout</button>
  </div>

  <!-- MAIN PROFILE -->
  <div class="profile-main">

    <!-- TOP SECTION -->
    <div class="profile-top">
      <div class="pfp-container">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="pfpInput" accept="image/*">
        <button id="savePfpBtn">Save Profile Picture</button>
      </div>

      <div class="profile-info-box">
        <input id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input id="locationInput" placeholder="Location">
        <select id="themeSelect">
          <option value="default-theme">Default</option>
          <option value="red-theme">Red</option>
          <option value="blue-theme">Blue</option>
          <option value="green-theme">Green</option>
          <option value="neon-theme">Neon</option>
        </select>
        <button id="saveProfileBtn">Save Profile</button>
      </div>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="music-player">
      <h3>Profile Music</h3>
      <input id="musicUrlInput" placeholder="YouTube or SoundCloud URL">
      <button id="saveMusicBtn">Save Music</button>
      <iframe id="musicIframe" allow="autoplay"></iframe>
    </div>

    <!-- TOP 10 FRIENDS -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
      <button id="saveTop10Btn">Save Top 10</button>
    </div>

    <!-- WALL -->
    <div class="wall-container">
      <h3>Comment Wall</h3>
      <div id="wallComments"></div>
      <textarea id="wallCommentInput" placeholder="Leave a comment"></textarea>
      <button id="postCommentBtn">Post Comment</button>
    </div>

    <!-- CUSTOM HTML -->
    <div class="theme-custom-box">
      <h3>Custom HTML (MySpace Style)</h3>
      <textarea id="customHtmlInput" placeholder="<marquee>hello</marquee>"></textarea>
      <button id="saveCustomHtmlBtn">Save Custom HTML</button>
      <div id="customHtmlContainer"></div>
    </div>

    <!-- MESSAGES -->
    <div class="messages-container">
      <h3>Private Messages</h3>
      <div id="threads"></div>
      <div class="new-message-box">
        <input id="messageToInput" placeholder="Username">
        <textarea id="messageBodyInput" placeholder="Message"></textarea>
        <button id="sendMessageBtn">Send Message</button>
      </div>
    </div>

  </div>

  <script type="module" src="profile.js?v=1.0.0"></script>
</body>
</html>
