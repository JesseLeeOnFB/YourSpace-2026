<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </header>

  <main>
    <section id="profileInfo">
      <h2>My Profile</h2>

      <div id="pfpContainer">
        <img id="profilePfpImg" src="default-avatar.png" style="width:120px;height:120px;border-radius:50%;">
        <input type="file" id="profilePfpInput" accept="image/*">
        <button id="savePfpBtn">Save Profile Picture</button>
      </div>

      <!-- Optional profile fields -->
      <div id="profileDetails">
        <label>Display Name: <input type="text" id="displayNameInput"></label>
        <label>Bio: <textarea id="bioInput"></textarea></label>
        <label>Location: <input type="text" id="locationInput"></label>
      </div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
