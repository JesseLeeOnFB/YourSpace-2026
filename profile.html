<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <section class="profileSection">
    <h2>My Profile</h2>
    <div class="profilePhotoSection">
      <img id="profilePhoto" src="" alt="Profile Photo">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Profile Photo</button>
    </div>

    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <div class="themeSection">
      <h3>Preset Themes</h3>
      <select id="themeSelect">
        <option value="">Select Theme</option>
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <div class="topFriendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
    </div>

    <!-- Step 7: Friend Search Section -->
    <div class="friendSearchSection">
      <h3>Find Friends</h3>
      <input type="text" id="friendSearchInput" placeholder="Search username">
      <button id="friendSearchBtn">Search</button>
      <ul id="friendSearchResults"></ul>
    </div>

    <div class="friendRequestsSection">
      <h3>Friend Requests</h3>
      <ul id="friendRequestsList"></ul>
    </div>

  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
