<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="default">

  <!-- NAV BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Picture">

    <input type="file" id="profilePhotoInput" accept="image/*">
    <button id="savePhotoBtn">Save Profile Photo</button>

    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="locationInput" placeholder="Location">
    <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>

    <input type="text" id="musicInput" placeholder="YouTube Music URL">

    <button id="saveProfileBtn">Save Profile Info</button>
  </section>

  <!-- THEME SECTION -->
  <section class="customizationSection">
    <h3>Profile Theme</h3>

    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>

    <button id="saveThemeBtn">Save Theme</button>
  </section>

  <!-- IMPORTANT: MODULE SCRIPT -->
  <script type="module" src="profile.js"></script>
</body>
</html>
