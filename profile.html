<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <nav>
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main>
    <section class="profile-header">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture" class="profile-pic">
      <h1 id="profileName">YourSpace User</h1>
      <p id="profileBio">This is the bio lol</p>

      <input type="file" id="pfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>

      <textarea id="bioInput" placeholder="Update your bio"></textarea>
      <button id="saveBioBtn">Save Bio</button>

      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>
    </section>

    <section class="music-player-section">
      <h2>Music Player</h2>
      <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify/etc link">
      <button id="addMusicBtn">Add Song</button>
      <div id="musicPlayerContainer"></div>
    </section>

    <section class="top10-friends-section">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer"></div>
    </section>

    <section class="wall-section">
      <h2>Wall</h2>
      <textarea id="wallInput" placeholder="Write on the wall"></textarea>
      <button id="postWallBtn">Post</button>
      <div id="wallContainer"></div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
