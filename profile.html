<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Header -->
  <section id="profileHeader">
    <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
    <h1 id="profileName">User</h1>
    <p id="profileBio">This is the bio lol</p>
    <input type="file" id="pfpInput" style="display:none;">
    <button id="savePfpBtn" style="display:none;">Change Picture</button>
    <textarea id="bioInput" style="display:none;"></textarea>
    <button id="saveBioBtn" style="display:none;">Save Bio</button>
    <select id="themeSelect" style="display:none;">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="retro">Retro</option>
    </select>
    <button id="sendMessageBtn" style="display:none;">Send Message</button>
  </section>

  <!-- Top 10 Friends -->
  <section id="top10FriendsContainer"></section>

  <!-- Music Player -->
  <section id="musicSection">
    <h2>Music Playlist</h2>
    <div id="musicList"></div>
    <audio id="musicPlayer" controls></audio>
  </section>

  <!-- Wall Comments -->
  <section id="wallSection">
    <h2>Wall Comments</h2>
    <textarea id="wallInput"></textarea>
    <button id="postWallBtn">Post on Wall</button>
    <div id="wallContainer"></div>
  </section>

<script type="module" src="profile.js"></script>
</body>
</html>
