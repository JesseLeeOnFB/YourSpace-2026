<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="theme-dark">

  <!-- Navigation -->
  <nav id="mainNav">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main id="profileMain">
    <section id="profileHeader">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <h1 id="profileName">Loading...</h1>
      <p id="profileBio">Loading bio...</p>

      <!-- Editable if own profile -->
      <input type="file" id="pfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>

      <textarea id="bioInput" placeholder="Update your bio"></textarea>
      <button id="saveBioBtn">Save Bio</button>

      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>
    </section>

    <section id="top10Section">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer"></div>
    </section>

    <section id="musicSection">
      <h2>Music Playlist</h2>
      <input type="text" id="musicInput" placeholder="Paste song link here">
      <button id="addMusicBtn">Add Song</button>
      <div id="musicPlayer"></div>
      <ul id="musicList"></ul>
    </section>

    <section id="wallSection">
      <h2>Wall</h2>
      <textarea id="wallInput" placeholder="Write on wall"></textarea>
      <button id="postWallBtn">Post</button>
      <div id="wallContainer"></div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
