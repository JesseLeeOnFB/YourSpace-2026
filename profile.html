<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>

<!-- Navigation -->
<nav>
  <button id="feedNavBtn">Feed</button>
  <button id="profileNavBtn">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<!-- Profile Section -->
<section id="profileSection">
  <div class="profile-box">
    <h2>Your Profile</h2>

    <!-- Profile Picture -->
    <div class="pfp-container">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture" width="150" height="150">
      <input type="file" id="profilePicInput">
    </div>

    <!-- Bio -->
    <div class="bio-container">
      <h3>Bio</h3>
      <p id="bioDisplay">This is the bio lol</p>
      <textarea id="bioInput" placeholder="Write your bio"></textarea>
      <button id="bioSaveBtn">Save Bio</button>
    </div>
  </div>

  <!-- Wall Section -->
  <div class="wall-box">
    <h3>Wall</h3>
    <textarea id="wallInput" placeholder="Write on the wall"></textarea>
    <button id="wallPostBtn">Post</button>
    <div id="wallContainer"></div>
  </div>

  <!-- Music Section -->
  <div class="music-box">
    <h3>Music</h3>
    <input type="text" id="musicInput" placeholder="Paste YouTube, Spotify, SoundCloud link">
    <button id="musicAddBtn">Add Music</button>
    <div id="musicContainer"></div>
  </div>

  <!-- Themes & Custom HTML -->
  <div class="customization-box">
    <h3>Theme</h3>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="retro">Retro</option>
    </select>

    <h3>Custom HTML</h3>
    <textarea id="customHtmlInput" placeholder="Add custom HTML code here"></textarea>
    <button id="customHtmlSaveBtn">Apply</button>
    <div id="customHtmlContainer"></div>
  </div>
</section>

<script type="module" src="profile.js"></script>
</body>
</html>
