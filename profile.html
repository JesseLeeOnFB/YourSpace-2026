<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="navbar">
    <button onclick="window.location.href='index.html'">Home</button>
    <button onclick="window.location.href='feed.html'">Global Feed</button>
    <button id="logoutBtn">Log Out</button>
  </div>

  <h2>Profile</h2>
  <div class="profile-header">
    <img id="profilePicPreview" src="https://via.placeholder.com/80" alt="Profile Pic">
    <div>
      <input type="file" id="profilePic" accept="image/*">
      <input type="text" id="username" placeholder="Username">
      <input type="text" id="bio" placeholder="Bio">
      <input type="text" id="location" placeholder="Location">
      <input type="text" id="musicURL" placeholder="Music URL (embedded)"><br>
      <textarea id="backgroundCSS" placeholder="Custom CSS / HTML"></textarea>
      <button id="saveProfileBtn">Save Profile</button>
    </div>
  </div>
</div>
<script type="module" src="profile.js"></script>
</body>
</html>
