<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <div id="profileContainer">
    <div id="profileHeader">
      <img id="profilePfp" src="" alt="Profile Picture">
      <input type="file" id="profilePfpInput">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="bioInput" placeholder="Bio">
      <input type="text" id="locationInput" placeholder="Location">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <div id="wallContainer">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer"></div>
      <input type="text" id="wallCommentInput" placeholder="Write a comment">
      <button id="addWallCommentBtn">Post Comment</button>
    </div>

    <div id="top10FriendsSection">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer"></div>
    </div>

    <div id="addFriendSection">
      <h2>Add Friend</h2>
      <input type="text" id="addFriendInput" placeholder="Enter username">
      <div id="addFriendPreview"></div>
      <button id="sendFriendRequestBtn">Send Friend Request</button>
    </div>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
