<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <header>
    <nav>
      <button id="navFeedBtn">Feed</button>
      <button id="navProfileBtn">Profile</button>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main>
    <section id="profileSection">
      <div id="profilePfpContainer">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>

      <div id="profileInfoContainer">
        <label>Username: <input type="text" id="usernameInput"></label>
        <label>Bio: <textarea id="bioInput"></textarea></label>
        <label>Location: <input type="text" id="locationInput"></label>
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </section>

    <section id="musicSection">
      <h2>Music Player</h2>
      <input type="text" id="musicInput" placeholder="Paste music/video URL">
      <button id="savePlayMusicBtn">Save & Play</button>
      <div id="musicPlayerContainer"></div>
    </section>

    <section id="wallSection">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer"></div>
      <input type="text" id="wallCommentInput" placeholder="Write a comment...">
      <button id="addWallCommentBtn">Post Comment</button>
    </section>

    <section id="friendsSection">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer"></div>

      <h3>Add Friend</h3>
      <input type="text" id="addFriendInput" placeholder="Search username...">
      <div id="addFriendPreview"></div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
