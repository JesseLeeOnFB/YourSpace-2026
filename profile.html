<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAV BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <h1>Your Profile</h1>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <img id="profilePic" src="" alt="Profile Photo" class="profilePhoto">
    <input type="file" id="profilePicInput" accept="image/*">
    <button id="saveProfilePicBtn">Save Profile Picture</button>

    <div>
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <div>
      <input type="text" id="musicInput" placeholder="YouTube URL or Embed Link">
      <button id="saveMusicBtn">Save Music</button>
      <div id="musicPlayer"></div>
    </div>

    <div>
      <label for="themeSelect">Theme:</label>
      <select id="themeSelect">
        <option value="">Select Theme</option>
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <div>
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
    </div>
  </section>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
