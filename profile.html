<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Profile</h1>
  <p id="profileEmail"></p>
  <input type="text" id="username" placeholder="Username">
  <input type="text" id="bio" placeholder="Bio">
  <input type="text" id="location" placeholder="Location">
  <input type="url" id="musicUrl" placeholder="Music URL (embed link)">
  <input type="color" id="themeColor" placeholder="Theme/Background Color">
  <input type="file" id="profilePic" accept="image/*">
  <button id="saveProfileBtn">Save Profile</button>

  <div id="profileDisplay">
    <h3 id="displayUsername"></h3>
    <p id="displayBio"></p>
    <p id="displayLocation"></p>
    <img id="displayPic" src="" alt="Profile Pic">
    <audio id="displayMusic" controls></audio>
  </div>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
