<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="logoutBtn">Log Out</button>
</nav>

<div class="profile-container">
  <h2>Profile</h2>
  <input type="text" id="usernameInput" placeholder="Username">
  <input type="text" id="bioInput" placeholder="Bio">
  <input type="text" id="locationInput" placeholder="Location">
  <input type="text" id="musicInput" placeholder="Music URL">
  <input type="text" id="profilePicInput" placeholder="Profile Image URL">
  <textarea id="customHTMLInput" placeholder="Custom HTML/CSS"></textarea>
  <button id="saveProfileBtn">Save Profile</button>

  <h3>Your Posts</h3>
  <div id="userPostsContainer"></div>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
