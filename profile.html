<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body>

<nav class="nav">
  <button onclick="window.location.href='feed.html'">Feed</button>
  <button id="logoutBtn">Logout</button>
</nav>

<main class="profile-container">

  <!-- PROFILE HEADER -->
  <section class="profile-header">
    <div class="pfp-wrapper">
      <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
    </div>

    <input type="file" id="profilePfpInput" accept="image/*">
    <button id="saveProfilePfpBtn">Save Profile Picture</button>
  </section>

  <!-- PROFILE INFO -->
  <section class="profile-info">
    <input id="usernameInput" placeholder="Username">
    <input id="locationInput" placeholder="Location">
    <textarea id="bioInput" placeholder="Bio"></textarea>
    <button id="saveProfileBtn">Save Profile Info</button>
  </section>

  <!-- TOP 10 FRIENDS -->
  <section class="top-friends">
    <h2>Top 10 Friends</h2>
    <div id="top10FriendsContainer"></div>
  </section>

  <!-- WALL -->
  <section class="wall">
    <h2>Wall</h2>
    <div id="wallCommentsContainer"></div>

    <textarea id="wallCommentInput" placeholder="Write on your wall..."></textarea>
    <button id="addWallCommentBtn">Post Comment</button>
  </section>

</main>

<script type="module" src="profile.js"></script>
</body>
</html>
