<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>

<!-- Navigation -->
<nav>
  <button id="feedNavBtn">Feed</button>
  <button id="profileNavBtn">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<!-- Profile Header -->
<div class="profile-header">
  <div class="profile-picture-container">
    <img id="profilePicture" src="default-avatar.png" alt="Profile Picture">
    <input type="file" id="profilePicInput">
    <button id="savePfpBtn">Save</button>
  </div>
  <div class="profile-info">
    <textarea id="bioInput" placeholder="This is the bio lol"></textarea>
    <button id="saveBioBtn">Save Bio</button>
    <div id="locationDisplay"></div>
  </div>
</div>

<!-- Top 10 Friends -->
<section class="top10-section">
  <h3>Top 10 Friends</h3>
  <div id="top10Container"></div>
</section>

<!-- Wall Comments -->
<section class="wall-section">
  <h3>Wall Comments</h3>
  <div id="wallContainer"></div>
  <textarea id="wallInput" placeholder="Write on the wall..."></textarea>
  <button id="postWallBtn">Post</button>
</section>

<!-- Music Player -->
<section class="music-section">
  <h3>Music Player</h3>
  <input type="text" id="musicInput" placeholder="Paste YouTube/SoundCloud/Spotify link">
  <button id="playMusicBtn">Play</button>
  <div id="musicPlayer"></div>
</section>

<!-- Theme Selector -->
<section class="themes-section">
  <h3>Theme Selector</h3>
  <button class="theme-btn" data-theme="dark">Dark</button>
  <button class="theme-btn" data-theme="light">Light</button>
  <button class="theme-btn" data-theme="retro">Retro</button>
  <button id="resetThemeBtn">Reset</button>
</section>

<!-- Custom HTML Box -->
<section class="custom-html-section">
  <h3>Custom HTML/Code</h3>
  <textarea id="customHtmlInput" placeholder="Drop your HTML/CSS/JS code here"></textarea>
  <button id="applyCustomHtmlBtn">Apply</button>
  <button id="resetCustomHtmlBtn">Reset</button>
  <div id="customHtmlContainer"></div>
</section>

<script type="module" src="profile.js"></script>
</body>
</html>
