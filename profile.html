<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script type="module" src="profile.js" defer></script>
</head>
<body>
  <header>
    <h1>YourSpace Profile</h1>
    <nav>
      <button id="navFeed">Feed</button>
      <button id="navProfile">Profile</button>
      <button id="navMessages">Messages</button>
      <button id="navNotifications">Notifications</button>
    </nav>
  </header>

  <main>
    <section class="profile-info">
      <div class="profile-pfp-container">
        <img id="profilePfp" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>
      <div class="profile-fields">
        <label>Username: <input type="text" id="usernameInput"></label>
        <label>Bio: <input type="text" id="bioInput"></label>
        <label>Location: <input type="text" id="locationInput"></label>
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </section>

    <section class="top10-friends-section">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer"></div>
      <button id="editTop10Btn">Edit Top 10</button>
    </section>

    <section class="comment-wall">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer"></div>
      <input type="text" id="wallCommentInput" placeholder="Write a comment...">
      <button id="addWallCommentBtn">Post Comment</button>
    </section>

    <section class="themes">
      <h2>Profile Themes</h2>
      <select id="themesDropdown">
        <option value="default">Default</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="black-neon">Black Neon</option>
        <option value="animated">Animated Gradient</option>
      </select>
    </section>

    <section class="music-player">
      <h2>Music Player</h2>
      <div id="musicPlayerContainer"></div>
      <input type="text" id="musicUrlInput" placeholder="Enter YouTube/SoundCloud/Pandora/Spotify URL">
      <button id="loadMusicBtn">Load Music</button>
    </section>
  </main>
</body>
</html>
