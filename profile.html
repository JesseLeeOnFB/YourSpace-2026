<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="default-theme">

  <!-- Navigation -->
  <nav id="navBar">
    <button class="navBtn" data-target="feed">Feed</button>
    <button class="navBtn" data-target="messages">Messages</button>
    <button class="navBtn" data-target="notifications">Notifications</button>
    <button class="navBtn" data-target="profile">Profile</button>
  </nav>

  <!-- Profile Container -->
  <div class="profile-container">
    <!-- Left: Profile Picture and Theme -->
    <div class="profile-left">
      <img id="profilePfp" src="" alt="Profile Picture" class="profile-pfp">
      <input type="file" id="profilePfpInput">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>

      <div class="theme-selection">
        <label for="themeSelect">Select Theme:</label>
        <select id="themeSelect">
          <option value="default-theme">Default</option>
          <option value="red-gradient">Red Gradient</option>
          <option value="blue-gradient">Blue Gradient</option>
          <option value="green-gradient">Green Gradient</option>
          <option value="black-neon">Black Neon</option>
          <option value="animated-gradient">Animated Gradient</option>
        </select>
        <button id="saveThemeBtn">Save Theme</button>
      </div>
    </div>

    <!-- Right: Profile Info and Wall -->
    <div class="profile-right">
      <div class="profile-info">
        <input type="text" id="usernameInput" placeholder="Username">
        <input type="text" id="bioInput" placeholder="Bio">
        <input type="text" id="locationInput" placeholder="Location">
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>

      <!-- Wall Comments -->
      <div class="wall-container">
        <h3>Wall</h3>
        <div id="wallCommentsContainer"></div>
        <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
        <button id="addWallCommentBtn">Post Comment</button>
      </div>

      <!-- Top 10 Friends -->
      <div class="top10-container">
        <h3>Top 10 Friends</h3>
        <div id="top10FriendsContainer"></div>
        <button id="editTop10Btn">Edit Top 10</button>
      </div>

      <!-- Music Player -->
      <div class="music-player-container">
        <h3>Music Player</h3>
        <input type="text" id="musicUrlInput" placeholder="Paste YouTube/SoundCloud/Spotify link">
        <button id="loadMusicBtn">Load Music</button>
        <div id="musicPlayerWrapper"></div>
      </div>

    </div>
  </div>

  <script src="profile.js"></script>
</body>
</html>
