<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- Profile Photo -->
    <div class="photoSection">
      <img class="profilePhoto" src="" alt="Profile Photo">
      <input type="file" id="profilePhotoInput">
      <button id="savePhotoBtn">Save Photo</button>
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="YouTube Music URL">
      <button id="saveInfoBtn">Save Info</button>
    </div>

    <!-- Music Player -->
    <div class="musicPlayerSection">
      <iframe class="musicPlayer" width="300" height="80" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- Profile Theme -->
    <div class="customizationSection">
      <h3>Choose Theme</h3>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
