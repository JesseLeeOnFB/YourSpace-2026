<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section id="profileSection">
    <h2>Profile</h2>
    <img id="profilePic" src="default-avatar.png" alt="Profile Picture" width="150" height="150">
    <input type="file" id="pfpInput">
    <div>
      <label for="bioInput">Bio:</label>
      <textarea id="bioInput" rows="4"></textarea>
      <div id="bioDisplay"></div>
    </div>
    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <!-- Wall Section -->
  <section id="wallSection">
    <h3>Wall</h3>
    <textarea id="wallInput" placeholder="Write on your wall..." rows="3"></textarea>
    <button id="wallBtn">Post</button>
    <div id="wallContainer"></div>
  </section>

  <!-- Music Section -->
  <section id="musicSection">
    <h3>Music</h3>
    <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify/SoundCloud link">
    <button id="addMusicBtn">Add Music</button>
    <div id="musicContainer"></div>
  </section>

  <!-- Theme & Custom HTML -->
  <section id="customizationSection">
    <h3>Theme & Custom HTML</h3>
    <label for="themeSelect">Preset Theme:</label>
    <select id="themeSelect">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="retro">Retro</option>
    </select>
    <textarea id="customHtmlInput" rows="5" placeholder="Custom HTML/CSS code here"></textarea>
    <button id="saveCustomHtmlBtn">Save Customization</button>
    <button id="resetCustomHtmlBtn">Reset Custom HTML</button>
    <div id="customHtmlContainer"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
