<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <section class="profileSection">
    <h2>Your Profile</h2>
    
    <!-- Profile Picture -->
    <div class="profilePicContainer">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture" style="max-width:150px; max-height:150px;">
      <input type="file" id="profilePicInput" accept="image/*">
      <button id="saveProfilePicBtn">Save Picture</button>
    </div>

    <!-- User Info -->
    <div class="userInfo">
      <label>Username:</label>
      <input type="text" id="displayName" placeholder="Enter username">

      <label>Bio:</label>
      <textarea id="bio" rows="3" placeholder="Tell us about yourself"></textarea>

      <label>Location:</label>
      <input type="text" id="location" placeholder="Your location">

      <h3>Top 10 Friends</h3>
      <ul id="top10FriendsList"></ul>
      <input type="text" id="addFriendInput" placeholder="Add friend by username">
      <button id="addFriendBtn">Add Friend</button>
    </div>

    <!-- Notifications -->
    <div class="notifications">
      <label><input type="checkbox" id="notifyEmail"> Email notifications</label>
      <label><input type="checkbox" id="notifyBrowser"> Browser notifications</label>
    </div>

    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
