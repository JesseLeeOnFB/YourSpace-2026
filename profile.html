<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- Profile Photo -->
    <div class="profilePhotoContainer">
      <img id="profilePhotoPreview" src="" alt="Profile Photo" style="max-width:150px; max-height:150px;">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Photo</button>
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <!-- Top 10 Friends -->
    <div class="topFriendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
      <input type="text" id="addFriendInput" placeholder="Add friend by username">
      <button id="addFriendBtn">Add Friend</button>
    </div>

    <!-- Custom HTML/Theme -->
    <div class="customHTMLSection">
      <h3>Profile Customization</h3>
      <textarea id="customHTMLInput" rows="5" placeholder="Custom HTML/Theme/Background/Animations"></textarea>
      <button id="saveCustomHTMLBtn">Save Customizations</button>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
