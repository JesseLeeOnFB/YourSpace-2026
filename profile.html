<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body class="theme-light">

<!-- Navigation Bar -->
<nav id="navBar">
  <ul>
    <li><button id="navFeedBtn">Feed</button></li>
    <li><button id="navProfileBtn">Profile</button></li>
    <li><button id="navMessagesBtn">Messages</button></li>
    <li><button id="logoutBtn">Logout</button></li>
  </ul>
</nav>

<!-- Profile Container -->
<div class="profile-container">

  <!-- Profile Info -->
  <div class="profile-header">
    <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
    <h1 id="profileName">YourSpace User</h1>
    <p id="profileBio">This is the bio lol</p>

    <input type="file" id="pfpInput" accept="image/*">
    <button id="savePfpBtn">Change Profile Picture</button>

    <textarea id="bioInput" placeholder="Update your bio..."></textarea>
    <button id="saveBioBtn">Save Bio</button>

    <select id="themeSelect">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="retro">Retro</option>
    </select>
  </div>

  <!-- Top 10 Friends -->
  <div class="top10-container">
    <h2>Top 10 Friends</h2>
    <ul id="top10List"></ul>
  </div>

  <!-- Wall Comments -->
  <div class="wall-container">
    <h2>Wall</h2>
    <div id="wallContainer"></div>
    <textarea id="wallInput" placeholder="Write something on this wall..."></textarea>
    <button id="postWallBtn">Post</button>
  </div>

  <!-- Music Player -->
  <div class="music-container">
    <h2>Music Playlist</h2>
    <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify link">
    <button id="addMusicBtn">Add Song</button>
    <ul id="playlistContainer"></ul>
    <div id="playerContainer"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
