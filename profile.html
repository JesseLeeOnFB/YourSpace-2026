<div class="profile-header">

  <!-- PROFILE PICTURE -->
  <div class="profile-picture-box">
    <img id="profilePfp" src="" alt="Profile Picture">

    <input type="file" id="profilePfpInput" accept="image/*">
    <button id="saveProfilePfpBtn">Save Profile Picture</button>
  </div>

  <!-- PROFILE INFO -->
  <div class="profile-info-box">

    <label>Username</label>
    <input id="usernameInput" type="text" placeholder="Your username">

    <label>Bio</label>
    <textarea id="bioInput" placeholder="Tell people about yourself"></textarea>

    <label>Location</label>
    <input id="locationInput" type="text" placeholder="City, Country">

    <button id="saveProfileBtn">Save Profile Info</button>

    <!-- THEME SELECTION -->
    <label>Profile Theme</label>
    <select id="themeSelect">
      <option value="theme-default">Default</option>
      <option value="theme-red">Red</option>
      <option value="theme-blue">Blue</option>
      <option value="theme-green">Green</option>
      <option value="theme-black">Black Neon</option>
      <option value="theme-animated">Animated</option>
    </select>

    <button id="saveThemeBtn">Save Theme</button>

  </div>
</div>
