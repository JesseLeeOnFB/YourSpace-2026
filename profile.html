<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- Profile Photo -->
    <div class="profilePhotoWrapper">
      <img id="profilePhoto" src="default-profile.png" alt="Profile Photo">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="uploadPhotoBtn">Upload Profile Photo</button>
    </div>

    <!-- User Info -->
    <label>Username:</label>
    <input type="text" id="usernameInput" placeholder="Username">

    <label>Bio:</label>
    <textarea id="bioInput" placeholder="Tell us about yourself"></textarea>

    <label>Location:</label>
    <input type="text" id="locationInput" placeholder="Location">

    <label>Music (YouTube link):</label>
    <input type="text" id="musicInput" placeholder="https://youtu.be/...">

    <button id="saveProfileBtn">Save Profile Info</button>

    <!-- Theme Selector -->
    <label>Theme:</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>

    <!-- Top Friends -->
    <label>Top Friends (comma separated usernames):</label>
    <input type="text" id="topFriendsInput" placeholder="friend1, friend2, friend3">

  </section>

  <!-- MUSIC PLAYER -->
  <section class="musicPlayerSection">
    <h3>Your Music</h3>
    <iframe id="musicPlayer" width="300" height="80" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </section>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
