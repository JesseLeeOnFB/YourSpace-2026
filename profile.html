<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="default-theme">

  <!-- Navigation -->
  <div class="navbar">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="profile-main">

    <!-- Top Section: Profile pic + info -->
    <div class="profile-top">
      <div class="pfp-container">
        <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
        <input type="file" id="pfpInput">
      </div>
      <div class="profile-info-box">
        <label>Username</label>
        <input type="text" id="usernameInput">
        <label>Bio</label>
        <textarea id="bioInput"></textarea>
        <label>Theme</label>
        <select id="themeSelect">
          <option value="default-theme">Default</option>
          <option value="red-theme">Red</option>
          <option value="blue-theme">Blue</option>
          <option value="green-theme">Green</option>
          <option value="neon-theme">Neon</option>
        </select>
        <button id="saveProfileBtn">Save</button>
      </div>
    </div>

    <!-- Top 10 Friends -->
    <div class="top10-container wall-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
    </div>

    <!-- Wall Comments -->
    <div class="wall-container">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="postWallCommentBtn">Post Comment</button>
    </div>

  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
