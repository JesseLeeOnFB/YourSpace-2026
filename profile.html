<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav id="navbar">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Container -->
  <div class="profile-container">
    <div class="profile-header">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <h2 id="profileName">YourSpace User</h2>
      <p id="profileBio">This is the bio lol</p>
    </div>

    <!-- Edit Bio & Profile Picture (only visible on own profile) -->
    <div class="profile-edit">
      <input type="text" id="bioInput" placeholder="Edit your bio">
      <button id="saveBioBtn">Save Bio</button>

      <input type="file" id="pfpInput" accept="image/*">
      <button id="savePfpBtn">Save Profile Picture</button>

      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>

      <!-- Custom HTML container -->
      <textarea id="customHtmlInput" placeholder="Paste your custom HTML code"></textarea>
      <button id="saveCustomHtmlBtn">Apply Custom HTML</button>
      <button id="resetCustomHtmlBtn">Reset to Default</button>
    </div>

    <!-- Top 10 Friends -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
    </div>

    <!-- Wall Comments -->
    <div class="wall-container">
      <h3>Wall</h3>
      <textarea id="wallInput" placeholder="Write something on the wall..."></textarea>
      <button id="postWallBtn">Post</button>
      <div id="wallContainer"></div>
    </div>

    <!-- Music Player -->
    <div class="music-container">
      <h3>Music Playlist</h3>
      <input type="text" id="musicUrlInput" placeholder="Paste YouTube/Spotify URL">
      <button id="addMusicBtn">Add Song</button>
      <div id="musicPlaylistContainer"></div>
      <iframe id="musicPlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

<script type="module" src="profile.js"></script>
</body>
</html>
