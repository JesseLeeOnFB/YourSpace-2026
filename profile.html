<!DOCTYPE html>
<html>
<head>
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>

<nav>
  <button onclick="location.href='feed.html'">Feed</button>
  <button onclick="location.href='profile.html'">Profile</button>
</nav>

<div class="profile-container">

  <img id="profilePic" src="default-avatar.png">
  <input type="file" id="pfpUpload">

  <textarea id="bioInput" placeholder="Your bio"></textarea>
  <input id="locationInput" placeholder="Location">
  <button id="saveProfileBtn">Save</button>

  <h3>Custom CSS (MySpace Style)</h3>
  <textarea id="customCss"></textarea>
  <button id="saveCustomCss">Save Custom Code</button>
  <button id="resetCustomCss">Reset</button>

  <h3>Wall</h3>
  <textarea id="wallInput"></textarea>
  <button id="wallPostBtn">Post</button>
  <div id="wallPosts"></div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
