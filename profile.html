<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="default-theme">

  <!-- NAVIGATION -->
  <div class="navbar">
    <button id="navFeedBtn">Feed</button>
    <button id="navProfileBtn">Profile</button>
    <button id="navMessagesBtn">Messages</button>
    <button id="navNotificationsBtn">Notifications</button>
  </div>

  <div class="profile-main">

    <!-- PROFILE TOP SECTION -->
    <div class="profile-top">

      <!-- PROFILE PICTURE -->
      <div class="pfp-container">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>

      <!-- PROFILE INFO -->
      <div class="profile-info-box">
        <input id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input id="locationInput" placeholder="Location">
        <button id="saveProfileBtn">Save Profile Info</button>

        <!-- THEME SELECTOR -->
        <select id="themeSelector">
          <option value="default-theme">Default</option>
          <option value="red-theme">Red Gradient</option>
          <option value="blue-theme">Blue Gradient</option>
          <option value="green-theme">Green Gradient</option>
          <option value="neon-theme">Neon Animated</option>
        </select>
        <button id="saveThemeBtn">Apply Theme</button>

        <!-- CUSTOM HTML BACKGROUND -->
        <textarea id="customHtmlInput" placeholder="Custom HTML/CSS for background/animations"></textarea>
        <button id="saveCustomHtmlBtn">Apply Custom HTML</button>
      </div>
    </div>

    <!-- COMMENT WALL -->
    <div class="wall-container">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Post Comment</button>
    </div>

    <!-- TOP 10 FRIENDS -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
      <button id="editTop10Btn">Edit Top 10</button>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="music-player">
      <input id="musicInput" placeholder="Paste YouTube/Spotify/SoundCloud link">
      <button id="playMusicBtn">Play Music</button>
      <iframe id="musicIframe" src="" allow="autoplay"></iframe>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script src="profile.js"></script>
</body>
</html>
