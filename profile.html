<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <div id="profile-container">
    <!-- Header / Navigation -->
    <header>
      <button id="feedNavBtn">Feed</button>
      <button id="profileNavBtn">Profile</button>
      <button id="logoutBtn">Logout</button>
    </header>

    <!-- Profile Info -->
    <section id="profile-info">
      <div id="pfp-container">
        <img id="profilePicture" src="default-avatar.png" alt="Profile Picture">
        <input type="file" id="pfpInput">
        <button id="savePfpBtn">Save PFP</button>
      </div>
      <div id="bio-container">
        <textarea id="bioText"></textarea>
        <button id="saveBioBtn">Save Bio</button>
      </div>
    </section>

    <!-- Top 10 Friends -->
    <section id="top10FriendsSection">
      <h2>Top 10 Friends</h2>
      <div id="top10Container"></div>
    </section>

    <!-- Wall Comments -->
    <section id="wallSection">
      <h2>Wall</h2>
      <div id="wallCommentsContainer"></div>
      <input type="text" id="wallCommentInput" placeholder="Write on the wall...">
      <button id="postWallCommentBtn">Post</button>
    </section>

    <!-- Music Player -->
    <section id="musicSection">
      <h2>Music Player</h2>
      <div id="playlistContainer"></div>
      <iframe id="musicPlayer" width="100%" height="80" frameborder="0" allow="autoplay" allowfullscreen></iframe>
      <input type="text" id="musicUrlInput" placeholder="Paste YouTube, Spotify, SoundCloud link">
      <button id="addMusicBtn">Add Track</button>
    </section>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
