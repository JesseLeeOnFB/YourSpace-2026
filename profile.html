<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body class="default-theme">

<!-- Navigation -->
<div class="navbar">
  <button id="navFeedBtn">Feed</button>
  <button id="navProfileBtn">Profile</button>
  <button id="navSettingsBtn">Settings</button>
  <button id="logoutBtn">Logout</button>
</div>

<div class="profile-main">

  <!-- Profile top section -->
  <div class="profile-top">

    <!-- Profile Picture -->
    <div class="pfp-container">
      <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
    </div>

    <!-- Profile Info -->
    <div class="profile-info-box">
      <label>Bio:</label>
      <textarea id="profileBio" placeholder="Bio"></textarea>
    </div>
  </div>

  <!-- Themes -->
  <div class="theme-container">
    <label>Theme:</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="red">Red Gradient</option>
      <option value="blue">Blue Gradient</option>
      <option value="green">Green Gradient</option>
      <option value="neon">Neon Animated</option>
    </select>
  </div>

  <!-- Music Player -->
  <div class="music-player">
    <label>Music URL:</label>
    <input type="text" id="musicInput" placeholder="Paste YouTube, Spotify, SoundCloud, Pandora link">
    <iframe id="musicIframe" src="" allow="autoplay"></iframe>
  </div>

  <!-- Wall Comments -->
  <div class="wall-container-section">
    <h3>Wall Comments</h3>
    <div id="wallContainer" class="wall-container"></div>
    <input type="text" id="wallCommentInput" placeholder="Write a comment...">
    <button id="wallCommentBtn">Post Comment</button>
  </div>

  <!-- Top 10 Friends -->
  <div class="top10-container">
    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
