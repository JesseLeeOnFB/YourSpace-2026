<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <nav>
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <h1>Your Profile</h1>

  <div id="profileContainer">
    <img id="profilePic" class="profile-picture" src="default-avatar.png" alt="Profile Picture">
    <input type="file" id="profilePicInput" accept="image/*">
    
    <label>Username / Display Name:</label>
    <input type="text" id="displayName" placeholder="Your display name">

    <label>Bio:</label>
    <textarea id="bio" placeholder="Tell something about yourself"></textarea>

    <label>Location:</label>
    <input type="text" id="location" placeholder="Your location">

    <label>Background HTML / CSS:</label>
    <textarea id="backgroundHTML" placeholder="Add custom HTML/CSS for profile"></textarea>

    <label>Music URL (embed link):</label>
    <input type="text" id="musicURL" placeholder="Paste music embed URL">

    <button id="saveProfileBtn">Save Profile</button>
  </div>

  <h2>Your Posts</h2>
  <div id="userPostsContainer"></div>

  <script type="module" src="profile.js?v=2"></script>
</body>
</html>
