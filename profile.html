<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
<div id="profileContainer">
  <div id="themeSelector">
    <select id="presetThemeSelect">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="retro">Retro</option>
    </select>
    <button id="resetThemeBtn">Reset to Default</button>
  </div>

  <div id="profileHeader">
    <img id="profilePFP" src="default-avatar.png" alt="Profile Picture">
    <input type="file" id="pfpInput">
    <button id="savePfpBtn">Save Profile Picture</button>

    <div id="bioContainer">
      <textarea id="bioInput" placeholder="This is the bio..."></textarea>
      <button id="saveBioBtn">Save Bio</button>
    </div>

    <div id="musicContainer">
      <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify/SoundCloud link">
      <button id="addMusicBtn">Add Music</button>
      <div id="musicPlayer"></div>
    </div>
  </div>

  <div id="top10Container"></div>

  <div id="wallContainer">
    <h2>Wall</h2>
    <textarea id="wallInput" placeholder="Write on this wall..."></textarea>
    <button id="postWallBtn">Post</button>
    <div id="wallPostsContainer"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
