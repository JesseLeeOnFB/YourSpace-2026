<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="default">

<nav class="navbar">
  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<section class="profileSection">
  <h2>Profile</h2>

  <div class="profilePhotoSection">
    <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Picture">
    <input type="file" id="profilePhotoInput" accept="image/*">
    <button id="saveProfilePhotoBtn">Save Photo</button>
  </div>

  <div class="profileInfo">
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="locationInput" placeholder="Location">
    <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
    <input type="text" id="musicInput" placeholder="Embedded Music URL">
    <button id="saveProfileInfoBtn">Save Profile Info</button>
  </div>

  <div class="themeSection">
    <label for="themeSelect">Select Theme:</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>
  </div>

  <div class="friendsSection">
    <h3>Friend Requests</h3>
    <div id="friendRequestsContainer"></div>

    <h3>Friends</h3>
    <div id="friendsContainer"></div>

    <h3>Top 10 Friends</h3>
    <div id="topFriendsContainer"></div>
  </div>
</section>

<script type="module" src="profile.js"></script>
</body>
</html>
