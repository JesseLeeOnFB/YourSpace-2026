<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profilePage">
    <div class="profileHeader">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <div class="profileInfo">
        <h2 id="displayName">Your Name</h2>
        <p id="bio">Your bio goes here</p>
        <p id="location">Location</p>
      </div>
    </div>

    <!-- Upload Profile Picture -->
    <div class="profileActions">
      <input type="file" id="profilePicInput" accept="image/*">
      <button id="saveProfilePicBtn">Save Profile Picture</button>
    </div>

    <!-- Editable Bio and Location -->
    <div class="profileActions">
      <textarea id="bioInput" placeholder="Write your bio..." rows="3"></textarea>
      <input type="text" id="locationInput" placeholder="Your location">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <!-- Embedded Music -->
    <div class="profileActions">
      <input type="text" id="musicInput" placeholder="Paste music embed code or URL">
      <button id="saveMusicBtn">Save Music</button>
      <div id="musicContainer" style="margin-top:10px;"></div>
    </div>

    <!-- Top 10 Friends Box -->
    <div class="topFriends">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList">
        <!-- List populated dynamically -->
      </ul>
    </div>

    <!-- Custom HTML / Theme / Animation -->
    <div class="profileActions">
      <textarea id="customHtmlInput" placeholder="Add custom HTML or CSS" rows="5"></textarea>
      <button id="saveCustomHtmlBtn">Save Customization</button>
      <div id="customHtmlContainer" style="margin-top:10px;"></div>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
