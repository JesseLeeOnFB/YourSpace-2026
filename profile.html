<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <nav>
    <button onclick="window.location.href='feed.html'">Feed</button>
    <button onclick="window.location.href='profile.html'">Profile</button>
    <button onclick="auth.signOut()">Logout</button>
  </nav>

  <main class="profile-container">
    <section class="profile-info">
      <div class="pfp-wrapper">
        <img id="profilePfp" src="default-avatar.png" alt="Profile Picture" class="profile-pfp">
        <input type="file" id="profilePfpInput" accept="image/*">
      </div>
      <label>Username: <input type="text" id="usernameInput"></label>
      <label>Bio: <textarea id="bioInput"></textarea></label>
      <label>Location: <input type="text" id="locationInput"></label>
      <button id="saveProfileBtn">Save Profile Info</button>
    </section>

    <section class="top-friends-section">
      <h3>Top Friends</h3>
      <div class="top-friends-container"></div>
      <input type="text" id="topFriendInput" placeholder="Add a top friend">
      <button id="addTopFriendBtn">Add Top Friend</button>
    </section>

    <section class="wall-section">
      <h3>Wall Comments</h3>
      <div id="commentContainer" class="comment-container"></div>
      <input type="text" id="wallCommentInput" placeholder="Write a comment...">
      <button id="postWallCommentBtn">Post Comment</button>
    </section>

    <section class="music-section">
      <h3>Music Player</h3>
      <input type="text" id="musicInput" placeholder="Paste YouTube, Spotify, or SoundCloud link">
      <button id="saveMusicBtn">Save & Play Music</button>
      <div id="musicPlayerContainer" class="music-player-container"></div>
    </section>
  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
