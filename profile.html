<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body class="default">
  <!-- NAVIGATION -->
  <nav class="navbar">
    <button class="navBtn" data-target="feed.html">Feed</button>
    <button class="navBtn" data-target="profile.html">Profile</button>
    <button class="navBtn" data-target="messages.html">Messages</button>
    <button class="navBtn" data-target="notifications.html">Notifications</button>
  </nav>

  <main class="profile-container">
    <!-- PROFILE INFO -->
    <section class="profile-info">
      <img id="profilePfp" src="default.png" alt="Profile Picture" class="profile-picture"/>
      <input type="file" id="profilePfpInput"/>
      <button id="saveProfilePfpBtn">Save Profile Picture</button>

      <input type="text" id="usernameInput" placeholder="Username"/>
      <input type="text" id="bioInput" placeholder="Bio"/>
      <input type="text" id="locationInput" placeholder="Location"/>
      <button id="saveProfileBtn">Save Profile Info</button>
    </section>

    <!-- WALL COMMENTS -->
    <section class="wall-comments">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer" class="comments-container"></div>
      <input type="text" id="wallCommentInput" placeholder="Write a comment..."/>
      <button id="addWallCommentBtn">Post Comment</button>
    </section>

    <!-- TOP 10 FRIENDS -->
    <section class="top-friends">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer" class="friends-container"></div>
      <button id="editTop10Btn">Edit Top 10</button>
    </section>

    <!-- THEME SELECTION -->
    <section class="themes">
      <h3>Select Theme</h3>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="black-neon">Black Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </section>

    <!-- MUSIC PLAYER -->
    <section class="music-player">
      <h3>Music Player</h3>
      <input type="text" id="musicInput" placeholder="Paste YouTube/SoundCloud link"/>
      <button id="loadMusicBtn">Load Music</button>
      <div id="musicContainer" class="music-container"></div>
    </section>
  </main>
</body>
<script src="profile.js"></script>
</html>
