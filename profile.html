<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profile">
    <h2>My Profile</h2>
    <div class="profilePhotoSection">
      <img id="profilePhotoPreview" src="default-avatar.png" alt="Profile Photo" style="max-width:150px; max-height:150px;">
      <input type="file" id="profilePhotoInput" accept="image/*">
    </div>

    <div class="profileFields">
      <label>Username: <input type="text" id="usernameInput" placeholder="Enter username"></label>
      <label>Bio: <textarea id="bioInput" placeholder="Write your bio..."></textarea></label>
      <label>Location: <input type="text" id="locationInput" placeholder="Enter location"></label>
      <label>Custom HTML / Embedded Music:</label>
      <textarea id="customHTMLInput" placeholder="Paste HTML or music embed code here..." rows="5"></textarea>
    </div>

    <h3>Top 10 Friends</h3>
    <div id="topFriendsContainer">
      <!-- dynamically loaded friend list -->
    </div>

    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHMbxr7rJS88ZefVJzt8p_9CCTstLmLU8",
      authDomain: "yourspace-2026.firebaseapp.com",
      projectId: "yourspace-2026",
      storageBucket: "yourspace-2026.appspot.com",
      messagingSenderId: "72667267302",
      appId: "1:72667267302:web:2bed5f543e05d49ca8fb27"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const homeBtn = document.getElementById("homeBtn");
    const profileBtn = document.getElementById("profileBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const profilePhotoInput = document.getElementById("profilePhotoInput");
    const profilePhotoPreview = document.getElementById("profilePhotoPreview");
    const usernameInput = document.getElementById("usernameInput");
    const bioInput = document.getElementById("bioInput");
    const locationInput = document.getElementById("locationInput");
    const customHTMLInput = document.getElementById("customHTMLInput");
    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const topFriendsContainer = document.getElementById("topFriendsContainer");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      // Nav
      homeBtn.onclick = () => window.location.href = "feed.html";
      profileBtn.onclick = () => window.location.href = "profile.html";
      logoutBtn.onclick = async () => {
        await signOut(auth);
        window.location.href = "index.html";
      };

      // Load user profile
      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);
      if (userSnap.exists()) {
        const data = userSnap.data();
        usernameInput.value = data.displayName || "";
        bioInput.value = data.bio || "";
        locationInput.value = data.location || "";
        customHTMLInput.value = data.customHTML || "";
        if (data.photoURL) profilePhotoPreview.src = data.photoURL;

        // Load top 10 friends if exist
        topFriendsContainer.innerHTML = "";
        (data.topFriends || []).forEach(friend => {
          const fEl = document.createElement("div");
          fEl.textContent = friend;
          topFriendsContainer.appendChild(fEl);
        });
      }

      // Upload new profile photo
      profilePhotoInput.onchange = async () => {
        const file = profilePhotoInput.files[0];
        if (!file) return;
        profilePhotoPreview.src = URL.createObjectURL(file);
      };

      // Save profile
      saveProfileBtn.onclick = async () => {
        saveProfileBtn.disabled = true;
        let photoURL = profilePhotoPreview.src;

        // Upload photo if changed
        if (profilePhotoInput.files.length > 0) {
          const file = profilePhotoInput.files[0];
          let contentType = file.type;
          if (!contentType) {
            const ext = file.name.split(".").pop().toLowerCase();
            if (["jpg","jpeg","png","gif"].includes(ext)) contentType = "image/jpeg";
          }

          const storageRef = ref(storage, `profileImages/${user.uid}/${Date.now()}_${file.name}`);
          const snapshot = await uploadBytes(storageRef, file, { contentType });
          photoURL = await getDownloadURL(snapshot.ref);
        }

        await setDoc(userRef, {
          displayName: usernameInput.value.trim(),
          bio: bioInput.value.trim(),
          location: locationInput.value.trim(),
          customHTML: customHTMLInput.value.trim(),
          photoURL: photoURL,
          topFriends: Array.from(topFriendsContainer.children).map(c => c.textContent)
        }, { merge: true });

        alert("Profile saved!");
        saveProfileBtn.disabled = false;
      };
    });
  </script>
</body>
</html>
