<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAV BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>My Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePhotoContainer">
      <img id="profilePicImg" src="" alt="Profile Picture" class="profilePhoto">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL (YouTube)">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <!-- Theme Selector -->
    <div class="customizationSection">
      <label for="themeSelect">Select Theme:</label>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- Top Friends Section -->
    <div class="topFriendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
      <input type="text" id="addTopFriendInput" placeholder="Add friend username">
      <button id="addTopFriendBtn">Add Top Friend</button>
    </div>

    <!-- Search Users Section -->
    <div class="searchUsersSection">
      <h3>Search Users</h3>
      <input type="text" id="searchUserInput" placeholder="Enter username">
      <button id="searchUserBtn">Search</button>
      <ul id="searchResults"></ul>
    </div>

  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
