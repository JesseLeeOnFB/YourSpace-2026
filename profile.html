<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="feedBtn">Feed</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <section class="profileSection">
    <h2>Your Profile</h2>
    
    <!-- Profile Image -->
    <div class="profileImageUpload">
      <img id="profilePhotoPreview" src="" alt="Profile Photo" style="max-width:150px; max-height:150px; display:block;">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="savePhotoBtn">Save Photo</button>
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <label>Username</label>
      <input type="text" id="usernameInput" placeholder="Username">
      
      <label>Location</label>
      <input type="text" id="locationInput" placeholder="Location">
      
      <label>Bio</label>
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      
      <label>Embedded Music URL</label>
      <input type="text" id="musicInput" placeholder="Music URL">
      
      <button id="saveInfoBtn">Save Info</button>
    </div>

    <!-- Top 10 Friends -->
    <div class="topFriends">
      <h3>Top 10 Friends</h3>
      <div id="friendsContainer"></div>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
