<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

<nav class="navbar">
  <button id="homeBtn">Home</button>
  <button id="feedBtn">Feed</button>
  <button id="logoutBtn">Logout</button>
</nav>

<section class="profileSection">

  <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Photo">

  <input type="file" id="profilePhotoInput">
  <button id="saveProfilePhotoBtn">Save Profile Photo</button>

  <input type="text" id="usernameInput" placeholder="Username">
  <input type="text" id="locationInput" placeholder="Location">
  <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>

  <input type="text" id="musicInput" placeholder="YouTube Music Link">
  <button id="saveProfileBtn">Save Profile</button>

</section>

<section class="customizationSection">

  <h3>YourSpace Theme</h3>
  <select id="themeSelect">
    <option value="default">Default</option>
    <option value="dark">Dark</option>
    <option value="neon">Neon</option>
    <option value="animated">Animated</option>
  </select>
  <button id="saveThemeBtn">Save Theme</button>

  <h3>YourSpace Custom HTML</h3>
  <textarea id="customHTMLInput" rows="6"
    placeholder="Advanced users only (HTML/CSS)">
  </textarea>
  <button id="saveCustomHTMLBtn">Save Custom HTML</button>

  <div id="customHTMLContainer"></div>

</section>

<script type="module" src="profile.js"></script>
</body>
</html>
