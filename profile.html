<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <button onclick="location.href='feed.html'">Home</button>
  <button onclick="location.href='profile.html'">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<div class="container">
  <h2>Profile</h2>
  <input type="text" id="displayName" placeholder="Display Name">
  <input type="text" id="bio" placeholder="Bio">
  <input type="text" id="location" placeholder="Location">
  <input type="text" id="musicURL" placeholder="Music URL (<audio> embed)">

  <input type="file" id="photoFile">
  <textarea id="themeCSS" placeholder="Custom CSS/HTML for profile"></textarea>

  <button id="saveProfileBtn">Save Profile</button>
  <div id="userPosts"></div>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
