<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - YourSpace 2026</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="profile-page">
  <h1 id="username">Username</h1>
  <img id="profile-img" src="assets/default-profile.png" alt="Profile Image">
  <input type="file" id="profile-image-upload">
  <textarea id="profile-bio" placeholder="Write your bio..."></textarea>
  <input type="url" id="profile-music" placeholder="Profile music embed link">
  <select id="theme-selector">
    <option value="default">Default</option>
    <option value="dark">Dark</option>
    <option value="retro">Retro</option>
  </select>
  <button id="save-profile-btn">Save Profile</button>

  <h2>Friends</h2>
  <div id="friends-list"></div>
  <h2>Analytics</h2>
  <div id="analytics-dashboard"></div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
