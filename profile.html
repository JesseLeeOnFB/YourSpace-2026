<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <nav class="navbar">
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="profile-container">
    <section class="profile-header">
      <div class="pfp-container">
        <img id="profilePfp" src="default.png" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>
      <div class="profile-info">
        <input type="text" id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input type="text" id="locationInput" placeholder="Location">
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </section>

    <section class="profile-wall">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Post Comment</button>
    </section>

    <section class="friends-section">
      <h2>Friend Requests</h2>
      <input type="text" id="friendSearchInput" placeholder="Search users">
      <div id="friendSearchPreview"></div>
      
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer"></div>

      <h2>All Friends</h2>
      <div id="allFriendsContainer"></div>

      <h2>Pending Friend Requests</h2>
      <div id="pendingRequestsContainer"></div>
    </section>

    <section class="music-player-section">
      <h2>Music Player</h2>
      <input type="text" id="musicUrlInput" placeholder="Enter audio/video URL">
      <button id="playMusicBtn">Play</button>
      <div id="musicPlayerContainer"></div>
    </section>

    <section class="profile-layouts">
      <h2>Profile Customization / Layouts</h2>
      <!-- Presets, themes, custom HTML insert -->
      <div id="profileLayoutsContainer"></div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
