<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>Your Profile</h2>
    
    <!-- Profile Picture Upload -->
    <div class="profilePictureContainer">
      <img id="profilePicPreview" src="" alt="Profile Picture" style="display:none;">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <!-- Profile Info Inputs -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
    </div>

    <button id="saveProfileBtn">Save Profile</button>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
