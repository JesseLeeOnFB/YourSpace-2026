<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="default-theme">
  <header class="navbar">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </header>

  <main class="profile-main">

    <!-- Top Section: PFP + Info -->
    <div class="profile-top">
      <div class="pfp-container">
        <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
        <input type="file" id="pfpUpload">
      </div>
      <div class="profile-info-box">
        <input id="profileUsername" placeholder="Username">
        <textarea id="profileBio" placeholder="Bio"></textarea>
        <button id="saveProfileBtn">Save Profile</button>
      </div>
    </div>

    <!-- Top 10 Friends -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
      <button id="editTop10Btn">Edit Top 10</button>
    </div>

    <!-- Wall Comments -->
    <div class="wall-container">
      <h3>Wall</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Leave a comment..."></textarea>
      <button id="postWallCommentBtn">Post Comment</button>
    </div>

    <!-- Music Player -->
    <div class="music-player">
      <h3>Music Player</h3>
      <input type="text" id="musicInput" placeholder="Paste music embed URL">
      <iframe id="musicIframe" src="" frameborder="0"></iframe>
      <button id="saveMusicBtn">Save Music</button>
    </div>

    <!-- Custom HTML / Full Page Background -->
    <div class="custom-html-container">
      <h3>Custom Profile HTML / CSS / JS</h3>
      <textarea id="customHtmlInput" placeholder="Drop custom HTML/CSS/JS here"></textarea>
      <button id="saveCustomHtmlBtn">Apply Custom Code</button>
    </div>

  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
