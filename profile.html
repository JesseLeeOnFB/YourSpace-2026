<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body class="theme-dark">

<!-- Navigation -->
<nav id="topnav">
  <ul>
    <li><button id="feedNavBtn">Feed</button></li>
    <li><button id="profileNavBtn">Profile</button></li>
  </ul>
</nav>

<!-- Profile Info -->
<section id="profileSection">
  <img id="profilePic" src="default-avatar.png" alt="Profile Picture" class="profile-avatar">
  <h2 id="profileName">User Name</h2>
  <p id="profileBio">This is the bio lol</p>

  <!-- Edit Own Profile -->
  <input type="text" id="bioInput" placeholder="Edit bio">
  <button id="saveBioBtn">Save Bio</button>

  <input type="file" id="pfpInput">
  <button id="savePfpBtn">Change Profile Picture</button>

  <select id="themeSelect">
    <option value="dark">Dark</option>
    <option value="light">Light</option>
    <option value="retro">Retro</option>
  </select>
</section>

<!-- Wall Comments -->
<section id="wallSection">
  <h3>Wall</h3>
  <input type="text" id="wallInput" placeholder="Write on wall">
  <button id="postWallBtn">Post</button>
  <div id="wallContainer"></div>
</section>

<!-- Top 10 Friends -->
<section id="top10Section">
  <h3>Top 10 Friends</h3>
  <div id="top10FriendsContainer"></div>
</section>

<!-- Music Player -->
<section id="musicSection">
  <h3>Music Playlist</h3>
  <input type="text" id="musicInput" placeholder="Paste YouTube, Spotify, SoundCloud link">
  <button id="addMusicBtn">Add Song</button>
  <div id="musicPlaylistContainer"></div>
  <iframe id="musicPlayerIframe" width="300" height="80" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</section>

<!-- Firebase & JS -->
<script type="module" src="profile.js"></script>
</body>
</html>
