<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <div class="profilePhotoContainer">
      <img id="profilePhoto" src="default-avatar.png" alt="Profile Photo">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Profile Photo</button>
    </div>

    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <!-- THEME SELECTION -->
    <div class="customizationSection">
      <h3>Theme</h3>
      <select id="themeSelect">
        <option value="">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- TOP FRIENDS -->
    <div class="topFriendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
      <input type="text" id="addTopFriendInput" placeholder="Add Top Friend (username)">
      <button id="addTopFriendBtn">Add Top Friend</button>
    </div>

    <!-- SEARCH USER -->
    <div class="searchUserSection">
      <h3>Search Users</h3>
      <input type="text" id="searchUserInput" placeholder="Enter username">
      <button id="searchUserBtn">Search</button>
      <div id="searchResults"></div>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="musicPlayerSection">
      <h3>Music Player</h3>
      <iframe id="musicPlayer" width="300" height="80" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <button id="saveMusicBtn">Save Music</button>
    </div>

  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
