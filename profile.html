<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="default">

<!-- NAV -->
<nav class="navbar">
  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="logoutBtn">Logout</button>
</nav>

<!-- PROFILE INFO -->
<section class="profileSection">
  <h2>Your Profile</h2>
  <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Photo">
  <input type="file" id="profilePhotoInput" accept="image/*">
  <button id="profilePhotoSaveBtn">Save Profile Photo</button>

  <div>
    <label>Username:</label>
    <input type="text" id="usernameInput">
  </div>
  <div>
    <label>Bio:</label>
    <textarea id="bioInput" rows="3"></textarea>
  </div>
  <div>
    <label>Location:</label>
    <input type="text" id="locationInput">
  </div>
  <button id="profileInfoSaveBtn">Save Profile Info</button>
</section>

<!-- MUSIC PLAYER -->
<section class="musicPlayerSection">
  <h3>Music Player</h3>
  <input type="text" id="musicInput" placeholder="YouTube URL">
  <button id="musicSaveBtn">Save Music</button>
  <div id="musicPlayerContainer"></div>
</section>

<!-- TOP FRIENDS -->
<section class="topFriendsSection">
  <h3>Top 10 Friends</h3>
  <div id="topFriendsContainer"></div>
</section>

<!-- USER POSTS -->
<section class="userPostsSection">
  <h3>Your Posts</h3>
  <div id="userPostsContainer"></div>
</section>

<!-- SEARCH USERS -->
<section class="searchSection">
  <h3>Find Users</h3>
  <input type="text" id="searchInput" placeholder="Enter username">
  <button id="searchBtn">Search</button>
  <div id="searchResults"></div>
</section>

<script type="module" src="profile.js"></script>
</body>
</html>
