<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>

<div id="navbar">
  <span id="nav-home" class="nav-btn">Home</span>
  <span id="nav-feed" class="nav-btn">Feed</span>
  <span id="nav-messages" class="nav-btn">Messages</span>
  <span id="nav-notifications" class="nav-btn">Notifications <span id="notif-badge">0</span></span>
</div>

<div id="profile-container">

  <!-- Profile Picture & Info -->
  <div id="profile-info">
    <div id="pfp-container">
      <img id="profilePfp" src="default.png" alt="Profile Picture">
      <input type="file" id="profilePfpInput">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
    </div>
    <div id="profile-fields">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="bioInput" placeholder="Bio">
      <input type="text" id="locationInput" placeholder="Location">
      <button id="saveProfileBtn">Save Info</button>
    </div>
  </div>

  <!-- Comment Wall -->
  <div id="wall-container">
    <h3>Wall Comments</h3>
    <div id="wallCommentsContainer"></div>
    <input type="text" id="wallCommentInput" placeholder="Write a comment...">
    <button id="addWallCommentBtn">Post Comment</button>
  </div>

  <!-- Top 10 Friends -->
  <div id="top10-container">
    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer"></div>
    <button id="editTop10Btn">Edit Top 10</button>
  </div>

  <!-- Preset Themes -->
  <div id="themes-container">
    <h3>Preset Themes</h3>
    <button class="theme-btn" data-theme="default">Default</button>
    <button class="theme-btn" data-theme="gradient">Gradient</button>
    <button class="theme-btn" data-theme="neon">Neon</button>
  </div>

  <!-- Music Player -->
  <div id="music-container">
    <input type="text" id="musicInput" placeholder="Paste YouTube/SoundCloud/Spotify link">
    <button id="loadMusicBtn">Load Music</button>
    <div id="musicPlayerContainer"></div>
  </div>

  <!-- Notifications -->
  <div id="notifications-container" class="hidden">
    <h3>Notifications</h3>
    <div id="notificationsList"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
