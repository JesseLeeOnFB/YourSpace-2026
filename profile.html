<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="default">

  <!-- NAV BAR -->
  <nav class="navbar">
    <button id="navHome">Home</button>
    <button id="navFeed">Feed</button>
    <button id="navLogout">Logout</button>
  </nav>

  <main class="profilePage">

    <!-- PROFILE HEADER -->
    <section class="profileHeader">
      <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Photo">
      <input type="file" id="profilePhotoInput" accept="image/*">
    </section>

    <!-- PROFILE INFO -->
    <section class="profileSection">
      <label>Username</label>
      <input id="usernameInput" type="text">

      <label>Bio</label>
      <textarea id="bioInput"></textarea>

      <label>Location</label>
      <input id="locationInput" type="text">

      <button id="saveProfileBtn">Save Profile</button>
    </section>

    <!-- THEME -->
    <section class="customizationSection">
      <label>Profile Theme</label>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </section>

    <!-- MUSIC -->
    <section class="musicPlayerSection">
      <label>Music (YouTube URL)</label>
      <input id="musicInput" type="text">
      <button id="saveMusicBtn">Save Music</button>
      <div id="musicPlayer"></div>
    </section>

  </main>

  <!-- ⚠️ THIS IS CRITICAL -->
  <script type="module" src="profile.js"></script>
</body>
</html>
