<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Page -->
  <section class="profilePage">

    <!-- Profile Header -->
    <div class="profileHeader">
      <img id="profilePhoto" src="https://via.placeholder.com/100" alt="Profile Photo">
      <div>
        <input type="file" id="profilePhotoInput" accept="image/*">
      </div>
    </div>

    <!-- Profile Details -->
    <div class="profileDetails">
      <label for="username">Username:</label>
      <input type="text" id="username" placeholder="Enter your username">

      <label for="bio">Bio:</label>
      <textarea id="bio" rows="3" placeholder="Enter your bio"></textarea>

      <label for="location">Location:</label>
      <input type="text" id="location" placeholder="Enter your location">

      <label for="music">Embedded Music URL (Spotify / YouTube):</label>
      <input type="text" id="music" placeholder="Paste embed URL">

      <button id="saveProfileBtn">Save Profile</button>
    </div>

    <!-- Top 10 Friends -->
    <div class="topFriends">
      <h3>Top 10 Friends</h3>
      <div class="topFriendsList" id="topFriendsList">
        <!-- Dynamically filled -->
      </div>
    </div>

  </section>

  <!-- Search Users -->
  <section class="searchUsers">
    <h3>Find Friends</h3>
    <input type="text" id="searchUserInput" placeholder="Search by username or email">
    <button id="searchUserBtn">Search</button>
    <div id="searchResults"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
