<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="topNav">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <div class="profile-container">
    <div class="profile-header">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <h1 id="profileName">Username</h1>
      <p id="profileBio">This is the bio lol</p>
      <input type="file" id="pfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>
      <textarea id="bioInput" placeholder="Update your bio"></textarea>
      <button id="saveBioBtn">Save Bio</button>
    </div>

    <!-- Music Playlist -->
    <div class="music-container">
      <h3>Music Player</h3>
      <input type="text" id="musicInput" placeholder="Paste song link here">
      <button id="addSongBtn">Add Song</button>
      <ul id="musicPlaylist"></ul>
      <audio id="musicPlayer" controls></audio>
    </div>

    <!-- Top 10 Friends -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
    </div>

    <!-- Wall Comments -->
    <div class="wall-container">
      <h3>Wall Comments</h3>
      <div id="wallContainer"></div>
      <textarea id="wallInput" placeholder="Write on the wall"></textarea>
      <button id="postWallBtn">Post</button>
    </div>

    <!-- Theme Selector -->
    <div class="theme-selector">
      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>
    </div>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
