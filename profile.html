<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="default-theme">

  <!-- Navbar -->
  <div class="navbar">
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="navNotifications">Notifications</button>
  </div>

  <main class="profile-main">
    
    <!-- Top Section: Profile Picture + Info -->
    <div class="profile-top">
      <div class="pfp-container">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>

      <div class="profile-info-box">
        <input id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input id="locationInput" placeholder="Location">
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </div>

    <!-- Wall Comments -->
    <div class="wall-container">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Post Comment</button>
    </div>

    <!-- Top 10 Friends -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
      <button id="editTop10Btn">Edit Top 10</button>
    </div>

    <!-- Theme Selector -->
    <div class="theme-custom-box">
      <h3>Theme</h3>
      <select id="themeSelect">
        <option value="default-theme">Default</option>
        <option value="red-theme">Red</option>
        <option value="blue-theme">Blue</option>
        <option value="green-theme">Green</option>
        <option value="neon-theme">Neon</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>

      <h3>Custom HTML / Background</h3>
      <textarea id="customHtmlInput" placeholder="Enter custom HTML or CSS"></textarea>
      <div id="customHtmlContainer"></div>
    </div>

    <!-- Music Player -->
    <div class="music-player">
      <h3>Music Player</h3>
      <input id="musicLinkInput" placeholder="Paste YouTube/SoundCloud/Spotify link">
      <button id="saveMusicBtn">Play Music</button>
      <iframe id="musicIframe" allow="autoplay"></iframe>
    </div>

  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script src="profile.js" type="module"></script>
</body>
</html>
