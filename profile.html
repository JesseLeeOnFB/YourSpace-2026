<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>Profile</h2>
    <div class="profilePhotoSection">
      <img id="profilePhoto" src="default-avatar.png" alt="Profile Photo" class="profilePhoto">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="savePhotoBtn">Save Profile Picture</button>
    </div>

    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveInfoBtn">Save Profile Info</button>
    </div>
  </section>

  <!-- CUSTOMIZATION SECTION -->
  <section class="customizationSection">
    <h2>Profile Customization</h2>
    <label for="themeSelect">Choose Theme:</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>

    <h3>Custom HTML (Optional)</h3>
    <textarea id="customHtmlInput" rows="5" placeholder="Enter HTML for your profile background, banners, etc."></textarea>
    <button id="saveHtmlBtn">Save Custom HTML</button>
  </section>

  <!-- MUSIC PLAYER SECTION -->
  <section class="musicPlayerSection">
    <h2>Music Player</h2>
    <div id="musicPlayerContainer"></div>
  </section>

  <!-- TOP 10 FRIENDS -->
  <section class="friendsSection">
    <h2>Top 10 Friends</h2>
    <ul id="friendsList"></ul>
    <input type="text" id="addFriendInput" placeholder="Add friend by username">
    <button id="addFriendBtn">Add Friend</button>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
