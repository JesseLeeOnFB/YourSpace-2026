<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css?v=1">
</head>
<body>
<nav>
  <button id="homeBtn">Home</button>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Your Profile</h1>

<div id="profileContainer">
  <div>
    <img id="profilePic" src="default.png" alt="Profile Picture" class="profile-pic">
    <input type="file" id="profilePicInput">
  </div>
  <div>
    <label>Display Name:</label>
    <input type="text" id="displayNameInput" placeholder="Your Name">
  </div>
  <div>
    <label>Bio:</label>
    <textarea id="bioInput" placeholder="Your Bio"></textarea>
  </div>
  <div>
    <label>Location:</label>
    <input type="text" id="locationInput" placeholder="Location">
  </div>
  <div>
    <label>Music Embed (URL):</label>
    <input type="text" id="musicInput" placeholder="YouTube / SoundCloud embed link">
  </div>
  <div>
    <label>Custom HTML for background:</label>
    <textarea id="customHtmlInput" placeholder="Custom HTML for your profile background"></textarea>
  </div>

  <button id="saveProfileBtn">Save Profile</button>
</div>

<h2>Your Posts</h2>
<div id="profilePostsContainer"></div>

<script type="module" src="profile.js?v=1"></script>
</body>
</html>
