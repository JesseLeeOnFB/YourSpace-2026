<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="feedBtn">Feed</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- Profile Photo -->
    <div class="profilePhotoContainer">
      <img id="profilePhotoImg" src="default-avatar.png" alt="Profile Photo" class="profilePhoto">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="savePhotoBtn">Save Profile Photo</button>
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>
  </section>

  <!-- Top 10 Friends -->
  <section class="friendsSection">
    <h3>Top 10 Friends</h3>
    <ul id="friendsList"></ul>
  </section>

  <!-- Search Users -->
  <section class="searchSection">
    <h3>Search Users</h3>
    <input type="text" id="searchInput" placeholder="Search by username">
    <button id="searchBtn">Search</button>
    <div id="searchResults"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
