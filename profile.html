<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <button onclick="window.location.href='feed.html'">Feed</button>
    <button onclick="window.location.href='profile.html'">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE -->
  <section class="profile-container">

    <img id="profilePfp" class="profile-pfp" src="default-avatar.png">
    <input type="file" id="profilePfpInput" accept="image/*">

    <input id="usernameInput" placeholder="Username">
    <textarea id="bioInput" placeholder="Bio"></textarea>
    <input id="locationInput" placeholder="Location">

    <button id="saveProfileBtn">Save Profile</button>

    <!-- TOP FRIENDS -->
    <h3>Top Friends</h3>
    <input id="topFriendInput" placeholder="Add friend username">
    <button id="addTopFriendBtn">Add</button>
    <div class="top-friends-container"></div>

    <!-- WALL -->
    <h3>Wall</h3>
    <input id="wallCommentInput" placeholder="Leave a comment">
    <button id="postWallCommentBtn">Post</button>
    <div id="commentContainer"></div>

    <!-- MUSIC -->
    <h3>Music</h3>
    <input id="musicInput" placeholder="Paste music link">
    <button id="saveMusicBtn">Save Music</button>
    <div id="musicPlayerContainer"></div>

  </section>

  <!-- SCRIPTS -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="auth-guard.js"></script>
  <script type="module" src="profile.js"></script>

</body>
</html>
