<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <!-- Navigation Bar -->
  <header id="topnav">
    <ul>
      <li><a href="feed.html">Feed</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="messages.html">Messages</a></li>
      <li><button id="logoutBtn">Logout</button></li>
    </ul>
  </header>

  <!-- Main Profile Container -->
  <div class="profile-container">
    <!-- Profile Info Box -->
    <div class="profile-box">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture" class="profile-avatar">
      <h1 id="profileName">YourSpace User</h1>
      <p id="profileBio">This is the bio lol</p>

      <!-- Edit Own Profile -->
      <div class="edit-section">
        <textarea id="bioInput" placeholder="Update your bio"></textarea>
        <button id="saveBioBtn">Save Bio</button>

        <input type="file" id="pfpInput" accept="image/*">
        <button id="savePfpBtn">Save Profile Picture</button>

        <select id="themeSelect">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="retro">Retro</option>
        </select>
      </div>
    </div>

    <!-- Top 10 Friends Box -->
    <div class="profile-box">
      <h2>Top 10 Friends</h2>
      <div id="top10List" class="top10-container">
        <!-- Dynamically filled via JS -->
      </div>
    </div>

    <!-- Wall Comments Box -->
    <div class="profile-box">
      <h2>Wall</h2>
      <textarea id="wallInput" placeholder="Write on this user's wall"></textarea>
      <button id="postWallBtn">Post</button>
      <div id="wallContainer" class="wall-container">
        <!-- Wall posts loaded here -->
      </div>
    </div>

    <!-- Music Playlist Box -->
    <div class="profile-box">
      <h2>Music Playlist</h2>
      <div id="playlistContainer" class="playlist-container">
        <!-- Playlist songs loaded here -->
      </div>
      <audio id="musicPlayer" controls></audio>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="profile.js"></script>
  <script type="module" src="auth-guard.js"></script>
</body>
</html>
