<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="profilePage">

    <section class="profileSection">
      <h2>Your Profile</h2>

      <!-- Profile Picture -->
      <div class="profilePhotoSection">
        <img id="profilePicPreview" src="" alt="Profile Picture" class="profilePhoto">
        <input type="file" id="profilePicInput" accept="image/*">
        <button id="saveProfilePicBtn">Save Profile Photo</button>
      </div>

      <!-- Profile Info -->
      <div class="profileInfoSection">
        <label>Username:
          <input type="text" id="usernameInput">
        </label>
        <label>Location:
          <input type="text" id="locationInput">
        </label>
        <label>Bio:
          <textarea id="bioInput" rows="3"></textarea>
        </label>
        <label>Music URL:
          <input type="text" id="musicInput" placeholder="YouTube link or similar">
        </label>
        <button id="saveProfileInfoBtn">Save Profile Info</button>
      </div>

      <!-- Theme Selection -->
      <div class="themeSection">
        <label>Theme:
          <select id="themeSelect">
            <option value="default">Default</option>
            <option value="dark">Dark</option>
            <option value="neon">Neon</option>
            <option value="animated">Animated</option>
          </select>
        </label>
        <button id="saveThemeBtn">Save Theme</button>
      </div>

      <!-- Top 10 Friends -->
      <div class="topFriendsSection">
        <h3>Top 10 Friends</h3>
        <div id="topFriendsList"></div>
      </div>

    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
