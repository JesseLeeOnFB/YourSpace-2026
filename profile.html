<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Photo Section -->
  <section class="profileSection">
    <h2>Profile Photo</h2>
    <img id="profilePhotoDisplay" src="default.jpg" class="profilePhoto">
    <input type="file" id="profilePhotoInput" accept="image/*">
    <button id="saveProfilePhotoBtn">Save Profile Photo</button>
  </section>

  <!-- Profile Info Section -->
  <section class="profileSection">
    <h2>Profile Info</h2>
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="locationInput" placeholder="Location">
    <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
    <input type="text" id="musicInput" placeholder="Embedded Music URL">
    <button id="saveProfileInfoBtn">Save Info</button>
  </section>

  <!-- Theme Customization -->
  <section class="customizationSection">
    <h2>Theme</h2>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>
  </section>

  <!-- Top 10 Friends -->
  <section class="friendsSection">
    <h2>Top 10 Friends</h2>
    <ul id="topFriendsList"></ul>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
