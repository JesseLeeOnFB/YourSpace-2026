<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
</head>
<body class="default-theme">
  <!-- NAVIGATION -->
  <div class="navbar">
    <button id="navFeedBtn">Feed</button>
    <button id="navProfileBtn">Profile</button>
    <button id="navMessagesBtn">Messages</button>
    <button id="navNotificationsBtn">Notifications</button>
  </div>

  <!-- PROFILE MAIN -->
  <div class="profile-main">

    <!-- PROFILE TOP -->
    <div class="profile-top">

      <!-- PROFILE PICTURE -->
      <div class="pfp-container">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="pfpInput">
        <button id="savePfpBtn">Save Profile Picture</button>
      </div>

      <!-- PROFILE INFO -->
      <div class="profile-info-box">
        <input id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input id="locationInput" placeholder="Location">
        <select id="themeSelect">
          <option value="default-theme">Default</option>
          <option value="red-theme">Red</option>
          <option value="blue-theme">Blue</option>
          <option value="green-theme">Green</option>
          <option value="neon-theme">Neon</option>
        </select>
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </div>

    <!-- WALL COMMENTS -->
    <div class="wall-container">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="postWallCommentBtn">Post Comment</button>
    </div>

    <!-- TOP 10 FRIENDS -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
      <button id="editTop10Btn">Save Top 10 Order</button>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="music-player">
      <h3>Music Player</h3>
      <input id="musicInput" placeholder="Paste YouTube or SoundCloud link">
      <iframe id="musicIframe"></iframe>
    </div>

    <!-- CUSTOM HTML / THEMES -->
    <div class="theme-custom-box">
      <h3>Custom HTML / Background</h3>
      <textarea id="customHtmlInput" placeholder="Enter HTML/CSS/JS for customizations"></textarea>
      <div id="customHtmlContainer"></div>
    </div>

  </div>

  <script src="profile.js?cb=<?=Date.now()?>"></script>
</body>
</html>
