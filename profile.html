<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
<script type="module" src="profile.js" defer></script>
</head>
<body class="default-theme">
  <!-- Navbar -->
  <div class="navbar">
    <button id="feedBtn">Feed</button>
    <button id="profileBtn">Profile</button>
    <button id="notificationsBtn">Notifications</button>
    <button id="messagesBtn">Messages</button>
    <button id="settingsBtn">Settings</button>
  </div>

  <main class="profile-main">
    <!-- Profile Top Section -->
    <div class="profile-top">
      <div class="pfp-container">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>

      <div class="profile-info-box">
        <input id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Bio"></textarea>
        <input id="locationInput" placeholder="Location">
        <button id="saveProfileBtn">Save Profile Info</button>
        <select id="themeSelect">
          <option value="default-theme">Default</option>
          <option value="red-theme">Red</option>
          <option value="blue-theme">Blue</option>
          <option value="green-theme">Green</option>
          <option value="neon-theme">Neon</option>
        </select>
        <button id="saveThemeBtn">Save Theme</button>
      </div>
    </div>

    <!-- Wall Comments -->
    <div class="wall-container">
      <h3>Comment Wall</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Post Comment</button>
    </div>

    <!-- Top 10 Friends -->
    <div class="top10-container">
      <h3>Top 10 Friends (Drag & Drop)</h3>
      <div id="top10FriendsContainer"></div>
      <h4>All Users</h4>
      <div id="allUsersContainer"></div>
    </div>

    <!-- Music Player -->
    <div class="music-player">
      <h3>Music Player</h3>
      <input type="text" id="musicUrlInput" placeholder="Enter YouTube/SoundCloud/Spotify link">
      <button id="loadMusicBtn">Load Music</button>
      <iframe id="musicIframe" allow="autoplay"></iframe>
      <button id="pauseMusicBtn">Pause Music</button>
    </div>

    <!-- Custom HTML/Themes -->
    <div class="theme-custom-box">
      <h3>Custom HTML / Backgrounds / Animations</h3>
      <textarea id="customHtmlInput" placeholder="Paste custom HTML/CSS/JS here"></textarea>
      <button id="saveCustomHtmlBtn">Apply</button>
      <div id="customHtmlContainer"></div>
    </div>

    <!-- Private Messaging -->
    <div class="private-messages">
      <h3>Private Messaging</h3>
      <input id="pmRecipient" placeholder="Recipient Username">
      <textarea id="pmMessage" placeholder="Write a message..."></textarea>
      <button id="sendPmBtn">Send Message</button>
      <h4>Inbox</h4>
      <div id="pmInbox"></div>
    </div>
  </main>
</body>
</html>
