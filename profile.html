<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAV -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="feedBtn">Feed</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- PROFILE PHOTO -->
    <div class="profilePhotoWrapper">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>
    <button id="uploadProfileBtn">Upload Profile Photo</button>

    <!-- PROFILE INFO -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
    </div>
    <div class="musicPlayerSection">
      <input type="text" id="musicInput" placeholder="Embedded music URL">
      <button id="musicSaveBtn">Save Music</button>
    </div>

    <button id="saveProfileBtn">Save Profile Info</button>

    <!-- THEME SELECTION -->
    <div class="customizationSection">
      <label for="themeSelect">Choose Theme:</label>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- TOP FRIENDS -->
    <div class="topFriendsSection">
      <h3>Top Friends</h3>
      <div id="topFriendsContainer"></div>
    </div>

    <!-- SEARCH USERS -->
    <div class="searchUsersSection">
      <h3>Search Users</h3>
      <input type="text" id="searchInput" placeholder="Enter username">
      <button id="searchBtn">Search</button>
      <div id="searchResults"></div>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
