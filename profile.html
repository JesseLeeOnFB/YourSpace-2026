<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body>

  <!-- Navigation -->
  <nav id="navBar">
    <button class="navBtn">Home</button>
    <button class="navBtn">Profile</button>
    <button class="navBtn">Messages</button>
    <button class="navBtn">Notifications</button>
    <button class="navBtn">Settings</button>
  </nav>

  <main id="profileMain">

    <!-- Profile Info Container -->
    <section id="profileInfo" class="container">
      <div id="pfpContainer">
        <img id="profilePfp" src="" alt="Profile Picture">
        <input type="file" id="profilePfpInput">
        <button id="saveProfilePfpBtn">Save Profile Picture</button>
      </div>

      <div id="infoFields">
        <label>Username: <input type="text" id="usernameInput"></label>
        <label>Bio: <textarea id="bioInput"></textarea></label>
        <label>Location: <input type="text" id="locationInput"></label>
        <button id="saveProfileBtn">Save Profile Info</button>
      </div>
    </section>

    <!-- Top 10 Friends -->
    <section id="top10FriendsSection" class="container">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer"></div>
      <button id="editTop10Btn">Edit Top 10</button>
    </section>

    <!-- Wall Comments -->
    <section id="wallCommentsSection" class="container">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer" class="commentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Post Comment</button>
    </section>

    <!-- Theme Selection -->
    <section id="themeSection" class="container">
      <h2>Themes</h2>
      <select id="themeSelect">
        <option value="">Default</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="linear-gradient(to right, red, yellow)">Gradient</option>
        <option value="black">Black</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Apply Theme</button>
    </section>

    <!-- Music Player -->
    <section id="musicSection" class="container">
      <h2>Music Player</h2>
      <input type="text" id="musicInput" placeholder="Paste YouTube/SoundCloud/Spotify URL">
      <button id="loadMusicBtn">Load Music</button>
      <iframe id="musicPlayer" width="100%" height="80" frameborder="0" allow="autoplay" allowfullscreen></iframe>
    </section>

  </main>

  <script src="profile.js"></script>
</body>
</html>
