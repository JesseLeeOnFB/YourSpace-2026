<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
<div id="profilePage" class="profile-page">
  <!-- Navigation -->
  <nav class="profile-nav">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Header -->
  <div class="profile-header">
    <div class="profile-pfp">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <input type="file" id="profilePicInput" accept="image/*">
      <button id="saveProfilePicBtn">Save PFP</button>
    </div>
    <div class="profile-info">
      <textarea id="bioInput" placeholder="This is your bio..."></textarea>
      <button id="saveBioBtn">Save Bio</button>
      <p id="bioDisplay">This is your bio...</p>
    </div>
  </div>

  <!-- Music Player -->
  <div class="music-player">
    <input type="text" id="musicURLInput" placeholder="Paste YouTube/Spotify URL">
    <button id="addMusicBtn">Add Music</button>
    <div id="musicContainer"></div>
  </div>

  <!-- Top 10 Friends -->
  <div class="top10-friends">
    <h3>Top 10 Friends</h3>
    <div id="top10Container"></div>
  </div>

  <!-- Wall -->
  <div class="wall-section">
    <h3>Wall</h3>
    <textarea id="wallInput" placeholder="Write something on this wall..."></textarea>
    <button id="postWallBtn">Post</button>
    <div id="wallPostsContainer"></div>
  </div>

  <!-- Custom HTML/Theme Injector -->
  <div class="custom-html-section">
    <h3>Custom HTML / CSS</h3>
    <textarea id="customHTMLInput" placeholder="Paste custom HTML/CSS here"></textarea>
    <button id="saveCustomHTMLBtn">Apply</button>
    <button id="resetCustomHTMLBtn">Reset to Default</button>
  </div>

  <!-- Preset Themes -->
  <div class="preset-themes">
    <h3>Preset Themes</h3>
    <button class="theme-btn" data-theme="dark">Dark</button>
    <button class="theme-btn" data-theme="light">Light</button>
    <button class="theme-btn" data-theme="retro">Retro</button>
  </div>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
