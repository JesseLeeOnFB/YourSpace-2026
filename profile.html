<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">
  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>Your Profile</h2>
    
    <div class="profilePhotoSection">
      <img id="profilePhoto" src="defaultProfile.png" class="profilePhoto">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Photo</button>
    </div>

    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Info</button>
    </div>

    <!-- Music Player -->
    <div class="musicPlayerSection">
      <audio id="musicPlayer" controls></audio>
    </div>

    <!-- Theme Selection -->
    <div class="customizationSection">
      <h3>Choose Theme</h3>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
      <h3>Custom HTML / Background</h3>
      <textarea id="customHTMLInput" rows="4" placeholder="Enter HTML/CSS for your profile background"></textarea>
      <button id="saveCustomHTMLBtn">Save Custom Background</button>
    </div>

    <!-- Top 10 Friends -->
    <div class="friendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="friendsList"></ul>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
