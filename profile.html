<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body>
  <div class="profile-container">

    <div class="profile-header">
      <img id="profilePfp" src="" alt="Profile Picture" class="profile-pfp">
      <input type="file" id="profilePfpInput">
      <button id="saveProfilePfpBtn">Save Profile Picture</button>
    </div>

    <div class="profile-info">
      <label>Username</label>
      <input id="usernameInput" type="text">
      <label>Bio</label>
      <textarea id="bioInput"></textarea>
      <label>Location</label>
      <input id="locationInput" type="text">
      <button id="saveProfileBtn">Save Profile Info</button>
    </div>

    <div class="wall-section">
      <h2>Wall Comments</h2>
      <div id="wallCommentsContainer" class="wall-comments"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
      <button id="addWallCommentBtn">Add Comment</button>
    </div>

    <div class="top-friends-section">
      <h2>Top 10 Friends</h2>
      <div id="top10FriendsContainer" class="top-friends"></div>
    </div>

  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAHMbxr7rJS88ZefVJzt8p_9CCTstLmLU8",
      authDomain: "yourspace-2026.firebaseapp.com",
      projectId: "yourspace-2026",
      storageBucket: "yourspace-2026.firebasestorage.app",
      messagingSenderId: "72667267302",
      appId: "1:72667267302:web:2bed5f543e05d49ca8fb27",
      measurementId: "G-FZ4GFXWGSS"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // DOM elements
    const usernameInput = document.getElementById('usernameInput');
    const bioInput = document.getElementById('bioInput');
    const locationInput = document.getElementById('locationInput');
    const saveProfileBtn = document.getElementById('saveProfileBtn');

    const profilePfp = document.getElementById('profilePfp');
    const profilePfpInput = document.getElementById('profilePfpInput');
    const saveProfilePfpBtn = document.getElementById('saveProfilePfpBtn');

    const wallCommentsContainer = document.getElementById('wallCommentsContainer');
    const wallCommentInput = document.getElementById('wallCommentInput');
    const addWallCommentBtn = document.getElementById('addWallCommentBtn');

    const top10FriendsContainer = document.getElementById('top10FriendsContainer');

    // Load profile
    async function loadProfile() {
      const user = auth.currentUser;
      if (!user) return;

      const userDocRef = db.collection('users').doc(user.uid);
      const docSnap = await userDocRef.get();
      if (!docSnap.exists) return;

      const data = docSnap.data();
      usernameInput.value = data.username || '';
      bioInput.value = data.bio || '';
      locationInput.value = data.location || '';
      if (data.pfpURL) profilePfp.src = data.pfpURL;

      // Load wall comments
      wallCommentsContainer.innerHTML = '';
      if (data.wallComments) {
        data.wallComments.forEach(comment => {
          const div = document.createElement('div');
          div.className = 'wall-comment';
          div.innerHTML = `
            <strong>${comment.username || 'Unknown'}</strong>: ${comment.text}
            ${comment.userId === user.uid ? '<button class="deleteWallCommentBtn">Delete</button>' : ''}
          `;
          if (comment.userId === user.uid) {
            div.querySelector('.deleteWallCommentBtn').addEventListener('click', async () => {
              await userDocRef.update({
                wallComments: firebase.firestore.FieldValue.arrayRemove(comment)
              });
              loadProfile();
            });
          }
          wallCommentsContainer.appendChild(div);
        });
      }

      // Load top friends
      top10FriendsContainer.innerHTML = '';
      if (data.top10Friends) {
        data.top10Friends.forEach(friend => {
          const div = document.createElement('div');
          div.className = 'top-friend';
          div.textContent = friend.username || 'Unknown';
          top10FriendsContainer.appendChild(div);
        });
      }
    }

    // Save profile info
    saveProfileBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) return;

      const userDocRef = db.collection('users').doc(user.uid);
      try {
        await userDocRef.update({
          username: usernameInput.value,
          bio: bioInput.value,
          location: locationInput.value
        });
        alert('Profile info updated!');
      } catch (err) {
        console.error(err);
        alert('Failed to update profile info');
      }
    });

    // Save profile picture
    saveProfilePfpBtn.addEventListener('click', async () => {
      const file = profilePfpInput.files[0];
      if (!file) return alert('Please select a picture first');

      try {
        const user = auth.currentUser;
        const storageRef = storage.ref(`profileImages/${user.uid}/${Date.now()}_${file.name}`);
        await storageRef.put(file);
        const url = await storageRef.getDownloadURL();

        profilePfp.src = url;
        const userDocRef = db.collection('users').doc(user.uid);
        await userDocRef.update({ pfpURL: url });
        alert('Profile picture updated!');
      } catch (err) {
        console.error(err);
        alert('Failed to save profile picture');
      }
    });

    // Add wall comment
    addWallCommentBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) return;

      const text = wallCommentInput.value.trim();
      if (!text) return;

      const comment = {
        text,
        userId: user.uid,
        username: usernameInput.value || 'Unknown',
        timestamp: Date.now()
      };

      const userDocRef = db.collection('users').doc(user.uid);
      try {
        await userDocRef.update({
          wallComments: firebase.firestore.FieldValue.arrayUnion(comment)
        });
        wallCommentInput.value = '';
        loadProfile();
      } catch (err) {
        console.error(err);
        alert('Failed to post comment');
      }
    });

    // Auth state
    auth.onAuthStateChanged(user => {
      if (user) loadProfile();
      else console.log('No user logged in');
    });

  </script>
</body>
</html>
