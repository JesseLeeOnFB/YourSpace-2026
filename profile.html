<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <nav>
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main>
    <section id="profileSection">
      <div id="profileHeader">
        <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
        <input type="file" id="pfpInput">
        <button id="savePfpBtn">Save Profile Picture</button>
        <textarea id="bioInput" placeholder="This is your bio"></textarea>
        <button id="saveBioBtn">Save Bio</button>
      </div>

      <div id="musicSection">
        <input type="text" id="musicInput" placeholder="Paste music URL">
        <button id="musicBtn">Play Music</button>
        <div id="musicContainer"></div>
      </div>

      <div id="customThemeSection">
        <textarea id="customHtmlInput" placeholder="Add custom HTML/CSS for profile layout"></textarea>
        <button id="saveCustomHtmlBtn">Apply Custom HTML</button>
        <button id="resetCustomHtmlBtn">Reset to Default</button>
      </div>

      <div id="top10Section">
        <h2>Top 10 Friends</h2>
        <div id="top10Container"></div>
      </div>

      <div id="wallSection">
        <h2>Wall Comments</h2>
        <div id="wallCommentsContainer"></div>
        <textarea id="wallCommentInput" placeholder="Write a comment"></textarea>
        <button id="postWallCommentBtn">Post Comment</button>
      </div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
