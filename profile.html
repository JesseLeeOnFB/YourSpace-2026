<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <div id="nav">
    <button id="feedNavBtn">Feed</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <div id="profileContainer">
    <div id="profileLeft">
      <div id="pfpContainer">
        <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
        <input type="file" id="pfpInput">
        <button id="pfpSaveBtn">Save PFP</button>
      </div>
      <div id="bioContainer">
        <h3>Bio</h3>
        <textarea id="bioInput" placeholder="This is the bio lol"></textarea>
        <button id="bioSaveBtn">Save Bio</button>
      </div>
      <div id="wallContainer">
        <h3>Wall Comments</h3>
        <div id="wallComments"></div>
        <input type="text" id="wallCommentInput" placeholder="Write on the wall...">
        <button id="wallCommentBtn">Post</button>
      </div>
    </div>

    <div id="profileRight">
      <div id="top10Container">
        <h3>Top 10 Friends</h3>
        <div id="top10List"></div>
      </div>

      <div id="musicContainer">
        <h3>Music Player</h3>
        <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify/etc link">
        <button id="musicBtn">Play</button>
        <div id="musicEmbed"></div>
      </div>

      <div id="themeContainer">
        <h3>Custom Theme / HTML</h3>
        <textarea id="customHTML" placeholder="Paste your code here"></textarea>
        <button id="applyThemeBtn">Apply</button>
        <button id="resetThemeBtn">Reset</button>
      </div>
    </div>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
