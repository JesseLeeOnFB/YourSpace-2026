<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Your Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="profileContainer">

    <h1>Your Profile</h1>

    <!-- PROFILE PHOTO -->
    <section class="profilePhotoSection">
      <img id="profilePicDisplay" alt="Profile Picture">
      <input type="file" id="profilePicInput" accept="image/*">
      <button id="saveProfilePicBtn">Save Profile Picture</button>
    </section>

    <!-- PROFILE INFO -->
    <section class="profileInfo">
      <label>Bio</label>
      <textarea id="bioInput" rows="3"></textarea>

      <label>Location</label>
      <input type="text" id="locationInput">

      <label>Music (YouTube URL)</label>
      <input type="text" id="musicInput">

      <button id="saveProfileBtn">Save Profile</button>
    </section>

    <!-- TOP FRIENDS -->
    <section class="topFriends">
      <h2>Top 10 Friends</h2>
      <input type="text" id="topFriendsInput" placeholder="Comma separated usernames">
      <button id="saveTopFriendsBtn">Save Top Friends</button>
    </section>

  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
