<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YourSpace — Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Base Styles -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="profile.css" />

  <!-- Firebase Auth Guard -->
  <script type="module" src="auth-guard.js"></script>
</head>

<body class="default-theme">

  <!-- =========================
       TOP NAVIGATION
  ========================== -->
  <header class="navbar">
    <div class="nav-left">
      <strong class="logo">YourSpace</strong>
    </div>
    <div class="nav-right">
      <button id="feedNavBtn">Feed</button>
      <button id="profileNavBtn">Profile</button>
      <button id="messagesNavBtn">Messages</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <!-- =========================
       CUSTOM HTML / CSS INJECTOR
       (FULL PAGE CONTROL)
  ========================== -->
  <div id="customHtmlInjector"></div>

  <!-- =========================
       PROFILE PAGE CONTENT
  ========================== -->
  <main class="profile-main">

    <!-- ===== TOP SECTION ===== -->
    <section class="profile-top">

      <!-- Profile Picture -->
      <div class="pfp-container">
        <img id="profilePfp" src="default-avatar.png" alt="Profile Picture" />
        <input type="file" id="pfpInput" accept="image/*" />
        <button id="savePfpBtn">Save Profile Picture</button>
      </div>

      <!-- Profile Info -->
      <div class="profile-info-box">
        <h2 id="profileUsername">Username</h2>

        <label for="bioInput">Bio</label>
        <textarea id="bioInput" placeholder="Tell the world about yourself..."></textarea>
        <button id="saveBioBtn">Save Bio</button>

        <!-- Message Button (for visitors) -->
        <button id="messageUserBtn" class="message-btn">
          Send Message
        </button>
      </div>

    </section>

    <!-- ===== WALL COMMENTS ===== -->
    <section class="wall-container">
      <h3>Wall</h3>

      <div id="wallComments"></div>

      <textarea
        id="wallCommentInput"
        placeholder="Write something on this wall..."
      ></textarea>
      <button id="postWallCommentBtn">Post</button>
    </section>

    <!-- ===== TOP 10 FRIENDS ===== -->
    <section class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
    </section>

    <!-- ===== MUSIC PLAYER ===== -->
    <section class="music-player">
      <h3>Music</h3>

      <input
        type="text"
        id="musicLinkInput"
        placeholder="Paste YouTube / Spotify / SoundCloud link"
      />
      <button id="addMusicBtn">Add to Playlist</button>

      <div id="musicPlaylist"></div>

      <iframe
        id="musicIframe"
        allow="autoplay"
        allowfullscreen
      ></iframe>
    </section>

    <!-- ===== THEMES ===== -->
    <section class="theme-container">
      <h3>Themes</h3>
      <select id="themeSelector">
        <option value="default-theme">Default</option>
        <option value="dark-theme">Dark</option>
        <option value="light-theme">Light</option>
        <option value="retro-theme">Retro</option>
        <option value="neon-theme">Neon</option>
      </select>
    </section>

    <!-- ===== CUSTOM HTML / CSS ===== -->
    <section class="custom-html-container">
      <h3>Custom HTML / CSS</h3>
      <textarea
        id="customHtmlInput"
        placeholder="Paste custom HTML or CSS here (MySpace style)"
      ></textarea>

      <div class="custom-html-actions">
        <button id="saveCustomHtmlBtn">Save</button>
        <button id="resetCustomHtmlBtn">Reset to Default</button>
      </div>
    </section>

  </main>

  <!-- =========================
       PROFILE LOGIC
  ========================== -->
  <script type="module" src="profile.js"></script>

</body>
</html>
