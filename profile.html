<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="default-theme">

  <!-- Navigation -->
  <div class="navbar">
    <button id="feedNavBtn">Feed</button>
    <button id="profileNavBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <!-- Main Profile Section -->
  <div class="profile-main">

    <!-- Top Section: PFP + Info -->
    <div class="profile-top">
      <div class="pfp-container">
        <img id="profilePfp" src="default-avatar.png" alt="Profile Picture">
        <input type="file" id="pfpInput">
      </div>

      <div class="profile-info-box">
        <input type="text" id="usernameInput" placeholder="Username">
        <textarea id="bioInput" placeholder="Write something about yourself..."></textarea>
        <select id="themeSelect">
          <option value="default-theme">Default</option>
          <option value="red-theme">Red</option>
          <option value="blue-theme">Blue</option>
          <option value="green-theme">Green</option>
          <option value="neon-theme">Neon</option>
        </select>
        <button id="saveProfileBtn">Save</button>
      </div>
    </div>

    <!-- Custom HTML Background Section -->
    <div class="custom-html-container">
      <h3>Custom HTML Background / Theme</h3>
      <textarea id="customHtmlInput" placeholder="Paste your HTML/JS/CSS here"></textarea>
      <button id="applyCustomHtmlBtn">Apply</button>
      <div id="customHtmlPreview"></div>
    </div>

    <!-- Top 10 Friends Section -->
    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <div id="top10Container"></div>
      <div id="top10EditPanel" style="display:none; margin-top:10px;">
        <p>Drag to reorder friends. Click to change friend.</p>
        <div id="top10EditList"></div>
      </div>
    </div>

    <!-- Wall Comments Section -->
    <div class="wall-container">
      <h3>Wall Comments</h3>
      <div id="wallCommentsContainer"></div>
      <textarea id="wallCommentInput" placeholder="Write a comment"></textarea>
      <button id="postWallCommentBtn">Post Comment</button>
    </div>

  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
