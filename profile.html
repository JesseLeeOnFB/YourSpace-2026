<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAV BAR -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE INFO -->
  <section class="profileSection">
    <h2>Your Profile</h2>

    <!-- Profile Photo -->
    <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Photo">
    <input type="file" id="profilePhotoInput" accept="image/*">
    <button id="saveProfilePhotoBtn">Save Profile Photo</button>

    <!-- User Info -->
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="locationInput" placeholder="Location">
    <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
    <input type="text" id="musicInput" placeholder="Embedded Music URL">
    <button id="saveProfileInfoBtn">Save Profile Info</button>

    <!-- Preset Themes -->
    <div class="customizationSection">
      <h3>Theme</h3>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- Top Friends -->
    <div class="customizationSection">
      <h3>Top Friends</h3>
      <div id="topFriendsContainer" class="topFriendsList"></div>
      <input type="text" id="topFriendInput" placeholder="Add a friend by username">
      <button id="addTopFriendBtn">Add to Top Friends</button>
    </div>

    <!-- Music Player -->
    <div class="musicPlayerSection">
      <iframe id="musicPlayer" src="" allow="autoplay" allow="encrypted-media"></iframe>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
