<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body class="theme-default">
  <nav id="topNav">
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main>
    <section id="profileHeader">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture" />
      <h1 id="profileName">YourSpace User</h1>
      <p id="profileBio">This is the bio lol</p>

      <div id="profileEdit">
        <input type="file" id="pfpInput" accept="image/*" />
        <button id="savePfpBtn">Save Profile Picture</button>

        <textarea id="bioInput" placeholder="Edit your bio"></textarea>
        <button id="saveBioBtn">Save Bio</button>

        <select id="themeSelect">
          <option value="default">Default</option>
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="retro">Retro</option>
        </select>
      </div>
    </section>

    <section id="top10Friends">
      <h2>Top 10 Friends</h2>
      <ul id="top10List"></ul>
    </section>

    <section id="wallSection">
      <h2>Wall</h2>
      <textarea id="wallInput" placeholder="Write on this wall..."></textarea>
      <button id="postWallBtn">Post</button>
      <div id="wallContainer"></div>
    </section>

    <section id="musicSection">
      <h2>Music Player</h2>
      <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify URL" />
      <button id="addMusicBtn">Add Song</button>
      <div id="musicPlayerContainer"></div>
      <ul id="playlist"></ul>
    </section>

    <section id="customHTMLContainer">
      <h2>Custom Profile Code</h2>
      <textarea id="customHTMLInput" placeholder="Enter your HTML/CSS for custom profile layout"></textarea>
      <button id="saveCustomHTMLBtn">Apply</button>
      <button id="resetCustomHTMLBtn">Reset</button>
      <div id="customHTMLDisplay"></div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
