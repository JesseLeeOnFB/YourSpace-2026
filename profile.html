<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- PROFILE SECTION -->
  <section class="profileSection">
    <h2>My Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePicContainer">
      <img id="profilePicPreview" src="" alt="Profile Picture" class="profilePhoto">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <label>Username:</label>
      <input type="text" id="usernameInput" placeholder="Enter username">

      <label>Bio:</label>
      <textarea id="bioInput" placeholder="Tell us about yourself"></textarea>

      <label>Location:</label>
      <input type="text" id="locationInput" placeholder="City, Country">

      <label>Favorite Music / Link:</label>
      <input type="text" id="musicInput" placeholder="YouTube link or other">
    </div>

    <button id="saveProfileBtn">Save Profile Info</button>
  </section>

  <!-- THEME CUSTOMIZATION -->
  <section class="customizationSection">
    <h2>Theme / Background</h2>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>
  </section>

  <!-- TOP FRIENDS -->
  <section class="topFriendsSection">
    <h2>Top Friends</h2>
    <ul id="topFriendsList"></ul>
    <input type="text" id="addTopFriendInput" placeholder="Add friend's username">
    <button id="addTopFriendBtn">Add to Top Friends</button>
  </section>

  <!-- SEARCH USERS -->
  <section class="searchSection">
    <h2>Search Users</h2>
    <input type="text" id="searchUserInput" placeholder="Enter username">
    <button id="searchUserBtn">Search</button>
    <div id="searchResults"></div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
