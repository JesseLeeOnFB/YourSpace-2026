<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="profilePage">

  <!-- NAV -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="profileContainer">

    <!-- PROFILE PHOTO -->
    <section class="profilePhotoSection">
      <img id="profilePicDisplay" />
      <input type="file" id="profilePicInput" accept="image/*" />
      <button id="saveProfilePicBtn">Save Profile Photo</button>
    </section>

    <!-- PROFILE INFO -->
    <section class="profileInfo">
      <label>Bio</label>
      <textarea id="bioInput"></textarea>

      <label>Location</label>
      <input type="text" id="locationInput" />

      <button id="saveProfileBtn">Save Profile</button>
    </section>

    <!-- BACKGROUND CUSTOMIZATION -->
    <section class="profileBackground">
      <h2>Profile Background</h2>

      <label>Background Image URL</label>
      <input type="text" id="bgImageInput" placeholder="https://..." />

      <label>Background Color</label>
      <input type="color" id="bgColorInput" />

      <button id="saveBackgroundBtn">Save Background</button>
    </section>

  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
