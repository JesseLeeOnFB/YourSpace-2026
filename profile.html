<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>YourSpace Profile</h1>
    <button id="logoutBtn">Logout</button>
  </header>

  <main>
    <section class="profile-section">
      <h2>Profile Info</h2>
      <label>Username:</label>
      <input type="text" id="username" placeholder="Enter username">

      <label>Bio:</label>
      <textarea id="bio" placeholder="Enter bio"></textarea>

      <label>Profile Photo:</label>
      <input type="file" id="profilePicInput" accept="image/*">
      <img id="profilePicDisplay" src="" alt="Profile Picture" style="width:150px;height:150px;display:block;margin-top:10px;">

      <button id="saveProfileBtn">Save Profile</button>
      <button id="uploadPhotoBtn">Upload Photo</button>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
