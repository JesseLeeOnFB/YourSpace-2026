<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>My Profile</h1>

<!-- Profile Form -->
<div id="profileForm">
  <label for="usernameInput">Username:</label>
  <input type="text" id="usernameInput">

  <label for="bioInput">Bio:</label>
  <textarea id="bioInput"></textarea>

  <label for="locationInput">Location:</label>
  <input type="text" id="locationInput">

  <label for="musicInput">Music URL (embed link):</label>
  <input type="text" id="musicInput">

  <!-- Profile Photo -->
  <label for="profilePhotoInput">Profile Photo:</label>
  <input type="file" id="profilePhotoInput" accept="image/*">
  <img id="profilePhotoPreview" src="" alt="Profile Photo Preview" style="width:100px; height:100px; border-radius:50%; display:block; margin-top:10px;">

  <button id="saveProfileBtn">Save Profile</button>
</div>

<button id="logoutBtn">Logout</button>

<script type="module" src="profile.js"></script>
</body>
</html>
