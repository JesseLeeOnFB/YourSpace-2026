<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
<div id="navBar">
  <button class="navBtn" data-target="feed">Feed</button>
  <button class="navBtn" data-target="profile">Profile</button>
  <button class="navBtn" data-target="notifications">Notifications</button>
  <button class="navBtn" data-target="messages">Messages</button>
</div>

<div id="profileContainer">

  <div id="pfpSection">
    <img id="profilePfp" src="" alt="Profile Picture">
    <input type="file" id="profilePfpInput">
    <button id="saveProfilePfpBtn">Save Profile Picture</button>
  </div>

  <div id="profileInfo">
    <label>Username</label>
    <input id="usernameInput" type="text">
    <label>Bio</label>
    <textarea id="bioInput"></textarea>
    <label>Location</label>
    <input id="locationInput" type="text">
    <button id="saveProfileBtn">Save Profile Info</button>
  </div>

  <div id="themeSection">
    <label for="themeSelect">Select Theme</label>
    <select id="themeSelect">
      <option value="default">Default</option>
      <option value="red">Red</option>
      <option value="blue">Blue</option>
      <option value="green">Green</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated Gradient</option>
    </select>
    <button id="saveThemeBtn">Apply Theme</button>
  </div>

  <div id="top10Section">
    <h3>Top 10 Friends</h3>
    <div id="top10FriendsContainer"></div>
    <button id="editTop10Btn">Edit Top 10</button>
  </div>

  <div id="wallSection">
    <h3>Wall Comments</h3>
    <div id="wallCommentsContainer"></div>
    <textarea id="wallCommentInput" placeholder="Write a comment..."></textarea>
    <button id="addWallCommentBtn">Post Comment</button>
  </div>

  <div id="musicSection">
    <label for="musicInput">Music URL (YouTube/SoundCloud/etc.)</label>
    <input type="text" id="musicInput">
    <button id="loadMusicBtn">Load Music</button>
    <div id="musicPlayerContainer"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
