<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav>
      <button id="homeBtn">Home</button>
      <span id="profileNavMsg"></span>
      <button id="logoutBtn">Logout</button>
    </nav>

    <h2>Profile</h2>

    <div class="profile-section">
      <img id="profilePicPreview" src="" alt="Profile Picture" width="150" height="150">
      <input type="file" id="profilePicInput" accept="image/*">

      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="bioInput" placeholder="Bio">
      <input type="text" id="locationInput" placeholder="Location">
      <input type="text" id="musicInput" placeholder="Music URL (audio)">

      <textarea id="themeInput" placeholder="HTML/CSS for custom background/theme"></textarea>

      <button id="saveProfileBtn">Save Profile</button>
    </div>

    <h3>Your Posts</h3>
    <div id="profilePostsContainer"></div>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
