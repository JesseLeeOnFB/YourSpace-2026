<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- NAVIGATION BAR -->
  <nav class="navbar">
    <button id="homeBtn">Feed</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="profileSection">
    <h1>Your Profile</h1>

    <!-- PROFILE PICTURE -->
    <div class="profilePhotoSection">
      <img id="profilePicDisplay" src="" alt="Profile Picture" style="display:none; border-radius:50%; width:150px; height:150px; object-fit:cover;">
      <input type="file" id="profilePicInput" accept="image/*">
    </div>

    <!-- BIO & LOCATION -->
    <div class="profileInfoSection">
      <label for="bio">Bio:</label>
      <textarea id="bio" rows="3" placeholder="Write your bio here..."></textarea>

      <label for="location">Location:</label>
      <input type="text" id="location" placeholder="City, State">

      <label for="music">Music Link (YouTube or other):</label>
      <input type="text" id="music" placeholder="Paste link here">

      <label for="topFriends">Top 10 Friends (usernames comma-separated):</label>
      <input type="text" id="topFriends" placeholder="DanielleW, JohnD, ...">

      <button id="saveProfileBtn">Save Profile</button>
    </div>

    <!-- THEME SELECTION -->
    <div class="themeSection">
      <label for="themeSelect">Choose a Theme:</label>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>
  </main>

  <!-- OPTIONAL MUSIC PLAYER -->
  <div class="musicPlayerSection">
    <h2>Music Player</h2>
    <iframe id="musicPlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="width:100%; height:80px;"></iframe>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
