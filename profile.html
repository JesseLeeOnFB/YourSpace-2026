<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace - Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body class="theme-dark">

  <!-- Navigation Bar -->
  <div class="navbar">
    <button id="navFeed">Feed</button>
    <button id="navProfile">Profile</button>
    <button id="navMessages">Messages</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="container">

    <!-- Profile Header -->
    <div class="profile-header">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <h1 id="profileName">YourSpace User</h1>
      <div id="profileBio" class="profile-bio">This is the bio lol</div>
    </div>

    <!-- Editable Section -->
    <div class="edit-section">
      <input type="text" id="bioInput" placeholder="Update your bio">
      <button id="saveBioBtn">Save Bio</button>

      <input type="file" id="pfpInput" accept="image/*">
      <button id="savePfpBtn">Save Profile Picture</button>

      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>
    </div>

    <!-- Wall Posts -->
    <div class="wall-container" id="wallContainer"></div>
    <input type="text" id="wallInput" placeholder="Write on the wall">
    <button id="postWallBtn">Post</button>

    <!-- Top 10 Friends -->
    <h3>Top 10 Friends</h3>
    <div class="top10-container" id="top10Container"></div>

    <!-- Music Player -->
    <div class="music-container">
      <h3>Music Player</h3>
      <iframe id="musicPlayer" src="" allow="autoplay" allowfullscreen></iframe>
      <input type="text" id="musicInput" placeholder="Paste YouTube, Spotify, SoundCloud link">
      <button id="addMusicBtn">Add Song</button>
    </div>

    <!-- Custom HTML Injector -->
    <div class="custom-html-container" id="customHtmlContainer">
      <h3>Custom HTML</h3>
      <textarea id="customHtmlInput" placeholder="Paste your HTML/CSS here" rows="5"></textarea>
      <button id="saveCustomHtmlBtn">Save Custom Layout</button>
      <div id="customHtmlPreview"></div>
    </div>

  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
