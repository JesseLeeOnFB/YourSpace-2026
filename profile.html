<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - YourSpace</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <button onclick="window.location.href='feed.html'">Global Feed</button>
  <button id="logoutBtn">Logout</button>
</nav>

<div class="profile-box">
  <h2>Profile Settings</h2>
  <input type="text" id="profileUsername" placeholder="Username">
  <input type="text" id="profileBio" placeholder="Bio">
  <input type="text" id="profileLocation" placeholder="Location">
  <input type="text" id="profileMusic" placeholder="Music URL (audio)">
  <textarea id="profileTheme" placeholder="Custom HTML/CSS for profile"></textarea>
  <input type="file" id="profilePhoto">
  <button id="saveProfileBtn">Save Profile</button>
</div>

<div class="user-posts-container"></div>

<script type="module" src="profile.js"></script>
</body>
</html>
