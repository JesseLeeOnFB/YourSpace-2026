<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <header>
    <nav>
      <button id="feedNavBtn">Feed</button>
      <button id="profileNavBtn">Profile</button>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main>
    <section id="profileInfo">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture" width="150" height="150">
      <h2 id="profileName">Loading...</h2>
      <p id="profileBio">This is the bio lol</p>
      
      <input type="text" id="bioInput" placeholder="Update your bio">
      <button id="saveBioBtn">Save Bio</button>

      <input type="file" id="pfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>

      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="retro">Retro</option>
      </select>
    </section>

    <section id="top10Section">
      <h3>Top 10 Friends</h3>
      <div id="top10FriendsContainer"></div>
    </section>

    <section id="wallSection">
      <h3>Wall</h3>
      <input type="text" id="wallInput" placeholder="Write something on the wall...">
      <button id="postWallBtn">Post</button>
      <div id="wallContainer"></div>
    </section>

    <section id="musicSection">
      <h3>Music Playlist</h3>
      <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify/SoundCloud URL">
      <button id="addMusicBtn">Add Song</button>
      <div id="playlistContainer"></div>
      <div id="musicPlayer"></div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
