<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <nav>
    <button id="feedNavBtn">Feed</button>
    <button id="messagesNavBtn">Messages</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <div class="profile-container">
    <div class="profile-header">
      <img id="profilePic" src="default-avatar.png" alt="Profile Picture">
      <h2 id="profileName">YourSpace User</h2>
      <p id="profileBio">This is the bio lol</p>
      <input type="file" id="pfpInput">
      <button id="savePfpBtn">Save Profile Picture</button>
      <textarea id="bioInput" placeholder="Update your bio"></textarea>
      <button id="saveBioBtn">Save Bio</button>
    </div>

    <div class="top10-container">
      <h3>Top 10 Friends</h3>
      <ul id="top10List"></ul>
    </div>

    <div class="wall-container">
      <h3>Wall Comments</h3>
      <div id="wallContainer"></div>
      <textarea id="wallInput" placeholder="Write something..."></textarea>
      <button id="postWallBtn">Post</button>
    </div>

    <div class="music-container">
      <h3>Music Player</h3>
      <input type="text" id="musicInput" placeholder="Paste YouTube/Spotify link">
      <button id="addMusicBtn">Add</button>
      <div id="musicPlaylist"></div>
      <iframe id="musicPlayer" width="300" height="80" frameborder="0" allow="autoplay" allowfullscreen></iframe>
    </div>
  </div>

<script type="module" src="profile.js"></script>
</body>
</html>
