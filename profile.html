<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- Navigation -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>My Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePhotoSection">
      <img id="profilePhotoDisplay" src="" alt="Profile Photo" class="profilePhoto">
      <input type="file" id="profilePhotoInput" accept="image/*">
      <button id="saveProfilePhotoBtn">Save Profile Photo</button>
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="YouTube Music URL">
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <!-- Music Player -->
    <div class="musicPlayerSection"></div>

    <!-- Top 10 Friends -->
    <div class="topFriendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
      <input type="text" id="addFriendInput" placeholder="Add friend by username">
      <button id="addFriendBtn">Add Friend</button>
    </div>

    <!-- Customization -->
    <div class="customizationSection">
      <h3>Profile Theme</h3>
      <select id="themeSelect">
        <option value="default">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Apply Theme</button>
    </div>
  </section>

  <script type="module" src="profile.js"></script>
</body>
</html>
