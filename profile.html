<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <button id="homeBtn">Home</button>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Your Profile</h1>

<div id="profileContainer">
  <img id="profilePic" src="default-avatar.png" alt="Profile Picture" style="max-width:150px;">
  <input type="file" id="profilePicInput" accept="image/*">
  
  <input type="text" id="displayName" placeholder="Display Name">
  <textarea id="bio" placeholder="Bio"></textarea>
  <input type="text" id="location" placeholder="Location">
  <textarea id="customHTML" placeholder="Custom HTML / Theme"></textarea>
  <textarea id="musicEmbed" placeholder="Music Embed Code"></textarea>
  
  <button id="saveBtn">Save Changes</button>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
