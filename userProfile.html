<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourSpace Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="default">
<nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="logoutBtn">Logout</button>
</nav>

<section class="profileSection">
    <h2>Your Profile</h2>
    
    <img id="profilePhoto" class="profilePhoto" src="" alt="Profile Photo">
    <input type="file" id="profilePicInput" accept="image/*">
    <button id="saveProfilePicBtn">Save Profile Picture</button>
    
    <div class="profileInputs">
        <input type="text" id="usernameInput" placeholder="Username">
        <input type="text" id="locationInput" placeholder="Location">
        <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
        <input type="text" id="musicInput" placeholder="Embedded Music URL">
        <select id="themeSelect">
            <option value="default">Default</option>
            <option value="dark">Dark</option>
            <option value="neon">Neon</option>
            <option value="animated">Animated</option>
        </select>
        <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <h3>Top Friends</h3>
    <input type="text" id="addFriendInput" placeholder="Search user by username">
    <button id="addFriendBtn">Add Friend</button>
    <ul id="topFriendsList"></ul>

    <h3>Music Player</h3>
    <iframe id="musicPlayer" width="300" height="80" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</section>

<script type="module" src="userProfile.js"></script>
</body>
</html>
