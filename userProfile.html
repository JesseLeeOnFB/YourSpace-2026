<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- Profile Section -->
  <section class="profileSection">
    <img id="profilePic" class="profilePhoto" src="" alt="Profile Picture">
    <input type="file" id="profilePicInput" accept="image/*">
    <button id="saveProfilePicBtn">Save Profile Picture</button>

    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <!-- Theme Selection -->
    <select id="themeSelect">
      <option value="">Select Theme</option>
      <option value="default">Default</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
      <option value="animated">Animated</option>
    </select>
    <button id="saveThemeBtn">Save Theme</button>

    <!-- Top 10 Friends -->
    <div class="topFriendsSection">
      <h3>Top 10 Friends</h3>
      <ul id="topFriendsList"></ul>
    </div>
  </section>

  <!-- Friend Search Section -->
  <section class="friendSearchSection">
    <h3>Find Friends</h3>
    <input type="text" id="searchUserInput" placeholder="Search by username">
    <button id="searchUserBtn">Search</button>
    <div id="searchResults"></div>
  </section>

  <script type="module" src="userProfile.js"></script>
</body>
</html>
