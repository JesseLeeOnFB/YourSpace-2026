<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourSpace Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default">

  <!-- Nav Bar -->
  <nav class="navbar">
    <button id="homeBtn">Home</button>
    <button id="feedBtn">Feed</button>
    <button id="logoutBtn">Logout</button>
  </nav>

  <!-- Profile Section -->
  <section class="profileSection">
    <h2>My Profile</h2>

    <!-- Profile Picture -->
    <div class="profilePicSection">
      <img id="profilePicDisplay" class="profilePhoto" src="" alt="Profile Photo">
      <input type="file" id="profilePicInput" accept="image/*">
      <button id="saveProfilePicBtn">Upload Profile Picture</button>
    </div>

    <!-- Profile Info -->
    <div class="profileInfo">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="text" id="locationInput" placeholder="Location">
      <textarea id="bioInput" rows="3" placeholder="Bio"></textarea>
      <input type="text" id="musicInput" placeholder="Embedded Music URL">
      <button id="saveProfileInfoBtn">Save Profile Info</button>
    </div>

    <!-- Theme Selection -->
    <div class="themeSection">
      <label for="themeSelect">Select Theme:</label>
      <select id="themeSelect">
        <option value="">Default</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
        <option value="animated">Animated</option>
      </select>
      <button id="saveThemeBtn">Save Theme</button>
    </div>

    <!-- Top Friends -->
    <div class="topFriendsSection">
      <h3>Top Friends</h3>
      <div id="topFriendsList"></div>
      <input type="text" id="addTopFriendInput" placeholder="Enter friend's username">
      <button id="addTopFriendBtn">Add to Top Friends</button>
    </div>

    <!-- Friend Search -->
    <div class="friendSearchSection">
      <h3>Search Users</h3>
      <input type="text" id="friendSearchInput" placeholder="Search username">
      <button id="friendSearchBtn">Search</button>
      <div id="friendSearchResults"></div>
    </div>

  </section>

  <script type="module" src="userProfile.js"></script>
</body>
</html>
